name: victor-sweep

# Slippage-aware PARAMETER sweep for the VICTOR feed, per regime (R3, R4).
#
# Victor's TP1/TP2/TP3 and SL are fixed in his posted signals, so this does NOT
# sweep his risk:reward -- it sweeps OUR strategy parameters (entry ladder,
# sl_multiplier, lock delays, max-hold, final-target, ...) over his feed. The
# feed is sliced per regime (tools/slice_signals.py) so the OOS held-out tail is
# THAT regime's last 2 months, not the whole feed's 2026 tail. Every candidate
# carries the locked-exit slippage overlay (2.0 / 1.0 via sweep.base_config_dict),
# so the winner is decided on REAL fills, not idealized exact-level fills.
#
# Matrix: regime (R3strong=2025, R4parab=2026) x seed-batch (a=seeds42-45,
# b=seeds46-49). Each job runs FOUR tools/sweep_self_limit.py shards in parallel
# on the runner's 4 cores -> 16 shards total. The aggregate job merges every
# shard per regime and picks the winner on EDGE + OOS (compounded reported, not
# decided) via tools/victor_sweep_aggregate.py. Results are artifacts only (no
# branch writes), so there is no push collision between the parallel jobs.
#
# COMPREHENSIVE: with --signal-policy every shard also explores the signal R:R /
# SL-source dimensions (filter weak R:R, rewrite TPs to our geometry, source the
# SL from ATR, nominal-vs-effective reference) alongside the full param grid, so
# the take-all-vs-selective and Victor-TP-vs-our-geometry trade-offs are all in
# one sweep. The aggregate ranks on fixed-lot edge + $3/closed-lot bonus (more
# closed signals scores higher) guarded by DD<=40% & OOS>0.

on:
  workflow_dispatch:
    inputs:
      max_candidates:
        description: "candidates per shard (8 shards/regime explore ~8x this)"
        default: "120"

permissions:
  contents: read

concurrency:
  group: victor-sweep
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sweep:
    strategy:
      fail-fast: false
      max-parallel: 20   # GitHub free public concurrency cap
      matrix:
        regime: [R3strong, R4parab]
        # 8 seed-batches/regime x 4 shards/job = 64 shards exploring the full
        # params x R:R x ATR space in parallel ("sweep everything, fast").
        batch: [0, 1, 2, 3, 4, 5, 6, 7]
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Resolve regime window + slice the Victor feed
        id: cfg
        run: |
          set -euo pipefail
          case "${{ matrix.regime }}" in
            R3strong) CHARTS="data/XAUUSD_M1_2025*_ELEV8.csv"; START=2025-01-01; END=2025-12-31 ;;
            R4parab)  CHARTS="data/XAUUSD_M1_2026*_ELEV8.csv"; START=2026-01-01; END=2026-12-31 ;;
            *) echo "unknown regime ${{ matrix.regime }}"; exit 1 ;;
          esac
          echo "charts=$CHARTS" >> "$GITHUB_OUTPUT"
          python tools/slice_signals.py --signals victor_signals.txt \
            --start-date "$START" --end-date "$END" \
            --output "feed_${{ matrix.regime }}.txt"
      - name: Run 4 shards in parallel (all 4 runner cores, resumable)
        run: |
          set -uo pipefail
          BASE=$(( 42 + ${{ matrix.batch }} * 4 ))
          MC="${{ github.event.inputs.max_candidates }}"; MC="${MC:-120}"
          CELL="victor_out/${{ matrix.regime }}"
          for N in 0 1 2 3; do
            timeout 18000 python tools/sweep_self_limit.py \
              --signals "feed_${{ matrix.regime }}.txt" \
              --charts ${{ steps.cfg.outputs.charts }} \
              --seed $((BASE + N)) \
              --max-candidates "$MC" \
              --output-dir "${CELL}/batch_${{ matrix.batch }}_shard${N}" \
              --validate-months 2 \
              --max-concurrent-dd-pct 40 \
              --fixed-lot 0.01 \
              --signal-policy \
              --resume &
          done
          wait
          echo "shard line counts:"
          for f in "${CELL}"/batch_${{ matrix.batch }}_shard*/results.jsonl; do
            echo "  $f: $(wc -l < "$f" 2>/dev/null || echo 0)"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: victor-${{ matrix.regime }}-${{ matrix.batch }}
          path: victor_out/**/results.jsonl
          if-no-files-found: error

  aggregate:
    needs: [sweep]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          path: _artifacts
      - name: Aggregate per regime, pick winner on edge + OOS
        run: |
          set -uo pipefail
          for REG in R3strong R4parab; do
            mkdir -p "root_${REG}"
            cp -r _artifacts/victor-${REG}-* "root_${REG}/" 2>/dev/null || true
            python tools/victor_sweep_aggregate.py \
              --root "root_${REG}" --regime "$REG" \
              --out-dir "victor_results/${REG}" --dd-gate 40 --top-n 25 || true
          done
          echo "==================== WINNERS ===================="
          cat victor_results/*/WINNER_*.md 2>/dev/null || echo "(no winners written)"
      - uses: actions/upload-artifact@v4
        with:
          name: victor-sweep-results
          path: victor_results/**
          if-no-files-found: warn
