name: self-regime-grid

# COARSE-STAGE feed x regime adaptive GRID sweep (widened sibling of
# self-regime-sweep.yml). Where self-regime-sweep fits ONE adaptive feed
# (self_adaptive) per regime, this grid fans out MANY ATR-multiplier feeds per
# regime at once, so the coarse stage of a coarse-to-fine search can compare
# stop/target sizings head-to-head within each regime slice.
#
# Matrix: feed (8) x regime (4) = 32 independent ubuntu-latest jobs. Each job
# runs FOUR tools/sweep_self_limit.py shards (seeds 42..45) in parallel on the
# runner's 4 cores against that regime's chart month-glob and that feed's
# archive, then a single AGGREGATE job merges every shard's results back and is
# the SOLE writer to research/regime-adaptive -- so there is no push collision
# between the parallel jobs.
#
# Why this is collision-free (same contract as self-regime-sweep.yml):
#   * Each grid job only ever WRITES its own shard*/results.jsonl files and
#     uploads them as an artifact (res-<feed>__<regime>); it never pushes.
#   * The aggregate job downloads all 32 artifacts, copies them into the
#     sweep_regime_out_grid/<feed>__<regime>/shard<N>/ tree, writes the
#     per-regime BEST/CLI snapshots + a top-level LEADERBOARD, and is the only
#     job that commits + pushes.
#
# Resume: each job checks out research/regime-adaptive (which already contains
# any results.jsonl a prior aggregate committed), so --resume continues from it.
# The job's artifact carries the FULL cumulative shard*/results.jsonl, so the
# aggregate can overwrite-copy each one safely.
#
# Self-terminating: the aggregate marks a (feed,regime) cell DONE once all 4 of
# its shards have >= 120 result lines; when all 32 cells are DONE it disables
# this workflow, otherwise it re-dispatches itself for the next pass. A sparse
# 3-hourly schedule is only a safety net. schedule/workflow_dispatch fire only
# from the default branch, so this file lives on main; it operates on the
# research branch and nothing about the sweep lands on main.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */3 * * *"   # safety net; self-disables once all 32 cells are DONE

permissions:
  contents: write   # aggregate pushes sweep checkpoints to the research branch
  actions: write    # self-chain the next pass / self-disable when finished

concurrency:
  group: self-regime-grid
  cancel-in-progress: false   # never interrupt an in-flight sweep pass

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  cell:
    strategy:
      fail-fast: false
      max-parallel: 20   # GitHub free public concurrency cap
      matrix:
        feed: [adA_base, adB_tightSL, adC_wideSL, adD_closeTP, adE_farTP, adF_tightSL_closeTP, adG_wideSL_farTP, pullback]
        regime: [R1quiet, R2bull, R3strong, R4parab]
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/regime-adaptive
          fetch-depth: 0

      - name: Completion guard (cell already DONE?)
        id: guard
        run: |
          # If a previous aggregate marked this (feed,regime) cell DONE, skip the
          # heavy sweep.
          if [ -f "sweep_regime_out_grid/${{ matrix.feed }}__${{ matrix.regime }}/DONE" ]; then
            echo "cell ${{ matrix.feed }}__${{ matrix.regime }} is DONE — skipping."
            echo "done=true" >> "$GITHUB_OUTPUT"
          else
            echo "done=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.done != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.guard.outputs.done != 'true'
        run: pip install -r requirements.txt

      - name: Resolve this regime's chart month-glob
        if: steps.guard.outputs.done != 'true'
        id: charts
        run: |
          # Each regime is fit on a distinct slice of XAUUSD history. The globs
          # are expanded by the shell into the actual ELEV8 chart files below.
          # This case mapping is identical to self-regime-sweep.yml.
          case "${{ matrix.regime }}" in
            R1quiet)
              CHARTS="data/XAUUSD_M1_2021{11,12}_ELEV8.csv data/XAUUSD_M1_2022*_ELEV8.csv data/XAUUSD_M1_2023{01,02,03,04,05,06,07,08,09}_ELEV8.csv"
              ;;
            R2bull)
              CHARTS="data/XAUUSD_M1_2023{10,11,12}_ELEV8.csv data/XAUUSD_M1_2024*_ELEV8.csv"
              ;;
            R3strong)
              CHARTS="data/XAUUSD_M1_2025*_ELEV8.csv"
              ;;
            R4parab)
              CHARTS="data/XAUUSD_M1_2026*_ELEV8.csv"
              ;;
            *)
              echo "unknown regime ${{ matrix.regime }}"; exit 1 ;;
          esac
          echo "CHARTS=${CHARTS}" >> "$GITHUB_ENV"
          echo "regime ${{ matrix.regime }} charts: ${CHARTS}"

      - name: Resolve this feed's signal archive
        if: steps.guard.outputs.done != 'true'
        id: feed
        run: |
          # pullback reuses the already-committed alias feed; every other feed
          # is generated/adaptive_<feed>.txt.
          case "${{ matrix.feed }}" in
            pullback)
              FEED="generated/adaptive_self_m15_trend_pullback.txt" ;;
            *)
              FEED="generated/adaptive_${{ matrix.feed }}.txt" ;;
          esac
          if [ ! -f "$FEED" ]; then
            echo "feed file $FEED is missing"; exit 1
          fi
          echo "FEED=${FEED}" >> "$GITHUB_ENV"
          echo "feed ${{ matrix.feed }} archive: ${FEED} ($(grep -cE '^[0-9]+\. ' "$FEED") signals)"

      - name: Run 4 shards in parallel (use all 4 runner cores, resumable, time-boxed)
        if: steps.guard.outputs.done != 'true'
        run: |
          # Launch FOUR sweep shards (seeds 42..45) into shard0..shard3/ on the
          # runner's 4 cores, then wait. Each shard uses --resume to continue
          # from the checked-out results.jsonl, and a 55-minute box (timeout
          # 3300) hands off to the next pass under the 70-min job cap. $CHARTS is
          # intentionally unquoted so the shell expands the glob.
          # 120 candidates/shard x 4 shards = ~480 candidates/cell accumulated
          # over chained rounds.
          CELL="sweep_regime_out_grid/${{ matrix.feed }}__${{ matrix.regime }}"
          for N in 0 1 2 3; do
            timeout 3300 python tools/sweep_self_limit.py \
              --signals "$FEED" \
              --charts $CHARTS \
              --seed $((42 + N)) \
              --max-candidates 120 \
              --output-dir "${CELL}/shard${N}" \
              --max-concurrent-dd-pct 40 \
              --validate-months 2 \
              --top-n 20 \
              --progress-every 20 \
              --resume &
          done
          wait
          echo "shards complete for ${CELL}:"
          for N in 0 1 2 3; do
            f="${CELL}/shard${N}/results.jsonl"
            n=0; [ -f "$f" ] && n=$(wc -l < "$f")
            echo "  shard${N}: ${n} lines"
          done

      - name: Upload cell results (all 4 shards)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: res-${{ matrix.feed }}__${{ matrix.regime }}
          path: sweep_regime_out_grid/${{ matrix.feed }}__${{ matrix.regime }}/**/results.jsonl
          if-no-files-found: ignore
          retention-days: 1

  aggregate:
    needs: cell
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/regime-adaptive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all cell artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts
          pattern: res-*
          merge-multiple: false

      - name: Copy artifacts into the cell shard tree
        run: |
          # download-artifact@v4 lays each artifact down at _artifacts/res-<cell>/.
          # upload-artifact@v4 roots the artifact at the LEAST-COMMON-ANCESTOR of
          # the matched files, so with 4 shards the artifact's internal layout is
          #   shard<N>/results.jsonl
          # (NOT prefixed with sweep_regime_out_grid/<cell>/). To be robust to
          # either rooting, find every results.jsonl under the artifact and derive
          # the shardN from its immediate parent dir name; the cell comes from the
          # artifact dir name (res-<feed>__<regime>). Each file is the FULL
          # cumulative result, so overwrite-copy it back into the working tree at
          # sweep_regime_out_grid/<cell>/shard<N>/.
          shopt -s nullglob globstar
          for art in _artifacts/res-*/; do
            base=$(basename "$art")          # res-<feed>__<regime>
            cell=${base#res-}                # <feed>__<regime>
            for src in "$art"**/results.jsonl; do
              [ -f "$src" ] || continue
              shard=$(basename "$(dirname "$src")")   # shardN
              case "$shard" in
                shard[0-9]*) : ;;                     # expected shard dir
                *) echo "skip unexpected ${src} (parent=${shard})"; continue ;;
              esac
              dst="sweep_regime_out_grid/${cell}/${shard}"
              mkdir -p "$dst"
              cp -f "$src" "${dst}/results.jsonl"
              echo "copied ${src} -> ${dst}/results.jsonl ($(wc -l < "${dst}/results.jsonl") lines)"
            done
          done

      - name: Author identity for checkpoint commits
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"

      - name: Write per-regime BEST + CLI snapshots + LEADERBOARD (ranked across feeds)
        run: |
          python - <<'PY'
          import json, pathlib
          OUT = pathlib.Path("sweep_regime_out_grid")
          FEEDS = ["adA_base", "adB_tightSL", "adC_wideSL", "adD_closeTP",
                   "adE_farTP", "adF_tightSL_closeTP", "adG_wideSL_farTP", "pullback"]
          REGIMES = ["R1quiet", "R2bull", "R3strong", "R4parab"]
          DD_GATE = 40.0

          def feed_signals(feed):
              if feed == "pullback":
                  return "generated/adaptive_self_m15_trend_pullback.txt"
              return f"generated/adaptive_{feed}.txt"

          def load_cell(feed, regime):
              """All result rows for one (feed,regime) cell, tagged with feed."""
              rows = []
              for shard in range(4):
                  f = OUT / f"{feed}__{regime}" / f"shard{shard}" / "results.jsonl"
                  if not f.exists():
                      continue
                  for line in f.read_text().splitlines():
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          r = json.loads(line)
                      except json.JSONDecodeError:
                          continue
                      r["_feed"] = feed
                      rows.append(r)
              return rows

          def load_regime(regime):
              """Every feed's rows for one regime, each tagged with its feed."""
              rows = []
              for feed in FEEDS:
                  rows.extend(load_cell(feed, regime))
              return rows

          def dd(r):
              return r.get("concurrent_risk_max_dd_pct")

          def keyfn(r):
              # Rank by OOS (held-out tail) then edge, both higher-is-better.
              return (
                  r.get("oos_fixed_no_bonus_profit") or 0.0,
                  r.get("fixed_no_bonus_profit") or 0.0,
              )

          def render_cli(cfg, *, regime, feed):
              # Mirror the 2021 orchestrator's renderer when importable so the
              # winning CLI is a runnable backtest_explicit command; otherwise
              # fall back to dumping the config dict (per the workflow contract).
              signals = feed_signals(feed)
              try:
                  import sys
                  sys.path.insert(0, ".")
                  from sweep2021 import orchestrate as o  # noqa
                  args = o.baseline_explicit_args(
                      cfg, signals=signals,
                      output_dir=f"reports/BEST_{regime}_{feed}")
                  cont = " \\\n  "
                  return "python tools/backtest_explicit.py" + cont + cont.join(str(a) for a in args) + "\n"
              except Exception as exc:  # pragma: no cover - renderer is optional
                  return ("# CLI renderer unavailable (%s); best config dict:\n"
                          "# feed=%s signals=%s\n%s\n"
                          % (exc, feed, signals, json.dumps(cfg, indent=2, sort_keys=True)))

          leaderboard = ["# feed x regime adaptive grid — best (feed,config) per regime",
                         f"# DD gate <= {DD_GATE:.0f}%, ranked by OOS then edge", ""]

          for regime in REGIMES:
              rows = load_regime(regime)
              survivors = [r for r in rows
                           if dd(r) is not None and dd(r) <= DD_GATE]
              survivors.sort(key=keyfn, reverse=True)

              best_path = OUT / f"BEST_{regime}.txt"
              lines = [
                  f"# regime {regime}: top DD<={DD_GATE:.0f}% candidates across "
                  f"ALL feeds, by OOS then edge "
                  f"({len(survivors)}/{len(rows)} pass DD gate)",
                  "",
              ]
              for i, r in enumerate(survivors[:15], 1):
                  lines.append(
                      f"{i:>2}. feed={r.get('_feed')} "
                      f"oos={r.get('oos_fixed_no_bonus_profit')} "
                      f"edge={r.get('fixed_no_bonus_profit')} "
                      f"dd={r.get('concurrent_risk_max_dd_pct')}% "
                      f"stable={r.get('stable_fraction')} "
                      f"cfg={r.get('config_json')}")
              best_path.write_text("\n".join(lines) + "\n")
              print(f"{regime}: wrote {best_path} ({len(survivors)} survivors)")

              cli_path = OUT / f"self_cli_best_{regime}.txt"
              if survivors:
                  top = survivors[0]
                  best_cfg = top.get("config") or {}
                  best_feed = top.get("_feed")
                  header = (
                      f"# best {regime} config: feed={best_feed} "
                      f"oos={top.get('oos_fixed_no_bonus_profit')} "
                      f"edge={top.get('fixed_no_bonus_profit')} "
                      f"dd={top.get('concurrent_risk_max_dd_pct')}%\n\n")
                  cli_path.write_text(header + render_cli(best_cfg, regime=regime, feed=best_feed))
                  leaderboard.append(
                      f"{regime}: feed={best_feed} "
                      f"edge={top.get('fixed_no_bonus_profit')} "
                      f"oos={top.get('oos_fixed_no_bonus_profit')} "
                      f"dd={top.get('concurrent_risk_max_dd_pct')}% "
                      f"cfg={top.get('config_json')}")
              else:
                  cli_path.write_text(
                      f"# regime {regime}: no DD<={DD_GATE:.0f}% survivor yet\n")
                  leaderboard.append(f"{regime}: no DD<={DD_GATE:.0f}% survivor yet")
              print(f"{regime}: wrote {cli_path}")

          (OUT / "LEADERBOARD.txt").write_text("\n".join(leaderboard) + "\n")
          print("wrote LEADERBOARD.txt")
          PY

      - name: Mark cells DONE (all 4 shards have >= 120 lines)
        run: |
          FEEDS="adA_base adB_tightSL adC_wideSL adD_closeTP adE_farTP adF_tightSL_closeTP adG_wideSL_farTP pullback"
          REGIMES="R1quiet R2bull R3strong R4parab"
          for feed in $FEEDS; do
            for regime in $REGIMES; do
              cell="sweep_regime_out_grid/${feed}__${regime}"
              ok=1
              for shard in 0 1 2 3; do
                f="${cell}/shard${shard}/results.jsonl"
                n=0
                [ -f "$f" ] && n=$(wc -l < "$f")
                if [ "$n" -lt 120 ]; then ok=0; fi
              done
              if [ "$ok" -eq 1 ]; then
                touch "${cell}/DONE"
                echo "cell ${feed}__${regime}: all 4 shards >= 120 lines — marked DONE"
              fi
            done
          done

      - name: Commit + push to research branch (sole writer — no collision)
        run: |
          # sweep_regime_out_grid/ is force-added; the snapshots/feeds are tracked.
          git add -f sweep_regime_out_grid 2>/dev/null || true
          git add -A generated 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -q -m "ci: self-regime-grid aggregate checkpoint"
            for i in 1 2 3 4; do
              if git push -q origin HEAD:research/regime-adaptive; then
                echo "push: ok"; break
              fi
              echo "push: retry ${i}"
              git pull --rebase -q origin research/regime-adaptive || true
              sleep $((2 ** i))
            done
          fi

      - name: Chain the next pass, or disable when finished
        if: always()
        run: |
          done=$(ls -d sweep_regime_out_grid/*/DONE 2>/dev/null | wc -l)
          echo "cells DONE after this pass: ${done}/32"
          if [ "${done}" -ge 32 ]; then
            echo "All 32 cells done — disabling this workflow."
            gh workflow disable self-regime-grid.yml --repo "${{ github.repository }}" || true
          else
            echo "Work remains — dispatching the next pass."
            gh workflow run self-regime-grid.yml --ref main --repo "${{ github.repository }}" || true
          fi
