name: tick-sweep-trailing-aggressive

# AGGRESSIVE follow-up to tick-sweep-trailing-realdd (which found TOC5 =
# open0.5/close0.5/trail-after-TP1 @ net $115,568 / REAL tick DD 23.5%).
#
# GOAL: beat TOC5 on BOTH axes -- higher net AND lower drawdown. We hold the
# C160 feed + entry geometry fixed and sweep the PROTECTION levers that move
# drawdown, across 4 coherent modes plus the continuous DD knobs:
#
#   mode (protection style):
#     toc5      - tp_levels: lock to TP1 (after delay), trail after TP1   [incumbent]
#     bep_half  - bep_plus_half_tp1: EARLY break-even at +3 (buffer +0.5),
#                 half-TP1 lock, trail after TP1                          (your "BEP + trail")
#     scaleout  - close the worst leg at TP1 + move the rest to BE (+0.5),
#                 trail after TP1                                          (your "close half at TP1")
#     trail_tp2 - lock TP1 at TP1, lock-to-TP1 at TP2, trail only AFTER TP2 (your "trail after TP2")
#   tc  (trailing-close distance) : {0.5, 1.0}
#   dly (tp1/tp2 lock delay, min)  : {0, 24}   -- lock SOONER (0) vs TOC5's 24
#   slm (sl-multiplier)            : {1.8, 2.1} -- TIGHTER stop (1.8) vs TOC5's 2.1
#   -> 4 x 2 x 2 x 2 = 32 cells. trailing-open fixed 0.5 (broker min-stop floor).
#
# Scored on REAL tick DD via backtest_hybrid --score-json (June 2026 ELEV8
# ticks, real Mt5Executor, M1 fallback). Ranked by net at DD <= max_dd, and
# every cell that beats TOC5 on BOTH net (>115568) AND DD (<23.5%) is flagged.
#
# ELEV8 != your live/demo broker; a winner here is RESEARCH until demo-validated.

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Backtest/feed start (chart-feed date)"
        default: "2026-06-01"
      max_dd:
        description: "Max REAL tick drawdown %% allowed in the ranking"
        default: "40"

permissions:
  contents: write

concurrency:
  group: tick-sweep-trailing-aggressive
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sweep:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        mode: ["toc5", "bep_half", "scaleout", "trail_tp2"]
        tc: ["0.5", "1.0"]
        dly: ["0", "24"]
        slm: ["1.8", "2.1"]
    runs-on: ubuntu-latest
    timeout-minutes: 220
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (C160 filter, R4 2026)
        run: |
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --output feed.txt --start "${START}" \
            --session-start 0 --session-end 0 --signal-tz 7 \
            --rsi-buy-max 70 --rsi-sell-min 30 --bb-bandwidth-min 0.0006 \
            --rr1 1.2 --rr2 2.5 --rr3 5
        env:
          START: ${{ github.event.inputs.start_date }}
      - name: Hybrid tick backtest cell mode=${{ matrix.mode }} tc=${{ matrix.tc }} dly=${{ matrix.dly }} slm=${{ matrix.slm }}
        run: |
          set -o pipefail
          # Mode -> protection flag set. The continuous levers (tc/dly/slm) and
          # the C160 geometry are applied uniformly below.
          # NOTE: --bep-trigger-distance and --tp1-lock-fraction are REQUIRED by the
          # backtest parser on every run (inert in modes that don't use them), so
          # every MODE_FLAGS sets both.
          case "${mode}" in
            toc5)
              MODE_FLAGS="--profit-lock-mode tp_levels --lock-after-tp1 true --lock-after-tp2 false --trailing-close-after-stage 1 --tp1-lock-fraction 0.75 --bep-trigger-distance 3.0 --tp2-lock-target TP1 --tp3-lock-target TP2" ;;
            bep_half)
              MODE_FLAGS="--profit-lock-mode bep_plus_half_tp1 --lock-after-tp1 true --lock-after-tp2 false --trailing-close-after-stage 1 --tp1-lock-fraction 0.5 --bep-trigger-distance 3.0 --bep-buffer 0.5 --tp2-lock-target TP1 --tp3-lock-target TP2" ;;
            scaleout)
              MODE_FLAGS="--profit-lock-mode tp_levels --lock-after-tp1 true --lock-after-tp2 false --scale-out-at-tp1 true --bep-after-tp1 true --bep-buffer 0.5 --trailing-close-after-stage 1 --tp1-lock-fraction 0.75 --bep-trigger-distance 3.0 --tp2-lock-target TP1 --tp3-lock-target TP2" ;;
            trail_tp2)
              MODE_FLAGS="--profit-lock-mode tp_levels --lock-after-tp1 true --lock-after-tp2 true --trailing-close-after-stage 2 --tp1-lock-fraction 0.75 --bep-trigger-distance 3.0 --tp2-lock-target TP1 --tp3-lock-target TP2" ;;
          esac
          CELL="${mode}_tc${tc//./}_dly${dly}_slm${slm//./}"
          mkdir -p out
          timeout 12000 python tools/backtest_hybrid.py \
            --signals feed.txt \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --ticks data/ticks/XAUUSD_TICK_*_ELEV8.csv \
            --sync-charts false --sync-ticks false \
            --watch-seconds 3 --max-drawdown-limit-pct 100 --progress-interval-seconds 0 \
            --initial-capital 50000 --sizing-mode risk \
            --lot 0.01 --risk 0.01 --minimum-lot 0.01 --lot-step 0.01 --bonus-per-closed-lot 3.0 \
            --entries 7 --entry-ladder range_to_sl --entry-sl-gap 0.7 --shared-sl false \
            --activation-delay 2 --pending-expiry 180 --max-hold 300 \
            --sl-multiplier ${slm} --final-target TP3 --runner-after-tp3 false \
            --tp1-lock-delay-minutes ${dly} --tp2-lock-delay-minutes ${dly} \
            ${MODE_FLAGS} \
            --trailing-open-distance 0.5 --trailing-close-distance ${tc} \
            --lock-tp1-exit-slippage 2.0 --lock-tp2-exit-slippage 1.0 \
            --output-dir "reports/${CELL}" --score-json "out/${CELL}.json"
          python - "out/${CELL}.json" "$CELL" "$mode" "$tc" "$dly" "$slm" <<'PY'
          import json, sys
          p, cell, mode, tc, dly, slm = sys.argv[1:7]
          d = json.load(open(p))
          d.update(cell=cell, mode=mode, trailing_close=float(tc),
                   lock_delay=int(dly), sl_multiplier=float(slm),
                   trailing_open=0.5)
          open(p, "w").write(json.dumps(d))
          print(d)
          PY
        env:
          mode: ${{ matrix.mode }}
          tc: ${{ matrix.tc }}
          dly: ${{ matrix.dly }}
          slm: ${{ matrix.slm }}
      - uses: actions/upload-artifact@v4
        with:
          name: "aggr-${{ matrix.mode }}-${{ matrix.tc }}-${{ matrix.dly }}-${{ matrix.slm }}"
          path: "out/*.json"
          if-no-files-found: error

  aggregate:
    needs: sweep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - uses: actions/download-artifact@v4
        with: { path: cells }
      - name: Build leaderboard (beat TOC5 on net AND DD)
        env:
          MAX_DD: ${{ github.event.inputs.max_dd }}
        run: |
          python - <<'PY'
          import glob, json, csv, os
          max_dd = float(os.environ.get("MAX_DD", "40") or 40)
          TOC5_NET, TOC5_DD = 115567.87, 23.51   # the incumbent to beat
          rows = []
          for f in glob.glob("cells/**/*.json", recursive=True):
              try: rows.append(json.load(open(f)))
              except Exception as e: print("skip", f, e)
          for r in rows:
              dd = abs(float(r.get("max_drawdown_pct", 999)))
              net = float(r.get("net_profit", -1e18))
              r["passes_dd"] = dd <= max_dd
              r["beats_toc5"] = (net > TOC5_NET and dd < TOC5_DD)
          rows.sort(key=lambda r: (r.get("passes_dd", False), r.get("net_profit", -1e18)), reverse=True)
          os.makedirs("sweep_reports/tick_trailing_aggressive", exist_ok=True)
          cols = ["cell","mode","trailing_open","trailing_close","lock_delay","sl_multiplier",
                  "net_profit","max_drawdown_pct","passes_dd","beats_toc5","win_rate_pct",
                  "signals_included","tick_signals","m1_signals"]
          out = "sweep_reports/tick_trailing_aggressive/leaderboard.csv"
          with open(out, "w", newline="") as fh:
              w = csv.writer(fh); w.writerow(["rank"]+cols)
              for i, r in enumerate(rows, 1):
                  w.writerow([i]+[r.get(c, "") for c in cols])
          print(open(out).read())
          passing = [r for r in rows if r.get("passes_dd")]
          best = passing[0] if passing else None
          pareto = [r for r in rows if r.get("beats_toc5")]
          pareto.sort(key=lambda r: r.get("net_profit", 0), reverse=True)
          with open("sweep_reports/tick_trailing_aggressive/README.md", "w") as fh:
              fh.write("# Aggressive trailing TICK sweep -- beat TOC5 on net AND DD\n\n")
              fh.write(f"{len(rows)} cells on committed June ELEV8 ticks, scored by "
                       f"backtest_hybrid (REAL compounding-equity DD). Incumbent **TOC5** = "
                       f"open0.5/close0.5/trail-after-TP1: net ${TOC5_NET:,.0f}, DD {TOC5_DD:g}%.\n\n")
              if best:
                  fh.write(f"**Best net at DD<={max_dd:g}%:** `{best['cell']}` (mode {best['mode']}) "
                           f"-- net ${best['net_profit']:,.0f}, DD {abs(best['max_drawdown_pct']):g}%, "
                           f"win {best.get('win_rate_pct')}%.\n\n")
              if pareto:
                  fh.write(f"### {len(pareto)} cell(s) BEAT TOC5 on BOTH net AND DD:\n\n")
                  for r in pareto[:10]:
                      fh.write(f"- `{r['cell']}` (mode {r['mode']}): net ${r['net_profit']:,.0f} "
                               f"(> {TOC5_NET:,.0f}), DD {abs(r['max_drawdown_pct']):g}% (< {TOC5_DD:g}%), "
                               f"win {r.get('win_rate_pct')}%\n")
              else:
                  fh.write("### No cell beat TOC5 on BOTH axes. TOC5 stays the trailing champion.\n")
              fh.write("\nModes: toc5 (lock TP1+trail), bep_half (early BE +3 then half-TP1 + trail), "
                       "scaleout (close worst leg at TP1 + BE rest + trail), trail_tp2 (trail only after TP2). "
                       "ELEV8 != demo -- forward-validate before deploying.\n")
          PY
      - name: Commit leaderboard
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"
          git add sweep_reports/tick_trailing_aggressive
          git commit -m "tick-sweep: aggressive trailing leaderboard (beat TOC5 on net AND DD)" || echo "nothing to commit"
          git push || echo "push failed"
      - uses: actions/upload-artifact@v4
        with: { name: "tick-trailing-aggressive-leaderboard", path: "sweep_reports/tick_trailing_aggressive/**", if-no-files-found: warn }
