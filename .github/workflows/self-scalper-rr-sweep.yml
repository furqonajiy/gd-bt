name: self-scalper-rr-sweep

# SELF-SCALPER (SC24) SIGNAL-R:R sweep across regimes, sequentially R4 -> R3
# -> R2 in ONE run (chained by job `needs:`, same rock-solid ordering as the
# entry-feature sweep). For each regime, for each R:R VARIANT we regenerate the
# *unfiltered* scalper24 feed with that variant's --rr1/--rr2/--rr3 (the TP1/TP2/
# TP3 distances as multiples of the posted risk), then sweep the full strategy/
# geometry grid over it (tools/sweep_self_limit.py, slippage-aware 2.0/1.0). The
# per-regime aggregate keeps a variant only if it beats the incumbent R:R 'base'
# (1.0/1.5/2.0) on BOTH edge AND OOS at DD<=40% -- the identical bar the entry-
# feature sweep used (shared .github/scripts/agg_entry_feature.sh, prefix selfrr).
#
# WHY: the generator sizes TP1/TP2/TP3 off the *posted* risk, but the strategy
# widens the stop by sl_multiplier (2.1-2.3x), so even TP3 lands near 1:0.9 of the
# *effective* risk and LOCK_TP1 exits show ~1:0.2 realised R:R. A 2026-06 probe
# (rsi feed, e5/slm2.3/h90/d20, $50k) found that *widening* the targets fixes the
# per-trade R:R (payoff 0.74 -> 1.11) but HALVES net ($21.3k -> 12.6k) and raises
# DD (21.6% -> 34%): far fewer trades reach the distant TP3 and the win rate
# craters (61% -> 51%). The low R:R is the high-win-rate scalper's engine, not a
# defect. This sweep confirms that per regime and finds any genuine sweet spot --
# isolated on the base feed (no entry filter) so the R:R effect is clean; the
# winning entry filter and winning R:R can be combined afterward.
#
# Artifact-only (no branch writes). Mirrors self-scalper-entry-feature-sweep.yml.

on:
  workflow_dispatch:
    inputs:
      max_candidates:
        description: "candidates per shard"
        default: "150"

permissions:
  contents: read

concurrency:
  group: self-scalper-rr-sweep
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---------------- R4 (2026) ----------------
  r4:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { v: base,        gen: "" }                                  # 1.0/1.5/2.0 (incumbent)
          - { v: rr10x15x25,  gen: "--rr1 1.0 --rr2 1.5 --rr3 2.5" }
          - { v: rr10x20x30,  gen: "--rr1 1.0 --rr2 2.0 --rr3 3.0" }
          - { v: rr10x20x40,  gen: "--rr1 1.0 --rr2 2.0 --rr3 4.0" }
          - { v: rr08x15x30,  gen: "--rr1 0.8 --rr2 1.5 --rr3 3.0" }     # cheap TP1 lock, far runner
          - { v: rr15x25x40,  gen: "--rr1 1.5 --rr2 2.5 --rr3 4.0" }     # the existing "wide" variant
          - { v: rr20x30x45,  gen: "--rr1 2.0 --rr2 3.0 --rr3 4.5" }
          - { v: rr23x35x46,  gen: "--rr1 2.3 --rr2 3.5 --rr3 4.6" }     # scaled to slm ~2.3 (true 1:1/1.5/2)
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (R4 2026) R:R variant ${{ matrix.v }}
        run: |
          set -euo pipefail
          python tools/generate_scalper_signals.py --charts "data/XAUUSD_M1_2026"*"_ELEV8.csv" \
            --output feed.txt --start 2026-01-01 --session-start 0 --session-end 0 --signal-tz 7 ${{ matrix.gen }}
          echo "R4 ${{ matrix.v }} feed lines: $(wc -l < feed.txt)"
      - name: Sweep 4 shards
        run: |
          set -uo pipefail
          MC="${{ github.event.inputs.max_candidates }}"; MC="${MC:-150}"
          for N in 0 1 2 3; do
            timeout 18000 python tools/sweep_self_limit.py --signals feed.txt \
              --charts "data/XAUUSD_M1_2026"*"_ELEV8.csv" --seed $((42 + N)) --max-candidates "$MC" \
              --output-dir "out/${{ matrix.v }}_shard${N}" --validate-months 2 \
              --max-concurrent-dd-pct 40 --fixed-lot 0.01 --resume &
          done; wait
      - uses: actions/upload-artifact@v4
        with: { name: "selfrr-R4-${{ matrix.v }}", path: "out/**/results.jsonl", if-no-files-found: error }
  r4_agg:
    needs: r4
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with: { pattern: "selfrr-R4-*", path: _artifacts }
      - name: Aggregate R4 R:R variants + winner-vs-base
        run: bash .github/scripts/agg_entry_feature.sh R4 selfrr
      - uses: actions/upload-artifact@v4
        with: { name: "self-rr-R4-results", path: "results/**", if-no-files-found: warn }

  # ---------------- R3 (2025) -- waits for R4 ----------------
  r3:
    needs: r4_agg
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { v: base,        gen: "" }
          - { v: rr10x15x25,  gen: "--rr1 1.0 --rr2 1.5 --rr3 2.5" }
          - { v: rr10x20x30,  gen: "--rr1 1.0 --rr2 2.0 --rr3 3.0" }
          - { v: rr10x20x40,  gen: "--rr1 1.0 --rr2 2.0 --rr3 4.0" }
          - { v: rr08x15x30,  gen: "--rr1 0.8 --rr2 1.5 --rr3 3.0" }
          - { v: rr15x25x40,  gen: "--rr1 1.5 --rr2 2.5 --rr3 4.0" }
          - { v: rr20x30x45,  gen: "--rr1 2.0 --rr2 3.0 --rr3 4.5" }
          - { v: rr23x35x46,  gen: "--rr1 2.3 --rr2 3.5 --rr3 4.6" }
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (R3 2025) R:R variant ${{ matrix.v }}
        run: |
          set -euo pipefail
          python tools/generate_scalper_signals.py --charts "data/XAUUSD_M1_2025"*"_ELEV8.csv" \
            --output feed.txt --start 2025-01-01 --session-start 0 --session-end 0 --signal-tz 7 ${{ matrix.gen }}
          echo "R3 ${{ matrix.v }} feed lines: $(wc -l < feed.txt)"
      - name: Sweep 4 shards
        run: |
          set -uo pipefail
          MC="${{ github.event.inputs.max_candidates }}"; MC="${MC:-150}"
          for N in 0 1 2 3; do
            timeout 18000 python tools/sweep_self_limit.py --signals feed.txt \
              --charts "data/XAUUSD_M1_2025"*"_ELEV8.csv" --seed $((42 + N)) --max-candidates "$MC" \
              --output-dir "out/${{ matrix.v }}_shard${N}" --validate-months 2 \
              --max-concurrent-dd-pct 40 --fixed-lot 0.01 --resume &
          done; wait
      - uses: actions/upload-artifact@v4
        with: { name: "selfrr-R3-${{ matrix.v }}", path: "out/**/results.jsonl", if-no-files-found: error }
  r3_agg:
    needs: r3
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with: { pattern: "selfrr-R3-*", path: _artifacts }
      - name: Aggregate R3 R:R variants + winner-vs-base
        run: bash .github/scripts/agg_entry_feature.sh R3 selfrr
      - uses: actions/upload-artifact@v4
        with: { name: "self-rr-R3-results", path: "results/**", if-no-files-found: warn }

  # ---------------- R2 (2023-10..2024) -- waits for R3 ----------------
  r2:
    needs: r3_agg
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { v: base,        gen: "" }
          - { v: rr10x15x25,  gen: "--rr1 1.0 --rr2 1.5 --rr3 2.5" }
          - { v: rr10x20x30,  gen: "--rr1 1.0 --rr2 2.0 --rr3 3.0" }
          - { v: rr10x20x40,  gen: "--rr1 1.0 --rr2 2.0 --rr3 4.0" }
          - { v: rr08x15x30,  gen: "--rr1 0.8 --rr2 1.5 --rr3 3.0" }
          - { v: rr15x25x40,  gen: "--rr1 1.5 --rr2 2.5 --rr3 4.0" }
          - { v: rr20x30x45,  gen: "--rr1 2.0 --rr2 3.0 --rr3 4.5" }
          - { v: rr23x35x46,  gen: "--rr1 2.3 --rr2 3.5 --rr3 4.6" }
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (R2 2023-10..2024) R:R variant ${{ matrix.v }}
        run: |
          set -euo pipefail
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_202310_ELEV8.csv data/XAUUSD_M1_202311_ELEV8.csv \
                     data/XAUUSD_M1_202312_ELEV8.csv data/XAUUSD_M1_2024*_ELEV8.csv \
            --output feed.txt --start 2023-10-01 --session-start 0 --session-end 0 --signal-tz 7 ${{ matrix.gen }}
          echo "R2 ${{ matrix.v }} feed lines: $(wc -l < feed.txt)"
      - name: Sweep 4 shards
        run: |
          set -uo pipefail
          MC="${{ github.event.inputs.max_candidates }}"; MC="${MC:-150}"
          CHARTS="data/XAUUSD_M1_202310_ELEV8.csv data/XAUUSD_M1_202311_ELEV8.csv data/XAUUSD_M1_202312_ELEV8.csv data/XAUUSD_M1_2024*_ELEV8.csv"
          for N in 0 1 2 3; do
            timeout 18000 python tools/sweep_self_limit.py --signals feed.txt \
              --charts $CHARTS --seed $((42 + N)) --max-candidates "$MC" \
              --output-dir "out/${{ matrix.v }}_shard${N}" --validate-months 2 \
              --max-concurrent-dd-pct 40 --fixed-lot 0.01 --resume &
          done; wait
      - uses: actions/upload-artifact@v4
        with: { name: "selfrr-R2-${{ matrix.v }}", path: "out/**/results.jsonl", if-no-files-found: error }
  r2_agg:
    needs: r2
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with: { pattern: "selfrr-R2-*", path: _artifacts }
      - name: Aggregate R2 R:R variants + winner-vs-base
        run: bash .github/scripts/agg_entry_feature.sh R2 selfrr
      - uses: actions/upload-artifact@v4
        with: { name: "self-rr-R2-results", path: "results/**", if-no-files-found: warn }
