    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with: { pattern: "selffeat-R2-*", path: _artifacts }
      - name: Aggregate R2 variants + winner-vs-base
        run: bash .github/scripts/agg_entry_feature.sh R2
      - uses: actions/upload-artifact@v4
        with: { name: "self-feature-R2-results", path: "results/**", if-no-files-found: warn }
