name: self-scalper-entry-feature-sweep

# SELF-SCALPER (SC24) ENTRY-FEATURE sweep across regimes, sequentially R4 -> R3
# -> R2 in ONE run (chained by job `needs:`, the rock-solid ordering -- NOT
# multi-hop workflow_run). For each regime, for each entry-feature VARIANT we
# regenerate the scalper24 feed with that variant's generator filter flags, then
# sweep the full strategy/geometry grid over it (tools/sweep_self_limit.py,
# slippage-aware 2.0/1.0). The per-regime aggregate keeps a variant only if it
# beats the unfiltered 'base' feed on BOTH edge AND OOS at DD<=40% -- the same
# bar the R4 entry-feature sweep used. Artifact-only (no branch writes).
#
# This is the multi-regime generalisation of r4-entry-feature-sweep.yml. It also
# re-sweeps geometry per regime, so R2/R3 (whose e8 champion breached the DD gate
# at faithful $50k sizing) get a fresh DD<=40% candidate search.

on:
  workflow_dispatch:
    inputs:
      max_candidates:
        description: "candidates per shard"
        default: "150"

permissions:
  contents: read

concurrency:
  group: self-scalper-entry-feature-sweep
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---------------- R4 (2026) ----------------
  r4:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { v: base,       gen: "" }
          - { v: adx12,      gen: "--adx-min 12" }
          - { v: adx18,      gen: "--adx-min 18" }
          - { v: adx25,      gen: "--adx-min 25" }
          - { v: rsi,        gen: "--rsi-buy-max 70 --rsi-sell-min 30" }
          - { v: pctb,       gen: "--bb-buy-pctb-max 0.80 --bb-sell-pctb-min 0.20" }
          - { v: bbsqueeze,  gen: "--bb-bandwidth-min 0.0006" }
          - { v: vwap,       gen: "--vwap-filter" }
          - { v: htf15,      gen: "--htf-filter --htf-minutes 15" }
          - { v: htf60,      gen: "--htf-filter --htf-minutes 60" }
          - { v: sr,         gen: "--sr-proximity-atr 0.5 --sr-round-step 10" }
          - { v: adx12rsi,   gen: "--adx-min 12 --rsi-buy-max 70 --rsi-sell-min 30" }
          - { v: adx12htf,   gen: "--adx-min 12 --htf-filter" }
          - { v: adx12pctb,  gen: "--adx-min 12 --bb-buy-pctb-max 0.85 --bb-sell-pctb-min 0.15" }
          - { v: combo,      gen: "--adx-min 12 --htf-filter --bb-buy-pctb-max 0.85 --bb-sell-pctb-min 0.15" }
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (R4 2026) variant ${{ matrix.v }}
        run: |
          set -euo pipefail
          python tools/generate_scalper_signals.py --charts "data/XAUUSD_M1_2026"*"_ELEV8.csv" \
            --output feed.txt --start 2026-01-01 --session-start 0 --session-end 0 --signal-tz 7 ${{ matrix.gen }}
          echo "R4 ${{ matrix.v }} feed lines: $(wc -l < feed.txt)"
      - name: Sweep 4 shards
        run: |
          set -uo pipefail
          MC="${{ github.event.inputs.max_candidates }}"; MC="${MC:-150}"
          for N in 0 1 2 3; do
            timeout 18000 python tools/sweep_self_limit.py --signals feed.txt \
              --charts "data/XAUUSD_M1_2026"*"_ELEV8.csv" --seed $((42 + N)) --max-candidates "$MC" \
              --output-dir "out/${{ matrix.v }}_shard${N}" --validate-months 2 \
              --max-concurrent-dd-pct 40 --fixed-lot 0.01 --resume &
          done; wait
      - uses: actions/upload-artifact@v4
        with: { name: "selffeat-R4-${{ matrix.v }}", path: "out/**/results.jsonl", if-no-files-found: error }
  r4_agg:
    needs: r4
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with: { pattern: "selffeat-R4-*", path: _artifacts }
      - name: Aggregate R4 variants + winner-vs-base
        run: bash .github/scripts/agg_entry_feature.sh R4
      - uses: actions/upload-artifact@v4
        with: { name: "self-feature-R4-results", path: "results/**", if-no-files-found: warn }

  # ---------------- R3 (2025) -- waits for R4 to finish ----------------
  r3:
    needs: r4_agg
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { v: base,       gen: "" }
          - { v: adx12,      gen: "--adx-min 12" }
          - { v: adx18,      gen: "--adx-min 18" }
          - { v: adx25,      gen: "--adx-min 25" }
          - { v: rsi,        gen: "--rsi-buy-max 70 --rsi-sell-min 30" }
          - { v: pctb,       gen: "--bb-buy-pctb-max 0.80 --bb-sell-pctb-min 0.20" }
          - { v: bbsqueeze,  gen: "--bb-bandwidth-min 0.0006" }
          - { v: vwap,       gen: "--vwap-filter" }
          - { v: htf15,      gen: "--htf-filter --htf-minutes 15" }
          - { v: htf60,      gen: "--htf-filter --htf-minutes 60" }
          - { v: sr,         gen: "--sr-proximity-atr 0.5 --sr-round-step 10" }
          - { v: adx12rsi,   gen: "--adx-min 12 --rsi-buy-max 70 --rsi-sell-min 30" }
          - { v: adx12htf,   gen: "--adx-min 12 --htf-filter" }
          - { v: adx12pctb,  gen: "--adx-min 12 --bb-buy-pctb-max 0.85 --bb-sell-pctb-min 0.15" }
          - { v: combo,      gen: "--adx-min 12 --htf-filter --bb-buy-pctb-max 0.85 --bb-sell-pctb-min 0.15" }
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (R3 2025) variant ${{ matrix.v }}
        run: |
          set -euo pipefail
          python tools/generate_scalper_signals.py --charts "data/XAUUSD_M1_2025"*"_ELEV8.csv" \
            --output feed.txt --start 2025-01-01 --session-start 0 --session-end 0 --signal-tz 7 ${{ matrix.gen }}
          echo "R3 ${{ matrix.v }} feed lines: $(wc -l < feed.txt)"
      - name: Sweep 4 shards
        run: |
          set -uo pipefail
          MC="${{ github.event.inputs.max_candidates }}"; MC="${MC:-150}"
          for N in 0 1 2 3; do
            timeout 18000 python tools/sweep_self_limit.py --signals feed.txt \
              --charts "data/XAUUSD_M1_2025"*"_ELEV8.csv" --seed $((42 + N)) --max-candidates "$MC" \
              --output-dir "out/${{ matrix.v }}_shard${N}" --validate-months 2 \
              --max-concurrent-dd-pct 40 --fixed-lot 0.01 --resume &
          done; wait
      - uses: actions/upload-artifact@v4
        with: { name: "selffeat-R3-${{ matrix.v }}", path: "out/**/results.jsonl", if-no-files-found: error }
  r3_agg:
    needs: r3
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with: { pattern: "selffeat-R3-*", path: _artifacts }
      - name: Aggregate R3 variants + winner-vs-base
        run: bash .github/scripts/agg_entry_feature.sh R3
      - uses: actions/upload-artifact@v4
        with: { name: "self-feature-R3-results", path: "results/**", if-no-files-found: warn }

  # ---------------- R2 (2023-10..2024) -- waits for R3 ----------------
  r2:
    needs: r3_agg
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { v: base,       gen: "" }
          - { v: adx12,      gen: "--adx-min 12" }
          - { v: adx18,      gen: "--adx-min 18" }
          - { v: adx25,      gen: "--adx-min 25" }
          - { v: rsi,        gen: "--rsi-buy-max 70 --rsi-sell-min 30" }
          - { v: pctb,       gen: "--bb-buy-pctb-max 0.80 --bb-sell-pctb-min 0.20" }
          - { v: bbsqueeze,  gen: "--bb-bandwidth-min 0.0006" }
          - { v: vwap,       gen: "--vwap-filter" }
          - { v: htf15,      gen: "--htf-filter --htf-minutes 15" }
          - { v: htf60,      gen: "--htf-filter --htf-minutes 60" }
          - { v: sr,         gen: "--sr-proximity-atr 0.5 --sr-round-step 10" }
          - { v: adx12rsi,   gen: "--adx-min 12 --rsi-buy-max 70 --rsi-sell-min 30" }
          - { v: adx12htf,   gen: "--adx-min 12 --htf-filter" }
          - { v: adx12pctb,  gen: "--adx-min 12 --bb-buy-pctb-max 0.85 --bb-sell-pctb-min 0.15" }
          - { v: combo,      gen: "--adx-min 12 --htf-filter --bb-buy-pctb-max 0.85 --bb-sell-pctb-min 0.15" }
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (R2 2023-10..2024) variant ${{ matrix.v }}
        run: |
          set -euo pipefail
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_202310_ELEV8.csv data/XAUUSD_M1_202311_ELEV8.csv \
                     data/XAUUSD_M1_202312_ELEV8.csv data/XAUUSD_M1_2024*_ELEV8.csv \
            --output feed.txt --start 2023-10-01 --session-start 0 --session-end 0 --signal-tz 7 ${{ matrix.gen }}
          echo "R2 ${{ matrix.v }} feed lines: $(wc -l < feed.txt)"
      - name: Sweep 4 shards
        run: |
          set -uo pipefail
          MC="${{ github.event.inputs.max_candidates }}"; MC="${MC:-150}"
          CHARTS="data/XAUUSD_M1_202310_ELEV8.csv data/XAUUSD_M1_202311_ELEV8.csv data/XAUUSD_M1_202312_ELEV8.csv data/XAUUSD_M1_2024*_ELEV8.csv"
          for N in 0 1 2 3; do
            timeout 18000 python tools/sweep_self_limit.py --signals feed.txt \
              --charts $CHARTS --seed $((42 + N)) --max-candidates "$MC" \
