name: structure-guard-sweep

# Manual (workflow_dispatch) validation of the TSL18/T818 anti-wrong-side-structure
# guard. Runs the test suite, then the targeted base-vs-guarded sweep for June 2026
# (pure TICK) and Jan->Jun 2026 (TICK May-Jun / M1 before), and uploads the
# per-window summary.md + feeds + structure diagnostics as artifacts.
#
# This is NOT a generic RSI/BB/SL/TP/trailing sweep (we already have T818 from that
# family). It scores ONLY T818's wrong-side-structure failure mode -- read the
# SIGNAL-level columns first (max_consecutive_losing_signals /
# max_consecutive_wrong_side_losing_signals); the entry-level streak over-counts
# because TSL18 opens up to 8 entries per signal. Artifact-only, no branch writes,
# nothing promoted to live. See docs/TSL18_STRUCTURE_GUARD.md.
#
# Data: uses the committed ELEV8 M1 charts + tick archive (2026-05..06). A guard
# step fails LOUDLY if those are missing rather than producing empty/fake results.

on:
  workflow_dispatch:
    inputs:
      variants:
        description: "space-separated subset of: base htf_only htf_impulse htf_vwap_score2"
        default: "base htf_only htf_impulse htf_vwap_score2"

permissions:
  contents: read

concurrency:
  group: structure-guard-sweep
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 1440          # operator is OK with up to 24h
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt

      - name: pytest
        run: pytest -q

      - name: Verify required data is present (fail loudly, do not fake)
        run: |
          set -e
          shopt -s nullglob
          charts=(data/XAUUSD_M1_2026{01,02,03,04,05,06}_ELEV8.csv)
          ticks=(data/ticks/XAUUSD_TICK_2026{05,06}_*_ELEV8.csv)
          echo "charts found: ${#charts[@]} ; tick files found: ${#ticks[@]}"
          if [ "${#charts[@]}" -lt 6 ] || [ "${#ticks[@]}" -lt 1 ]; then
            echo "::error::missing M1 charts or 2026-05/06 tick archive -- cannot validate the structure guard on real data"
            exit 1
          fi

      - name: Sweep June 2026 (pure TICK)
        run: |
          python tools/sweep_structure_guard.py --window june \
            --variants ${{ inputs.variants }} \
            --ticks "data/ticks/XAUUSD_TICK_202606_*_ELEV8.csv"

      - name: Sweep Jan->Jun 2026 (TICK May-Jun / M1 before)
        run: |
          python tools/sweep_structure_guard.py --window jan_jun \
            --variants ${{ inputs.variants }} \
            --ticks "data/ticks/XAUUSD_TICK_202605_*_ELEV8.csv" "data/ticks/XAUUSD_TICK_202606_*_ELEV8.csv"

      - name: Show summaries
        if: always()
        run: |
          echo "===== JUNE ====="; cat reports/STRUCTURE_GUARD_june/summary.md || true
          echo "===== JAN_JUN ====="; cat reports/STRUCTURE_GUARD_jan_jun/summary.md || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: structure-guard-june
          path: reports/STRUCTURE_GUARD_june/**
          if-no-files-found: warn
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: structure-guard-jan_jun
          path: reports/STRUCTURE_GUARD_jan_jun/**
          if-no-files-found: warn
