name: tick-sweep-trailing-realdd

# SELF-SCALPER trailing sweep decided on REAL TICK DATA with the REAL drawdown.
#
# SUPERSEDES tick-sweep-trailing-self.yml, which ranked DD with the parse_tick_run
# PROXY (per-signal P&L ordered by signal key, overlapping signals -> ~87-104% for
# every cell, NOT a real account DD). This version scores each cell with
# tools/backtest_hybrid.py --score-json, i.e. run_hybrid_backtest's COMPOUNDING
# equity curve -- the same max_drawdown_pct definition as the M1 backtests and the
# 40% gate. Goal: BIGGEST net P&L with REAL tick DD <= 40%.
#
# All simulation is TICK: committed June 2026 ELEV8 ticks on main
# (data/ticks/XAUUSD_TICK_202606_*_ELEV8.csv), real Mt5Executor per signal, M1
# fallback only where ticks don't cover the lifecycle.
#
# Grid (C160 geometry pinned; the entry/exit levers swept):
#   trailing_open   in {0.0, 0.5, 1.0}   (0 = LIMIT "take the better price"; >=0.5 tradeable past the 0.4 broker min-stop)
#   trailing_close  in {0.0, 0.5, 1.0}
#   after_stage     in {0, 1}            (trail from open vs only after TP1)
#   -> 18 cells. (0,0,*) = plain C160 (no trailing).
#
# Tick fills are broker-driven; ELEV8 != your demo broker, so a winner here is
# RESEARCH until demo/forward-validated.

on:
  workflow_dispatch:
    inputs:
      tp1_lock_delay:
        description: "tp1_lock_delay_minutes pinned on every cell (C160=24)"
        default: "24"
      max_dd:
        description: "Max REAL tick drawdown %% allowed in the ranking"
        default: "40"

permissions:
  contents: write

concurrency:
  group: tick-sweep-trailing-realdd
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sweep:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        to: ["0.0", "0.5", "1.0"]
        tc: ["0.0", "0.5", "1.0"]
        af: ["0", "1"]
    runs-on: ubuntu-latest
    timeout-minutes: 200
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (C160 filter, R4 2026)
        run: |
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --output feed.txt --start 2026-06-01 \
            --session-start 0 --session-end 0 --signal-tz 7 \
            --rsi-buy-max 70 --rsi-sell-min 30 --bb-bandwidth-min 0.0006 \
            --rr1 1.2 --rr2 2.5 --rr3 5
      - name: Hybrid tick backtest cell (REAL DD) to=${{ matrix.to }} tc=${{ matrix.tc }} af=${{ matrix.af }}
        run: |
          set -o pipefail
          CELL="to${to//./}_tc${tc//./}_af${af}"
          mkdir -p out
          timeout 11000 python tools/backtest_hybrid.py \
            --signals feed.txt \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --ticks data/ticks/XAUUSD_TICK_202606_*_ELEV8.csv \
            --sync-charts false --sync-ticks false \
            --watch-seconds 3 --max-drawdown-limit-pct 100 --progress-interval-seconds 0 \
            --initial-capital 50000 --sizing-mode risk \
            --lot 0.01 --risk 0.01 --minimum-lot 0.01 --lot-step 0.01 --bonus-per-closed-lot 3.0 \
            --entries 7 --entry-ladder range_to_sl --entry-sl-gap 0.7 \
            --activation-delay 2 --pending-expiry 180 --max-hold 300 --sl-multiplier 2.1 \
            --final-target TP3 --lock-after-tp1 true --lock-after-tp2 false \
            --tp1-lock-delay-minutes ${TP1_DELAY} --tp2-lock-delay-minutes 2 \
            --profit-lock-mode tp_levels --bep-trigger-distance 3.0 \
            --tp1-lock-fraction 0.75 --tp2-lock-target TP1 \
            --runner-after-tp3 false --tp3-lock-target TP2 \
            --trailing-open-distance ${to} --trailing-close-distance ${tc} \
            --trailing-close-after-stage ${af} \
            --lock-tp1-exit-slippage 2.0 --lock-tp2-exit-slippage 1.0 \
            --output-dir "reports/${CELL}" --score-json "out/${CELL}.json"
          python - "out/${CELL}.json" "$CELL" "$to" "$tc" "$af" "$TP1_DELAY" <<'PY'
          import json, sys
          p, cell, to, tc, af, dly = sys.argv[1:7]
          d = json.load(open(p))
          d.update(cell=cell, trailing_open=float(to), trailing_close=float(tc),
                   after_stage=int(af), tp1_lock_delay=int(dly))
          open(p, "w").write(json.dumps(d))
          print(d)
          PY
        env:
          to: ${{ matrix.to }}
          tc: ${{ matrix.tc }}
          af: ${{ matrix.af }}
          TP1_DELAY: ${{ github.event.inputs.tp1_lock_delay }}
      - uses: actions/upload-artifact@v4
        with:
          name: "tick-realdd-${{ matrix.to }}-${{ matrix.tc }}-${{ matrix.af }}"
          path: "out/*.json"
          if-no-files-found: error

  aggregate:
    needs: sweep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - uses: actions/download-artifact@v4
        with: { path: cells }
      - name: Build REAL-DD leaderboard (net at DD<=max_dd)
        env:
          MAX_DD: ${{ github.event.inputs.max_dd }}
        run: |
          python - <<'PY'
          import glob, json, csv, os
          max_dd = float(os.environ.get("MAX_DD", "40") or 40)
          rows = []
          for f in glob.glob("cells/**/*.json", recursive=True):
              try: rows.append(json.load(open(f)))
              except Exception as e: print("skip", f, e)
          for r in rows:
              r["passes_dd"] = float(r.get("max_drawdown_pct", 999)) <= max_dd
          # Rank: cells that PASS the DD gate first (by net desc), then the rest.
          rows.sort(key=lambda r: (r.get("passes_dd", False), r.get("net_profit", -1e18)), reverse=True)
          os.makedirs("sweep_reports/tick_trailing_realdd", exist_ok=True)
          cols = ["cell","trailing_open","trailing_close","after_stage","tp1_lock_delay",
                  "net_profit","max_drawdown_pct","passes_dd","win_rate_pct",
                  "signals_included","tick_signals","m1_signals"]
          out = "sweep_reports/tick_trailing_realdd/leaderboard.csv"
          with open(out, "w", newline="") as fh:
              w = csv.writer(fh); w.writerow(["rank"]+cols)
              for i, r in enumerate(rows, 1):
                  w.writerow([i]+[r.get(c, "") for c in cols])
          print(open(out).read())
          passing = [r for r in rows if r.get("passes_dd")]
          best = passing[0] if passing else None
          with open("sweep_reports/tick_trailing_realdd/README.md", "w") as fh:
              fh.write("# Self-scalper trailing TICK sweep -- REAL compounding DD\n\n")
              fh.write(f"{len(rows)} cells on committed June ELEV8 ticks, scored by "
                       f"backtest_hybrid (run_hybrid_backtest COMPOUNDING equity curve -- "
                       f"the real DD, not the parse_tick_run proxy). Ranked by net P&L "
                       f"among cells with **max_drawdown_pct <= {max_dd:g}%**.\n\n")
              if best:
                  fh.write(f"**Best at DD<={max_dd:g}%:** `{best['cell']}` -- net "
                           f"${best['net_profit']:,.0f}, DD {best['max_drawdown_pct']:g}%, "
                           f"win {best.get('win_rate_pct')}%.\n\n")
              else:
                  fh.write(f"**No cell met DD<={max_dd:g}%.**\n\n")
              fh.write("(0,0,*) = plain C160 (no trailing). Tick fills are broker-driven; "
                       "ELEV8 != demo, so demo/forward-validate before deploying.\n")
          PY
      - name: Commit leaderboard
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"
          git add sweep_reports/tick_trailing_realdd
          git commit -m "tick-sweep: self-scalper trailing leaderboard, REAL compounding DD (net at DD<=40%)" || echo "nothing to commit"
          git push || echo "push failed"
      - uses: actions/upload-artifact@v4
        with: { name: "tick-trailing-realdd-leaderboard", path: "sweep_reports/tick_trailing_realdd/**", if-no-files-found: warn }
