name: tick-sweep-victor-mayjune

# VICTOR strategy tune, DECIDED ON REAL TICK DATA (May+June 2026 = full R4 tick
# window). Mirrors tick-sweep-r4-full.yml but for the PROVIDER feed: there are no
# generator/feed levers (the Victor signals are a committed file,
# victor_signals.txt), so this sweeps only the STRATEGY/lifecycle space the
# deployed Victor uses (sl_multiplier, max_hold, tp1_lock_fraction, entries,
# tp1_lock_delay, lock_after_tp2, final_target) at Victor's risk 2.5% sizing.
#
# Each candidate is scored on the SAME tick-covered May+June window three ways:
#   TICK  net (risk 2.5%) -- real Mt5Executor on committed May+June ticks (rank key)
#   M1    net (risk 2.5%, slippage 2.0/1.0) -- compounded net + bonus, concurrent DD
#   edge  -- M1 at fixed 0.01 lot (capital-independent)
# disc = M1 - TICK (how much the backtest over-states).
#
# Free: public repo + committed ticks. ~150 cells x ~25 min / 20 parallel ~= 3.5 h.
# The Victor signal R:R/ATR policy is NOT swept here (tick_backtest can't apply it,
# and the deployed Victor doesn't use it). RESEARCH until forward/demo-validated.

on:
  workflow_dispatch:
    inputs:
      n_candidates:
        description: "candidates incl. champion (<=256)"
        default: "150"

permissions:
  contents: write

concurrency:
  # Intentionally SHARES the SQZ6 sweep's group so a dispatch QUEUES behind a
  # running tick-sweep-r4-full and only starts once SQZ6 finishes (no interleaving
  # / stealing its 20 runner slots). cancel-in-progress:false = wait, don't cancel.
  group: tick-sweep-r4-full
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - id: gen
        run: |
          M=$(python tools/gen_victor_tick_candidates.py --n ${{ github.event.inputs.n_candidates }})
          echo "matrix=$M" >> "$GITHUB_OUTPUT"
          echo "$M" | python -c "import json,sys; print('candidates:', len(json.load(sys.stdin)['include']))"

  score:
    needs: gen
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJSON(needs.gen.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Score Victor candidate ${{ matrix.id }} on TICK + M1 (May+June)
        env:
          slm: ${{ matrix.slm }}
          entries: ${{ matrix.entries }}
          slgap: ${{ matrix.slgap }}
          maxhold: ${{ matrix.maxhold }}
          delay: ${{ matrix.delay }}
          frac: ${{ matrix.frac }}
          lock2: ${{ matrix.lock2 }}
          final: ${{ matrix.final }}
        run: |
          set -o pipefail
          mkdir -p out
          # Victor feed is a committed file; filter it to the tick-COVERED May+June
          # days so TICK and M1 score the IDENTICAL signal set (apples-to-apples).
          python - <<'PY'
          import re
          covered=set(("2026-05-05 2026-05-11 2026-05-13 2026-05-14 2026-05-15 2026-05-18 2026-05-19 2026-05-20 2026-05-21 2026-05-22 2026-05-25 2026-05-26 2026-05-27 2026-05-28 2026-05-29 "
                       "2026-06-01 2026-06-02 2026-06-03 2026-06-04 2026-06-05 2026-06-08 2026-06-12 2026-06-15 2026-06-16 2026-06-17 2026-06-18 2026-06-19 2026-06-22 2026-06-23 2026-06-24").split())
          keep=False; out=[]
          for line in open("victor_signals.txt"):
              m=re.match(r"(\d{4}-\d{2}-\d{2}) GMT", line)
              if m: keep=m.group(1) in covered
              if keep: out.append(line)
          open("feed.txt","w").writelines(out)
          PY
          M1="--charts data/XAUUSD_M1_202604_ELEV8.csv data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --max-drawdown-limit-pct 99 --progress-interval-seconds 0 --initial-capital 50000 --sync-charts false \
            --minimum-lot 0.01 --lot-step 0.01 --bonus-per-closed-lot 3.0 \
            --entries $entries --entry-ladder range_to_sl --entry-sl-gap $slgap --activation-delay 2 --pending-expiry 180 \
            --max-hold $maxhold --sl-multiplier $slm --final-target $final \
            --lock-after-tp1 true --lock-after-tp2 $lock2 --tp1-lock-delay-minutes $delay --tp2-lock-delay-minutes 2 \
            --profit-lock-mode tp_levels --bep-trigger-distance 3.0 --tp1-lock-fraction $frac --tp2-lock-target TP1 \
            --runner-after-tp3 false --tp3-lock-target TP2 --trailing-open-distance 0.0 --trailing-close-distance 0.0 \
            --lock-tp1-exit-slippage 2.0 --lock-tp2-exit-slippage 1.0"
          # M1 risk 2.5% (Victor sizing) -- compounded net + bonus, concurrent DD
          python tools/backtest_explicit.py --signals feed.txt $M1 --sizing-mode risk --lot 0.01 --risk 0.025 \
            --output-dir m1risk > m1risk.json 2>/dev/null || echo '{}' > m1risk.json
          # M1 fixed 0.01 lot -- capital-independent edge
          python tools/backtest_explicit.py --signals feed.txt $M1 --sizing-mode fixed --lot 0.01 --risk 0.025 \
            --output-dir m1fixed > m1fixed.json 2>/dev/null || echo '{}' > m1fixed.json
          # TICK (real executor, risk 2.5%, May+June ticks)
          timeout 5400 python tools/tick_backtest.py --signals feed.txt \
            --charts data/XAUUSD_M1_202604_ELEV8.csv data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --ticks data/ticks/XAUUSD_TICK_202605_*_ELEV8.csv data/ticks/XAUUSD_TICK_202606_*_ELEV8.csv \
            --watch-seconds 3 --initial-capital 50000 --sizing-mode risk --lot 0.01 --risk 0.025 \
            --minimum-lot 0.01 --lot-step 0.01 --bonus-per-closed-lot 3.0 \
            --entries $entries --entry-ladder range_to_sl --entry-sl-gap $slgap --activation-delay 2 --pending-expiry 180 \
            --max-hold $maxhold --sl-multiplier $slm --final-target $final \
            --lock-after-tp1 true --lock-after-tp2 $lock2 --tp1-lock-delay-minutes $delay --tp2-lock-delay-minutes 2 \
            --profit-lock-mode tp_levels --bep-trigger-distance 3.0 --tp1-lock-fraction $frac --tp2-lock-target TP1 \
            --runner-after-tp3 false --tp3-lock-target TP2 --trailing-open-distance 0.0 --trailing-close-distance 0.0 \
            | tee run.txt
          python tools/parse_tick_run.py run.txt > tick.json
          python tools/merge_cell_metrics.py --config '${{ toJSON(matrix) }}' \
            --tick tick.json --m1-risk m1risk.json --m1-fixed m1fixed.json > "out/${{ matrix.id }}.json"
          cat "out/${{ matrix.id }}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: "tickvic-${{ matrix.id }}"
          path: "out/*.json"
          if-no-files-found: error

  aggregate:
    needs: score
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - uses: actions/download-artifact@v4
        with: { path: cells }
      - name: Build Victor TICK-vs-M1 leaderboard
        run: |
          python - <<'PY'
          import glob, json, csv, os
          rows=[]
          for f in glob.glob("cells/**/*.json", recursive=True):
              try: rows.append(json.load(open(f)))
              except Exception as e: print("skip", f, e)
          rows.sort(key=lambda r: (r.get("tick_net") if r.get("tick_net") is not None else -1e18), reverse=True)
          os.makedirs("sweep_reports/tick_vic_full", exist_ok=True)
          cols=["id","tick_net","m1_net","disc_m1_minus_tick","disc_pct","tick_dd_pct","m1_dd_pct",
                "m1_net_nobonus","m1_edge_fixed","m1_closed_lots","m1_winrate","tick_nofill",
                "slm","entries","slgap","maxhold","delay","frac","lock2","final"]
          out="sweep_reports/tick_vic_full/leaderboard.csv"
          with open(out,"w",newline="") as fh:
              w=csv.writer(fh); w.writerow(["rank"]+cols)
              for i,r in enumerate(rows,1): w.writerow([i]+[r.get(c,"") for c in cols])
          champ=next((r for r in rows if r.get("id")=="c000"), None)
          crank=next((i for i,r in enumerate(rows,1) if r.get("id")=="c000"), None)
          with open("sweep_reports/tick_vic_full/README.md","w") as fh:
              fh.write("# VICTOR strategy tune -- TICK vs M1 (May+June 2026, full R4 tick window)\n\n")
              fh.write(f"{len(rows)} lifecycle candidates on the Victor provider feed, risk 2.5% / $50k, "
                       "scored on the SAME tick-covered May+June window. Ranked by TICK net (real executor).\n\n")
              if rows:
                  w=rows[0]
                  fh.write(f"**Winner {w['id']}**: tick ${w.get('tick_net')} | M1 ${w.get('m1_net')} (disc {w.get('disc_pct')}%) "
                           f"| M1 DD {w.get('m1_dd_pct')}% | edge(fix) ${w.get('m1_edge_fixed')} | "
                           f"slm {w.get('slm')} e{w.get('entries')} mh{w.get('maxhold')} f{w.get('frac')} d{w.get('delay')} "
                           f"lock2={w.get('lock2')} {w.get('final')}\n\n")
              if champ:
                  fh.write(f"**Champion c000** (rank {crank}/{len(rows)}): tick ${champ.get('tick_net')} | "
                           f"M1 ${champ.get('m1_net')} | M1 DD {champ.get('m1_dd_pct')}%\n\n")
              fh.write("## Top 20 (by TICK net)\n\n")
              fh.write("| # | id | TICK $ | M1 $ | disc% | M1 DD% | edge(fix) $ | slm | e | mh | f | d | lock2 | tgt |\n")
              fh.write("|--|--|--|--|--|--|--|--|--|--|--|--|--|--|\n")
              for i,r in enumerate(rows[:20],1):
                  fh.write(f"| {i} | {r.get('id')} | {r.get('tick_net')} | {r.get('m1_net')} | {r.get('disc_pct')} | "
                           f"{r.get('m1_dd_pct')} | {r.get('m1_edge_fixed')} | {r.get('slm')} | {r.get('entries')} | "
                           f"{r.get('maxhold')} | {r.get('frac')} | {r.get('delay')} | {r.get('lock2')} | {r.get('final')} |\n")
              fh.write("\nVictor signal R:R/ATR policy NOT swept (tick_backtest limitation). RESEARCH until forward/demo-validated.\n")
          print(open("sweep_reports/tick_vic_full/README.md").read())
          PY
      # Upload the freshly generated leaderboard BEFORE the git commit, so the
      # artifact always captures the clean files even if the push below races/fails.
      - uses: actions/upload-artifact@v4
        with: { name: "tick-vic-leaderboard", path: "sweep_reports/tick_vic_full/**", if-no-files-found: warn }
      - name: Commit leaderboard to main
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"
          git add sweep_reports/tick_vic_full
          git commit -m "tick-sweep: VICTOR May+June leaderboard (decided on ticks)" \
            || { echo "nothing to commit"; exit 0; }
          # checkout@v5 leaves a DETACHED HEAD, so a bare `git push` fails ("not on a
          # branch"); push the detached HEAD explicitly to main. Rebase favouring our
          # freshly regenerated files (-X theirs) so a prior run's files on main don't
          # cause an add/add conflict, retrying on any race with a concurrent writer.
          for i in 1 2 3 4 5; do
            git fetch origin main || true
            if git rebase -X theirs origin/main; then
              if git push origin HEAD:main; then echo "pushed"; exit 0; fi
            else
              git rebase --abort 2>/dev/null || true
            fi
            sleep $((2 ** i))
          done
          echo "push failed after retries"; exit 1
