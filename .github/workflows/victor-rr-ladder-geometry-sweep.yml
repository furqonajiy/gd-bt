name: Victor corrected-R:R ladder geometry sweep

# Stage-4 of the VRR study (reports/VRR_LADDER_STUDY/summary.md): re-tune the
# Victor trailing-geometry parameters UNDER the corrected-R:R feed, so the
# deployed parameters are consistent with the new ladder (operator step #4).
#
# The feed is DERIVED on the runner from the pristine victor_signals.txt by
# tools/generate_victor_rr_feed.py (signals/ is gitignored by design); the
# ladder defaults to the three-era A/B winner rr15x30x50 (TP1 1.5R / TP2 3R /
# TP3 5R). Candidates run through tools/sweep_victor_trailing_geometry.py
# (bounded curated grid, NOT brute force) with the ELEV8 broker floor enforced:
# --min-trailing-open/--min-trailing-close 0.5 (a resting STOP inside
# SYMBOL_TRADE_STOPS_LEVEL (~0.4) is rejected with retcode 10015 and the tick
# mock does not model that, so sub-floor cells are live-infeasible by rule).
#
# Manual-only. Commits results.csv / top_candidates.json / summary.md back to
# the dispatching branch on commit_results=true; workbooks go to the artifact.

on:
  workflow_dispatch:
    inputs:
      rr1:
        description: "TP1 ladder multiple (x posted-SL risk)"
        default: "1.5"
      rr2:
        description: "TP2 ladder multiple"
        default: "3.0"
      rr3:
        description: "TP3 ladder multiple"
        default: "5.0"
      commit_results:
        description: "Commit sweep summaries back to this branch"
        default: "true"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: victor-rr-ladder-geometry-sweep-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Preflight compile + targeted tests
        run: |
          set -euo pipefail
          python -m py_compile \
            tools/generate_victor_rr_feed.py \
            tools/sweep_victor_trailing_geometry.py \
            tools/backtest_hybrid.py
          python -m pytest -q tests/test_sweep_victor_trailing_geometry.py

      - name: Generate corrected-R:R feed (ladder baked into a derived feed)
        run: |
          set -euo pipefail
          mkdir -p logs/vrr_geom
          python tools/generate_victor_rr_feed.py \
            --input victor_signals.txt \
            --rr1 "${{ github.event.inputs.rr1 }}" \
            --rr2 "${{ github.event.inputs.rr2 }}" \
            --rr3 "${{ github.event.inputs.rr3 }}" \
            --output signals/victor_rr_ladder.txt 2>&1 | tee logs/vrr_geom/feed.log

      - name: Smoke sweep (recent June, tick)
        run: |
          set -uo pipefail
          python tools/sweep_victor_trailing_geometry.py \
            --mode smoke \
            --signals signals/victor_rr_ladder.txt \
            --out-root reports/VRR_GEOM \
            --charts data/XAUUSD_M1_202606_ELEV8.csv \
            --ticks data/ticks/XAUUSD_TICK_202606*_ELEV8.csv \
            --min-trailing-open 0.5 --min-trailing-close 0.5 \
            --require-full-tick-lifecycle \
            --exclude-open-or-pending 2>&1 | tee logs/vrr_geom/smoke.log

      - name: Full recent sweep (May + June, tick)
        run: |
          set -uo pipefail
          python tools/sweep_victor_trailing_geometry.py \
            --mode full_recent \
            --signals signals/victor_rr_ladder.txt \
            --out-root reports/VRR_GEOM \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --ticks data/ticks/XAUUSD_TICK_202605*_ELEV8.csv data/ticks/XAUUSD_TICK_202606*_ELEV8.csv \
            --start-date 2026-05-01 --end-date 2026-07-01 \
            --min-trailing-open 0.5 --min-trailing-close 0.5 \
            --require-full-tick-lifecycle \
            --exclude-open-or-pending 2>&1 | tee logs/vrr_geom/full_recent.log

      - name: Validation sweep (Jan-Jul, tick where covered)
        run: |
          set -uo pipefail
          TOPJSON=reports/VRR_GEOM/VICTOR_TRAILING_full_recent/top_candidates.json
          if [ ! -f "$TOPJSON" ]; then
            echo "No top_candidates.json from full_recent; skipping validate_top." | tee logs/vrr_geom/validate_top.log
            exit 0
          fi
          python tools/sweep_victor_trailing_geometry.py \
            --mode validate_top \
            --top-json "$TOPJSON" \
            --signals signals/victor_rr_ladder.txt \
            --out-root reports/VRR_GEOM \
            --charts data/XAUUSD_M1_2026*_ELEV8.csv \
            --ticks data/ticks/XAUUSD_TICK_*_ELEV8.csv \
            --start-date 2026-01-01 --end-date 2026-08-01 \
            --min-trailing-open 0.5 --min-trailing-close 0.5 2>&1 | tee logs/vrr_geom/validate_top.log

      - name: Write sweep status (ladder + run id)
        if: always()
        run: |
          mkdir -p reports/VRR_GEOM
          {
            echo "# VRR ladder geometry sweep status"
            echo "- run id: ${{ github.run_id }}"
            echo "- branch: ${{ github.ref_name }}"
            echo "- ladder: rr1=${{ github.event.inputs.rr1 }} rr2=${{ github.event.inputs.rr2 }} rr3=${{ github.event.inputs.rr3 }} (nominal, posted-SL risk)"
            echo "- broker floor: trailing-open/close >= 0.5 (ELEV8 min-stop rule)"
            echo "- stages: smoke (Jun tick) -> full_recent (May+Jun tick) -> validate_top (Jan-Jul)"
          } > reports/VRR_GEOM/STATUS.md

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: victor-rr-ladder-geometry-sweep
          path: |
            reports/VRR_GEOM/**
            logs/vrr_geom/**
          if-no-files-found: warn

      - name: Commit sweep summaries to this branch
        if: always() && github.event.inputs.commit_results != 'false'
        run: |
          set -uo pipefail
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"
          for stage in smoke full_recent validate_top; do
            git add "reports/VRR_GEOM/VICTOR_TRAILING_${stage}/results.csv" \
                    "reports/VRR_GEOM/VICTOR_TRAILING_${stage}/top_candidates.json" \
                    "reports/VRR_GEOM/VICTOR_TRAILING_${stage}/summary.md" 2>/dev/null || true
          done
          git add reports/VRR_GEOM/STATUS.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No sweep results to commit."
          else
            git commit -m "research: VRR ladder geometry sweep results (rr${{ github.event.inputs.rr1 }}/${{ github.event.inputs.rr2 }}/${{ github.event.inputs.rr3 }}, broker floor 0.5) [skip ci]"
            for i in 1 2 3 4; do git push && break || sleep $((2**i)); done
          fi
