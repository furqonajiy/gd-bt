name: r4-entry-feature-sweep

# R4 (2026) ENTRY-FEATURE sweep. For each generator entry-feature VARIANT we
# regenerate the scalper24 feed with that variant's filter flags, then sweep the
# full strategy+geometry params over it (tools/sweep_self_limit.py, slippage-aware
# 2.0/1.0), and the aggregate picks the global winner on fixed-lot edge + $3/lot
# bonus at DD<=40% & OOS>0. A variant must beat base on edge+bonus, raw edge,
# and OOS. This is how we "combine all params": entry-feature choice
# (feed-level) x strategy/geometry (candidate-level), attributable.
#
# Each variant runs ONE job of 4 parallel shards (4 seeds). Artifact-only (no
# branch writes), consistent with self-scalper-sweep / victor-sweep.

on:
  workflow_dispatch:
    inputs:
      max_candidates:
        description: "candidates per shard"
        default: "150"

permissions:
  contents: read

concurrency:
  group: r4-entry-feature-sweep
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CHARTS: 'data/XAUUSD_M1_2026*_ELEV8.csv'

jobs:
  sweep:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { v: base,       gen: "" }
          - { v: adx12,      gen: "--adx-min 12" }
          - { v: adx18,      gen: "--adx-min 18" }
          - { v: adx25,      gen: "--adx-min 25" }
          - { v: rsi,        gen: "--rsi-buy-max 70 --rsi-sell-min 30" }
          - { v: pctb,       gen: "--bb-buy-pctb-max 0.80 --bb-sell-pctb-min 0.20" }
          - { v: bbsqueeze,  gen: "--bb-bandwidth-min 0.0006" }
          - { v: vwap,       gen: "--vwap-filter" }
          - { v: htf15,      gen: "--htf-filter --htf-minutes 15" }
          - { v: htf60,      gen: "--htf-filter --htf-minutes 60" }
          - { v: sr,         gen: "--sr-proximity-atr 0.5 --sr-round-step 10" }
          - { v: session,    gen: "--session-start 9 --session-end 23" }
          - { v: adx12rsi,   gen: "--adx-min 12 --rsi-buy-max 70 --rsi-sell-min 30" }
          - { v: adx12htf,   gen: "--adx-min 12 --htf-filter" }
          - { v: adx12pctb,  gen: "--adx-min 12 --bb-buy-pctb-max 0.85 --bb-sell-pctb-min 0.15" }
          - { v: combo,      gen: "--adx-min 12 --htf-filter --bb-buy-pctb-max 0.85 --bb-sell-pctb-min 0.15" }
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (R4 2026) for variant ${{ matrix.v }}
        run: |
          set -euo pipefail
          python tools/generate_scalper_signals.py --charts ${{ env.CHARTS }} \
            --output feed.txt --start 2026-01-01 --session-start 0 --session-end 0 --signal-tz 7 ${{ matrix.gen }}
          echo "variant ${{ matrix.v }} feed lines: $(wc -l < feed.txt)"
      - name: Sweep 4 shards over the variant feed
        run: |
          set -uo pipefail
          MC="${{ github.event.inputs.max_candidates }}"; MC="${MC:-150}"
          for N in 0 1 2 3; do
            timeout 18000 python tools/sweep_self_limit.py --signals feed.txt \
              --charts ${{ env.CHARTS }} --seed $((42 + N)) --max-candidates "$MC" \
              --output-dir "out/${{ matrix.v }}_shard${N}" --validate-months 2 \
              --max-concurrent-dd-pct 40 --fixed-lot 0.01 --resume &
          done; wait
      - uses: actions/upload-artifact@v4
        with: { name: "feat-${{ matrix.v }}", path: "out/**/results.jsonl", if-no-files-found: error }

  aggregate:
    needs: sweep
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with: { pattern: "feat-*", path: _artifacts }
      - name: Aggregate per variant, then pick the global R4 winner
        run: |
          set -uo pipefail
          for d in _artifacts/feat-*; do
            v="${d#_artifacts/feat-}"
            python tools/victor_sweep_aggregate.py --root "$d" --regime "R4F_${v}" \
              --out-dir "results/${v}" --dd-gate 40 --top-n 10 || true
          done
          python tools/entry_feature_variant_report.py \
            --results-dir results \
            --dd-gate 40 \
            --title "PER-VARIANT WINNERS" \
            --winner-label "GLOBAL R4 WINNER"
      - uses: actions/upload-artifact@v4
        with: { name: "r4-feature-sweep-results", path: "results/**", if-no-files-found: warn }
