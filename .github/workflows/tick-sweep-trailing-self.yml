name: tick-sweep-trailing-self

# SELF-SCALPER TRAILING-OPEN/CLOSE sweep decided on REAL TICK DATA (committed
# June 2026 ELEV8 ticks on main -- NOT demo data), via tools/tick_backtest.py (the
# REAL Mt5Executor replayed against ticks). Finds the best trailing config for the
# self-scalper (C160 geometry + filter) the demo strategy DTR0 runs.
#
# WHY tick, not M1: trailing-open/close fills are intrabar/broker-driven and the M1
# engine over-states them; the existing self-scalper-trailing-sweep is M1-only.
# This is the tick-decided version.
#
# Grid (the trailing levers; geometry pinned to C160):
#   trailing_open   in {0.0, 0.5, 1.0}   (0 = no trailing-open; >=0.5 is TRADEABLE,
#                                          a resting STOP needs >= the broker's
#                                          SYMBOL_TRADE_STOPS_LEVEL, ~0.4)
#   trailing_close  in {0.0, 0.5, 1.0}   (0 = no trailing-close)
#   after_stage     in {0, 1}            (0 = trail from open; 1 = trail only AFTER
#                                          TP1 is touched)
#   -> 18 cells. (0,0,*) is the no-trailing C160 baseline reference.
#
# NOTE the tick mock does NOT enforce the broker min-stop, so a sub-0.4 distance
# can look fine here yet be untradeable live -- the grid stays >= 0.5 on purpose.
# Tick fills are broker-driven: a winner is RESEARCH until forward/demo-validated.
#
# Artifact-per-cell; the agg job builds the tick-P&L leaderboard and commits it to
# sweep_reports/tick_trailing_self/. Mirrors tick-sweep-r4-nontrailing.yml.

on:
  workflow_dispatch:
    inputs:
      tp1_lock_delay:
        description: "tp1_lock_delay_minutes pinned on every cell (C160=24)"
        default: "24"

permissions:
  contents: write

concurrency:
  group: tick-sweep-trailing-self
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sweep:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        to: ["0.0", "0.5", "1.0"]
        tc: ["0.0", "0.5", "1.0"]
        af: ["0", "1"]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (C160 filter, R4 2026)
        run: |
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --output feed.txt --start 2026-06-01 \
            --session-start 0 --session-end 0 --signal-tz 7 \
            --rsi-buy-max 70 --rsi-sell-min 30 --bb-bandwidth-min 0.0006 \
            --rr1 1.2 --rr2 2.5 --rr3 5
      - name: Tick backtest cell (to=${{ matrix.to }} tc=${{ matrix.tc }} af=${{ matrix.af }})
        run: |
          set -o pipefail
          CELL="to${to//./}_tc${tc//./}_af${af}"
          echo "cell=$CELL"
          timeout 5000 python tools/tick_backtest.py \
            --signals feed.txt \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --ticks data/ticks/XAUUSD_TICK_202606_p*_ELEV8.csv \
            --watch-seconds 3 --initial-capital 50000 --sizing-mode risk \
            --lot 0.01 --risk 0.01 --minimum-lot 0.01 --lot-step 0.01 --bonus-per-closed-lot 3.0 \
            --entries 7 --entry-ladder range_to_sl --entry-sl-gap 0.7 \
            --activation-delay 2 --pending-expiry 180 --max-hold 300 --sl-multiplier 2.1 \
            --final-target TP3 --lock-after-tp1 true --lock-after-tp2 false \
            --tp1-lock-delay-minutes ${TP1_DELAY} --tp2-lock-delay-minutes 2 \
            --profit-lock-mode tp_levels --bep-trigger-distance 3.0 \
            --tp1-lock-fraction 0.75 --tp2-lock-target TP1 \
            --runner-after-tp3 false --tp3-lock-target TP2 \
            --trailing-open-distance ${to} --trailing-close-distance ${tc} \
            --trailing-close-after-stage ${af} \
            | tee run.txt
          mkdir -p out
          python tools/parse_tick_run.py run.txt \
            --config "{\"cell\":\"$CELL\",\"trailing_open\":${to},\"trailing_close\":${tc},\"after_stage\":${af},\"tp1_lock_delay\":${TP1_DELAY},\"entry_count\":7,\"trailing\":true}" \
            > "out/${CELL}.json"
          cat "out/${CELL}.json"
        env:
          to: ${{ matrix.to }}
          tc: ${{ matrix.tc }}
          af: ${{ matrix.af }}
          TP1_DELAY: ${{ github.event.inputs.tp1_lock_delay }}
      - uses: actions/upload-artifact@v4
        with:
          name: "tick-trail-${{ matrix.to }}-${{ matrix.tc }}-${{ matrix.af }}"
          path: "out/*.json"
          if-no-files-found: error

  aggregate:
    needs: sweep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - uses: actions/download-artifact@v4
        with: { path: cells }
      - name: Build tick-P&L leaderboard
        run: |
          python - <<'PY'
          import glob, json, csv, os
          rows=[]
          for f in glob.glob("cells/**/*.json", recursive=True):
              try: rows.append(json.load(open(f)))
              except Exception as e: print("skip", f, e)
          for r in rows:
              c=json.loads(r["config"]) if isinstance(r.get("config"),str) else r.get("config",{})
              r.update(c)
          rows.sort(key=lambda r: r.get("tick_pnl",-1e18), reverse=True)
          os.makedirs("sweep_reports/tick_trailing_self", exist_ok=True)
          cols=["cell","trailing_open","trailing_close","after_stage","tp1_lock_delay",
                "tick_pnl","m1_pnl","gap","max_drawdown_pct","n_signals","n_nofill"]
          out="sweep_reports/tick_trailing_self/leaderboard.csv"
          with open(out,"w",newline="") as fh:
              w=csv.writer(fh); w.writerow(["rank"]+cols)
              for i,r in enumerate(rows,1):
                  w.writerow([i]+[r.get(c,"") for c in cols])
          print(open(out).read())
          with open("sweep_reports/tick_trailing_self/README.md","w") as fh:
              fh.write("# Self-scalper TRAILING-open/close TICK sweep (committed June ELEV8 ticks)\n\n")
              fh.write(f"{len(rows)} cells, ranked by **tick P&L** (real Mt5Executor on June ticks).\n")
              fh.write("Geometry pinned to C160 (e7 / slm2.1 / mh300 / TP3 / lock-after-tp1 / tp1-frac0.75).\n")
              fh.write("Grid: trailing_open x trailing_close x after_stage. (0,0,*) = no-trail baseline.\n\n")
              fh.write("Distances >= 0.5 are TRADEABLE (broker min-stop ~0.4); the tick mock does not\n")
              fh.write("enforce that floor, so keep deployed distances >= 0.5. Tick fills are broker-\n")
              fh.write("driven -- a winner is RESEARCH until forward/demo-validated.\n")
          PY
      - name: Commit leaderboard
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"
          git add sweep_reports/tick_trailing_self
          git commit -m "tick-sweep: self-scalper trailing-open/close leaderboard (June ticks)" || echo "nothing to commit"
          git push || echo "push failed"
      - uses: actions/upload-artifact@v4
        with: { name: "tick-trailing-self-leaderboard", path: "sweep_reports/tick_trailing_self/**", if-no-files-found: warn }
