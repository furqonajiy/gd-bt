name: TSL18 Quality Entry Overnight Sweep

# Runs the TSL18 quality-entry smoke/full_june sweep (+ optional jan_jun validation)
# on GitHub Actions instead of a long warm Claude session. It uses the ACTUAL
# current-main CLI of tools/sweep_tsl18_quality_entry.py:
#   --mode smoke|full_june|validate_top  --out-root  --gen-start  --charts  --ticks
#   --top-json  --score-objective  --require-full-tick-lifecycle  --exclude-open-or-pending
# (the script also now accepts the automation aliases --mode full / --output-dir /
# --rank-objective / --require-full-lifecycle-ticks / --fail-on-open-or-pending /
# --input-candidates, but this workflow deliberately uses the canonical names.)
#
# It is GUARDED: it detects whether main carries the quality-entry layer (#328) and
# the collision policies (#329). Missing collision policies does NOT fail the run --
# the sweep continues quality-entry-only and the status is marked COLLISION_NOT_MERGED.
# If the quality-entry layer itself is absent it writes a status artifact and exits 0.
#
# Safety: it NEVER trades live, NEVER promotes to live TSL18, and changes no strategy
# logic. Outputs are artifacts only (permissions: contents: read -> no commit-back).
# NOTE: a push to main runs the full bounded pipeline (smoke -> full_june ->
# jan_jun); the heavy run is otherwise launched via workflow_dispatch.

on:
  workflow_dispatch:
    inputs:
      run_jan_jun:
        description: "Run Jan-Jun validation after June full sweep"
        required: false
        default: "true"
  push:
    branches: [main]

concurrency:
  group: tsl18-quality-entry-overnight-sweep
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  # Catch-all so any JS action still shipping a Node-20 major runs on Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Prerequisite detection
        id: guard
        run: |
          set -uo pipefail
          STATUS_DIR=reports/OVERNIGHT_AUTO_SWEEP_STATUS
          mkdir -p "$STATUS_DIR"
          STATUS="$STATUS_DIR/summary.md"

          have_str() { grep -rqsE -- "$1" tools/ trading/ 2>/dev/null; }

          # quality-entry layer (#328)
          QE=true
          [ -f tools/sweep_tsl18_quality_entry.py ] || QE=false
          have_str 'entry-quality-classifier' || QE=false
          have_str 'full_june'                 || QE=false
          have_str 'validate_top'              || QE=false

          # collision policies (#329)
          COL=true
          have_str 'opposite-signal-policy'   || COL=false
          have_str 'same-side-overlap-policy' || COL=false

          # refreshed backtest reports (informational; T818 is an accepted alias of TSL18)
          v817="$(find reports -type f -ipath '*v817*' -a -ipath '*2026*' 2>/dev/null | head -1)"
          tsl="$(find reports -type f \( -ipath '*tsl18*' -o -ipath '*t818*' \) -a -ipath '*2026*' 2>/dev/null | head -1)"
          rep5k="$(find reports -type f -ipath '*_5k*' 2>/dev/null | head -1)"

          echo "qe_present=$QE" >> "$GITHUB_OUTPUT"
          echo "collision_present=$COL" >> "$GITHUB_OUTPUT"

          {
            echo "# Overnight Auto Sweep — Status"
            echo
            echo "- Workflow: **TSL18 Quality Entry Overnight Sweep**"
            echo "- Main SHA: \`${GITHUB_SHA:-?}\`  |  Ref: \`${GITHUB_REF:-?}\`  |  Event: \`${{ github.event_name }}\`"
            echo "- Run: \`${GITHUB_RUN_ID:-?}\` (attempt \`${GITHUB_RUN_ATTEMPT:-?}\`)"
            echo
            echo "## Prerequisite detection"
            echo "- PR #328 quality-entry layer detected: **$QE**"
            echo "- PR #329 collision policies detected: **$COL**"
            echo "- V817 2026 report present: \`${v817:-<none>}\`"
            echo "- TSL18/T818 2026 report present (T818 = TSL18 alias): \`${tsl:-<none>}\`"
            echo "- 5K-variant report present: \`${rep5k:-<none>}\`"
          } > "$STATUS"

          if [ "$QE" != "true" ]; then
            { echo; echo "## Quality-entry layer ABSENT — sweep skipped (exit 0)"; \
              echo "Re-run after PR #328 (quality-entry research layer) is merged to main."; } >> "$STATUS"
            echo "Quality-entry layer absent; skipping sweep (exit 0)."
          elif [ "$COL" != "true" ]; then
            { echo; echo "## Collision policies NOT merged (PR #329) — continuing quality-entry-only"; \
              echo "Collision-aware candidates will NOT run; the \`collision_*\` columns stay placeholders."; } >> "$STATUS"
            echo "Collision policies absent; quality-entry-only sweep (COLLISION_NOT_MERGED)."
          else
            { echo; echo "## Prerequisites present — running preflight -> smoke -> full_june -> validate_top"; } >> "$STATUS"
            echo "Prerequisites present; proceeding."
          fi
          cat "$STATUS"

      - name: Preflight (compile + targeted tests)
        id: preflight
        if: success() && steps.guard.outputs.qe_present == 'true'
        run: |
          set -uo pipefail
          STATUS=reports/OVERNIGHT_AUTO_SWEEP_STATUS/summary.md
          { echo; echo "## Preflight"; } >> "$STATUS"
          fail=0

          for f in tools/generate_scalper_signals.py tools/sweep_tsl18_quality_entry.py \
                   tools/backtest_hybrid.py tools/backtest_explicit.py tools/rebate_scoring.py; do
            if [ -e "$f" ]; then
              if python -m py_compile "$f"; then echo "- compile OK: $f" >> "$STATUS";
              else echo "- compile FAIL: $f" >> "$STATUS"; fail=1; fi
            else echo "- compile SKIP (missing): $f" >> "$STATUS"; fi
          done

          TESTS="tests/test_tsl18_quality_entry.py tests/test_rebate_scoring.py \
                 tests/test_sweep_tsl18_quality_entry.py tests/test_structure_guard.py \
                 tests/test_progress_stall.py tests/test_live_entry_guard.py \
                 tests/test_manual_close_rearm_nochase.py tests/test_deployment_gate.py \
                 tests/test_reconcile.py"
          [ -e tests/test_collision_policy.py ] && TESTS="$TESTS tests/test_collision_policy.py"
          for t in $TESTS; do
            if [ -e "$t" ]; then
              if python -m pytest -q "$t"; then echo "- pytest OK: $t" >> "$STATUS";
              else echo "- pytest FAIL: $t" >> "$STATUS"; fail=1; fi
            else echo "- pytest SKIP (missing): $t" >> "$STATUS"; fi
          done

          if [ "$fail" -ne 0 ]; then echo "Preflight FAILED — not running the sweep"; exit 1; fi
          echo "Preflight OK"

      - name: Smoke sweep
        id: smoke
        if: success() && steps.guard.outputs.qe_present == 'true'
        run: |
          set -uo pipefail
          STATUS=reports/OVERNIGHT_AUTO_SWEEP_STATUS/summary.md
          { echo; echo "## Smoke sweep"; } >> "$STATUS"
          set +e
          python tools/sweep_tsl18_quality_entry.py \
            --mode smoke \
            --out-root reports \
            --require-full-tick-lifecycle \
            --exclude-open-or-pending \
            --score-objective edge_plus_rebate_guarded
          rc=$?
          set -e
          ok=1; [ "$rc" -eq 0 ] || ok=0
          for f in reports/TSL18_QUALITY_smoke/results.csv reports/TSL18_QUALITY_smoke/top_candidates.json reports/TSL18_QUALITY_smoke/summary.md; do
            if [ -f "$f" ]; then echo "- present: $f" >> "$STATUS"; else echo "- MISSING: $f" >> "$STATUS"; ok=0; fi
          done
          if [ "$ok" -ne 1 ]; then echo "- Smoke: FAILED (rc=$rc)" >> "$STATUS"; echo "Smoke FAILED"; exit 1; fi
          echo "- Smoke: OK" >> "$STATUS"; echo "Smoke OK"

      - name: Full June sweep
        id: fulljune
        if: success() && steps.guard.outputs.qe_present == 'true'
        run: |
          set -uo pipefail
          STATUS=reports/OVERNIGHT_AUTO_SWEEP_STATUS/summary.md
          { echo; echo "## Full June sweep"; } >> "$STATUS"
          set +e
          python tools/sweep_tsl18_quality_entry.py \
            --mode full_june \
            --out-root reports \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --ticks data/ticks/XAUUSD_TICK_202606*_ELEV8.csv \
            --gen-start 2026-05-01 \
            --require-full-tick-lifecycle \
            --exclude-open-or-pending \
            --score-objective edge_plus_rebate_guarded
          rc=$?
          set -e
          ok=1; [ "$rc" -eq 0 ] || ok=0
          for f in reports/TSL18_QUALITY_full_june/results.csv reports/TSL18_QUALITY_full_june/top_candidates.json reports/TSL18_QUALITY_full_june/summary.md; do
            if [ -f "$f" ]; then echo "- present: $f" >> "$STATUS"; else echo "- MISSING: $f" >> "$STATUS"; ok=0; fi
          done
          if [ "$ok" -ne 1 ]; then echo "- Full June: FAILED (rc=$rc)" >> "$STATUS"; echo "Full June FAILED"; exit 1; fi
          echo "- Full June: OK" >> "$STATUS"; echo "Full June OK"

      - name: Jan-Jun validation
        id: validate
        if: success() && steps.guard.outputs.qe_present == 'true' && (github.event_name == 'push' || github.event.inputs.run_jan_jun == 'true')
        run: |
          set -uo pipefail
          STATUS=reports/OVERNIGHT_AUTO_SWEEP_STATUS/summary.md
          { echo; echo "## Jan-Jun validation"; } >> "$STATUS"
          TOPJSON=reports/TSL18_QUALITY_full_june/top_candidates.json
          if [ ! -f "$TOPJSON" ]; then
            echo "- SKIPPED: $TOPJSON not found (full_june produced no top candidates)" >> "$STATUS"
            echo "Jan-Jun skipped (no top_candidates.json)"; exit 0
          fi
          set +e
          python tools/sweep_tsl18_quality_entry.py \
            --mode validate_top \
            --top-json "$TOPJSON" \
            --out-root reports \
            --charts data/XAUUSD_M1_2026*_ELEV8.csv \
            --ticks data/ticks/XAUUSD_TICK_20260*_ELEV8.csv \
            --gen-start 2026-01-01 \
            --require-full-tick-lifecycle \
            --exclude-open-or-pending \
            --score-objective edge_plus_rebate_guarded
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then echo "- Jan-Jun: FAILED (rc=$rc)" >> "$STATUS"; echo "Jan-Jun FAILED"; exit 1; fi
          echo "- Jan-Jun: OK -> reports/TSL18_QUALITY_validate_top/" >> "$STATUS"; echo "Jan-Jun OK"

      - name: Finalize status + decision
        id: finalize
        if: always()
        run: |
          set -uo pipefail
          STATUS=reports/OVERNIGHT_AUTO_SWEEP_STATUS/summary.md
          mkdir -p reports/OVERNIGHT_AUTO_SWEEP_STATUS
          [ -f "$STATUS" ] || echo "# Overnight Auto Sweep — Status" > "$STATUS"
          QE='${{ steps.guard.outputs.qe_present }}'
          COL='${{ steps.guard.outputs.collision_present }}'
          PF='${{ steps.preflight.outcome }}'
          SM='${{ steps.smoke.outcome }}'
          FJ='${{ steps.fulljune.outcome }}'
          VT='${{ steps.validate.outcome }}'
          if [ "$QE" != "true" ]; then DECISION="NEEDS_MORE_DATA"
          elif [ "$PF" = "failure" ]; then DECISION="BLOCKED_BY_TESTS"
          elif [ "$SM" = "failure" ] || [ "$FJ" = "failure" ] || [ "$VT" = "failure" ]; then DECISION="SWEEP_FAILED"
          elif [ "$COL" != "true" ]; then DECISION="COLLISION_NOT_MERGED"
          else DECISION="READY_FOR_REVIEW"; fi
          {
            echo
            echo "## Outcomes"
            echo "- preflight: \`${PF:-skipped}\`  smoke: \`${SM:-skipped}\`  full_june: \`${FJ:-skipped}\`  validate_top: \`${VT:-skipped}\`"
            echo
            echo "## Artifact paths"
            echo "- reports/OVERNIGHT_AUTO_SWEEP_STATUS/"
            echo "- reports/TSL18_QUALITY_smoke/"
            echo "- reports/TSL18_QUALITY_full_june/"
            echo "- reports/TSL18_QUALITY_validate_top/"
            echo
            echo "## Decision: ${DECISION}"
          } >> "$STATUS"
          echo "DECISION=$DECISION"
          cat "$STATUS"

      - name: Upload status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overnight-sweep-status
          path: reports/OVERNIGHT_AUTO_SWEEP_STATUS/**
          if-no-files-found: warn

      - name: Upload sweep report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tsl18-quality-reports
          path: |
            reports/TSL18_QUALITY_smoke/**
            reports/TSL18_QUALITY_full_june/**
            reports/TSL18_QUALITY_validate_top/**
          if-no-files-found: ignore
