name: r4-phase2-tick-cal

# PHASE 2 of the R4 (Jan-2026) full trailing search: TICK-CALIBRATE the top-100/feed
# from Phase 1 (sweep_reports/tick_cal_jan_full/{vic,tc18}_phase1.csv, ranked by M1 edge).
#
# Per cell, on the committed May-Jun ticks (the only real-tick overlap window):
#   TICK May-Jun (real fills, slippage inert)  -> tickmay_edge/dd/net
#   M1   May-Jun (--m1-only, slippage 2.0/1.0) -> m1may_edge/dd/net
#   TICK Jun16-26 (real fills)                 -> tick_oos   (REAL tick OOS)
# factor_edge = tickmay_edge / m1may_edge ; factor_dd = tickmay_dd / m1may_dd.
# The leaderboard JOINS Phase-1's M1 jan_edge/jan_oos/jan_dd by cell and computes
#   est_jan_edge = jan_edge * factor_edge,  est_jan_dd = jan_dd * factor_dd.
# OOS is reported TWO ways, kept separate per the spec:
#   tick_oos    = REAL measured tick OOS (Jun 16-26)            [the TICK OOS]
#   m1_jan_oos  = Phase-1 M1 OOS (Jun 16+, M1)                  [the M1 OOS]
#   est_jan_oos = m1_jan_oos * factor_edge                      [informational]
# Slippage is M1-ONLY (the tick path does not consume lock-exit slippage), so the
# 2.0/1.0 flags on the tick runs are inert — exactly the agreed contract.
#
# Output: sweep_reports/tick_cal_jan_full/{vic,tc18}_phase2.csv  (ranked by est_jan_edge)

on:
  workflow_dispatch:
    inputs:
      may_start: { description: "Overlap start (M1+TICK)", default: "2026-05-01" }
      oos_tick_start: { description: "Real TICK OOS start", default: "2026-06-16" }
      top_n: { description: "Top-N/feed from Phase 1 to calibrate", default: "100" }

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: r4-phase2-tick-cal
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      vic_matrix: ${{ steps.gen.outputs.vic_matrix }}
      tc18_matrix: ${{ steps.gen.outputs.tc18_matrix }}
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - name: Build top-N matrices from Phase 1 leaderboards
        id: gen
        env:
          TOPN: ${{ github.event.inputs.top_n }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import csv, json, os
          topn = int(os.environ.get("TOPN") or "100")
          def num(x):
              try: return float(x)
              except: return -1e18
          def matrix(path, fields):
              rows = list(csv.DictReader(open(path)))
              rows.sort(key=lambda r: -num(r.get("jan_edge")))
              inc = []
              for r in rows[:topn]:
                  obj = {"cell": r["cell"]}
                  for f in fields:
                      obj[f] = r[f]
                  inc.append(obj)
              return json.dumps({"include": inc}, separators=(",", ":"))
          vic = matrix("sweep_reports/tick_cal_jan_full/vic_phase1.csv",
                       ["entries","trailing_open","trailing_close","trail_after_stage",
                        "sl_multiplier","final_target","activation_delay","max_hold"])
          tc18 = matrix("sweep_reports/tick_cal_jan_full/tc18_phase1.csv",
                        ["entries","sl_multiplier","trailing_open","trailing_close",
                         "max_hold","activation_delay"])
          print(f"vic_matrix={vic}")
          print(f"tc18_matrix={tc18}")
          PY

  vic_cell:
    needs: setup
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix: ${{ fromJSON(needs.setup.outputs.vic_matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: "VIC cal ${{ matrix.cell }}"
        env:
          MAY: ${{ github.event.inputs.may_start }}
          OOS_TICK: ${{ github.event.inputs.oos_tick_start }}
          CELL: ${{ matrix.cell }}
          ENTRIES: ${{ matrix.entries }}
          to: ${{ matrix.trailing_open }}
          tc: ${{ matrix.trailing_close }}
          stage: ${{ matrix.trail_after_stage }}
          slm: ${{ matrix.sl_multiplier }}
          ft: ${{ matrix.final_target }}
          ad: ${{ matrix.activation_delay }}
          mh: ${{ matrix.max_hold }}
        run: bash .github/scripts/r4_phase2_vic.sh
      - uses: actions/upload-artifact@v4
        with:
          name: "vcal2-${{ matrix.cell }}"
          path: "out/*.json"
          if-no-files-found: error

  tc18_cell:
    needs: setup
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix: ${{ fromJSON(needs.setup.outputs.tc18_matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate C160 feed (Jan-Jun 2026, same params as Phase 1)
        run: |
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_202601_ELEV8.csv data/XAUUSD_M1_202602_ELEV8.csv \
              data/XAUUSD_M1_202603_ELEV8.csv data/XAUUSD_M1_202604_ELEV8.csv \
              data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --output feed.txt --start "2026-01-01" --session-start 0 --session-end 0 --signal-tz 7 \
            --rsi-buy-max 70 --rsi-sell-min 30 --bb-bandwidth-min 0.0006 --rr1 1.2 --rr2 2.5 --rr3 5
      - name: "TC18 cal ${{ matrix.cell }}"
        env:
          MAY: ${{ github.event.inputs.may_start }}
          OOS_TICK: ${{ github.event.inputs.oos_tick_start }}
          CELL: ${{ matrix.cell }}
          ENTRIES: ${{ matrix.entries }}
          slm: ${{ matrix.sl_multiplier }}
          to: ${{ matrix.trailing_open }}
          tc: ${{ matrix.trailing_close }}
          ad: ${{ matrix.activation_delay }}
          mh: ${{ matrix.max_hold }}
        run: bash .github/scripts/r4_phase2_tc18.sh
      - uses: actions/upload-artifact@v4
        with:
          name: "tcal2-${{ matrix.cell }}"
          path: "out/*.json"
          if-no-files-found: error

  leaderboard:
    needs: [vic_cell, tc18_cell]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/download-artifact@v4
        with: { pattern: "vcal2-*", path: "art/vic", merge-multiple: true }
      - uses: actions/download-artifact@v4
        with: { pattern: "tcal2-*", path: "art/tc18", merge-multiple: true }
      - name: Calibrate + rank by est_jan_edge
        run: |
          python - <<'PY'
          import json, csv, glob, os, math
          def janmap(path):
              return {r["cell"]: r for r in csv.DictReader(open(path))}
          def fnum(x):
              try: return float(x)
              except: return None
          def factor(t, m):
              if m is None or t is None or abs(m) < 1e-9: return None
              return round(t / m, 4)
          def mul(x, f):
              return round(x * f, 2) if (x is not None and f is not None) else None
          def build(prefix, jpath, out_path):
              jm = janmap(jpath)
              rows = []
              for f in sorted(glob.glob(f"art/{prefix}/*.json")):
                  d = json.load(open(f))
                  j = jm.get(d["cell"], {})
                  je, jo, jd = fnum(j.get("jan_edge")), fnum(j.get("jan_oos")), fnum(j.get("jan_dd"))
                  jn = fnum(j.get("jan_net"))
                  d["m1_jan_edge"], d["m1_jan_oos"], d["m1_jan_dd"], d["m1_jan_net"] = je, jo, jd, jn
                  d["jan_signals"] = int(fnum(j.get("jan_signals")) or 0)
                  fe = factor(d["tickmay_edge"], d["m1may_edge"])
                  fd = factor(d["tickmay_dd"],   d["m1may_dd"])
                  d["f_edge"], d["f_dd"] = fe, fd
                  d["est_jan_edge"] = mul(je, fe)
                  d["est_jan_oos"]  = mul(jo, fe)      # M1 OOS scaled to tick (informational)
                  d["est_jan_dd"]   = mul(jd, fd)
                  # tick_oos stays as-measured (REAL tick OOS, distinct from M1 OOS)
                  dd = d["est_jan_dd"]
                  d["pass_dd40"] = bool(dd is not None and dd <= 40.0)
                  d["pass_dd50"] = bool(dd is not None and dd <= 50.0)
                  rows.append(d)
              rows.sort(key=lambda r: (0 if r.get("est_jan_edge") is not None else 1,
                                       -(r["est_jan_edge"] if r.get("est_jan_edge") is not None else -math.inf)))
              cols = ["cell","strategy","entries","sl_multiplier","trailing_open","trailing_close",
                      "trail_after_stage","final_target","max_hold","activation_delay",
                      "est_jan_edge","tick_oos","est_jan_oos","est_jan_dd","pass_dd40","pass_dd50",
                      "f_edge","f_dd",
                      "tickmay_edge","tickmay_dd","tickmay_net","m1may_edge","m1may_dd","m1may_net",
                      "m1_jan_edge","m1_jan_oos","m1_jan_dd","m1_jan_net","jan_signals"]
              os.makedirs(os.path.dirname(out_path), exist_ok=True)
              with open(out_path, "w", newline="") as fh:
                  w = csv.DictWriter(fh, fieldnames=cols, extrasaction="ignore")
                  w.writeheader(); w.writerows(rows)
              print(f"Wrote {out_path} ({len(rows)} rows)")
              for tag, flt in (("DD<=40", lambda r: r["pass_dd40"]),
                               ("DD<=50", lambda r: r["pass_dd50"])):
                  ok = [r for r in rows if flt(r) and r.get("est_jan_edge") is not None]
                  print(f"  [{prefix} best @ {tag}] ({len(ok)} pass)")
                  for r in ok[:5]:
                      print(f"    {r['cell']}: est_edge=${r['est_jan_edge']} tick_oos=${r['tick_oos']} "
                            f"est_dd={r['est_jan_dd']}% f_edge={r['f_edge']}")
          build("vic",  "sweep_reports/tick_cal_jan_full/vic_phase1.csv",  "sweep_reports/tick_cal_jan_full/vic_phase2.csv")
          build("tc18", "sweep_reports/tick_cal_jan_full/tc18_phase1.csv", "sweep_reports/tick_cal_jan_full/tc18_phase2.csv")
          PY
      - name: Commit
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"
          git add sweep_reports/tick_cal_jan_full/
          git diff --cached --quiet || git commit -m "R4 phase2 (tick-calibrated top-100/feed): est_jan_edge + real tick OOS, ranked"
          git push origin HEAD || true
      - uses: actions/upload-artifact@v4
        with: { name: "r4-phase2", path: "sweep_reports/tick_cal_jan_full/", if-no-files-found: warn }
