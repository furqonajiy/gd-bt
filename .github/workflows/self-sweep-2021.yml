name: self-sweep-2021

# Runs the no-trailing parameter sweep (sweep2021/orchestrate.py) CONTINUOUSLY on
# GitHub Actions, so the heavy >10-min candidates complete without the in-container
# idle-reclaim deadlock. It operates on the research/self-sweep-2021 branch and
# pushes checkpoints there; nothing about the sweep lands on main.
#
# FREE on a PUBLIC repo (unlimited standard-runner minutes). On a private repo it
# would consume metered minutes. schedule/workflow_dispatch only fire from the
# default branch, so this file lives on main; it checks out the research branch.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */2 * * *"   # safety net; self-disables once all 4 feeds are DONE

permissions:
  contents: write   # push sweep checkpoints to the research branch
  actions: write    # self-chain the next run / self-disable when finished

concurrency:
  group: self-sweep-2021
  cancel-in-progress: false   # never interrupt an in-flight sweep run

jobs:
  sweep:
    runs-on: ubuntu-latest      # standard 4-core/16GB; matches the 4-shard layout
    timeout-minutes: 350        # under the 6h job cap, room for the flush
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/self-sweep-2021
          fetch-depth: 0

      - name: Completion guard (all 4 feeds DONE?)
        id: guard
        run: |
          done=$(ls -d sweep2021_out/sweep_*/DONE 2>/dev/null | wc -l)
          echo "feeds DONE: ${done}/4"
          [ "${done}" -ge 4 ] && echo "complete=true" >> "$GITHUB_OUTPUT" || echo "complete=false" >> "$GITHUB_OUTPUT"

      - name: Disable schedule when complete
        if: steps.guard.outputs.complete == 'true'
        run: |
          echo "All feeds done — disabling schedule."
          gh workflow disable self-sweep-2021.yml --repo "${{ github.repository }}" || true

      - name: Set up Python
        if: steps.guard.outputs.complete != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.guard.outputs.complete != 'true'
        run: pip install -r requirements.txt

      - name: Author identity for checkpoints
        if: steps.guard.outputs.complete != 'true'
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"

      - name: Run sweep (continuous, resumable, time-boxed)
        if: steps.guard.outputs.complete != 'true'
        run: |
          # orchestrate.py uses a relative ROOT (parents[1]) and self-commits every
          # 15 min; the 5h box + --resume hands off cleanly to the next chained run.
          timeout 18000 python sweep2021/orchestrate.py || true

      - name: Flush trailing checkpoint
        if: steps.guard.outputs.complete != 'true'
        run: |
          git add -A sweep2021_out generated sweep2021/self_cli_best.txt 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -q -m "ci: self-sweep-2021 checkpoint"
            for i in 1 2 3 4; do git push -q origin HEAD:research/self-sweep-2021 && break || sleep $((2 ** i)); done
          fi

      - name: Chain the next run, or disable when finished
        if: always() && steps.guard.outputs.complete != 'true'
        run: |
          done=$(ls -d sweep2021_out/sweep_*/DONE 2>/dev/null | wc -l)
          echo "feeds DONE after this run: ${done}/4"
          if [ "${done}" -ge 4 ]; then
            gh workflow disable self-sweep-2021.yml --repo "${{ github.repository }}" || true
          else
            gh workflow run self-sweep-2021.yml --ref main --repo "${{ github.repository }}" || true
          fi
