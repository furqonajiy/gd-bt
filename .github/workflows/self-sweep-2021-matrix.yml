name: self-sweep-2021-matrix

# 16-core PARALLEL version of the no-trailing 2021 self-sweep (sibling of
# self-sweep-2021.yml). Instead of one 4-core runner sharding a single feed at a
# time, this fans out a 16-job matrix (4 feeds x 4 shards) of independent
# ubuntu-latest runners that each run ONE tools/sweep_self_limit.py shard, then a
# single AGGREGATE job merges every shard's results back and is the SOLE writer to
# the research branch — so there is no push collision between the parallel shards.
#
# Why this is collision-free:
#   * Each shard job only ever WRITES its own results.jsonl and uploads it as an
#     artifact (res-<feed>-<shard>); it never pushes.
#   * The aggregate job downloads all 16 artifacts, copies them into the
#     sweep2021_out/sweep_<feed>/shard<shard>/ tree, regenerates the snapshot, and
#     is the only job that commits + pushes to research/self-sweep-2021.
#
# Resume: each shard checks out research/self-sweep-2021 (which already contains
# any results.jsonl a prior aggregate committed), so --resume continues from it.
# The shard's artifact carries the FULL cumulative results.jsonl, so the aggregate
# can overwrite-copy each one safely.
#
# Self-terminating: the aggregate marks a feed DONE once all 4 of its shards have
# >= 200 result lines; when all 4 feeds are DONE it disables this workflow,
# otherwise it re-dispatches itself for the next pass. A sparse 3-hourly schedule
# is only a safety net. schedule/workflow_dispatch fire only from the default
# branch, so this file lives on main; it operates on the research branch and
# nothing about the sweep lands on main.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */3 * * *"   # safety net; self-disables once all 4 feeds are DONE

permissions:
  contents: write   # aggregate pushes sweep checkpoints to the research branch
  actions: write    # self-chain the next pass / self-disable when finished

concurrency:
  group: self-sweep-2021-matrix
  cancel-in-progress: false   # never interrupt an in-flight sweep pass

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  shard:
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        feed: [scalper24, risk02_allhours, scalper_widerr24, better]
        shard: [0, 1, 2, 3]
    runs-on: ubuntu-latest
    timeout-minutes: 330        # under the 6h job cap, room for upload
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/self-sweep-2021
          fetch-depth: 0

      - name: Completion guard (feed already DONE?)
        id: guard
        run: |
          # If a previous aggregate marked this feed DONE, skip the heavy sweep.
          if [ -f "sweep2021_out/sweep_${{ matrix.feed }}/DONE" ]; then
            echo "feed ${{ matrix.feed }} is DONE — skipping shard ${{ matrix.shard }}."
            echo "done=true" >> "$GITHUB_OUTPUT"
          else
            echo "done=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.done != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.guard.outputs.done != 'true'
        run: pip install -r requirements.txt

      - name: Run shard (one feed x one shard, resumable, time-boxed)
        if: steps.guard.outputs.done != 'true'
        run: |
          # Each shard uses seed 42+shard so it draws different candidates; the
          # champion seeds are auto-prepended in every shard. --resume continues
          # from the checked-out results.jsonl. 5h box hands off to the next pass.
          timeout 18000 python tools/sweep_self_limit.py \
            --signals "generated/self_${{ matrix.feed }}.txt" \
            --charts data/XAUUSD_M1_*_ELEV8.csv \
            --seed $((42 + ${{ matrix.shard }})) \
            --max-candidates 200 \
            --output-dir "sweep2021_out/sweep_${{ matrix.feed }}/shard${{ matrix.shard }}" \
            --max-concurrent-dd-pct 40 \
            --validate-months 6 \
            --top-n 20 \
            --progress-every 20 \
            --resume || true

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: res-${{ matrix.feed }}-${{ matrix.shard }}
          path: sweep2021_out/sweep_${{ matrix.feed }}/shard${{ matrix.shard }}/results.jsonl
          if-no-files-found: ignore
          retention-days: 1

  aggregate:
    needs: shard
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/self-sweep-2021
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts
          pattern: res-*
          merge-multiple: false

      - name: Copy artifacts into the shard tree
        run: |
          # download-artifact@v4 lays each artifact down at
          #   _artifacts/res-<feed>-<shard>/results.jsonl
          # Copy each (the artifact is the FULL cumulative file) over
          #   sweep2021_out/sweep_<feed>/shard<shard>/results.jsonl
          shopt -s nullglob
          for d in _artifacts/res-*/; do
            base=$(basename "$d")            # e.g. res-scalper24-0
            rest=${base#res-}                # scalper24-0
            shard=${rest##*-}                # 0
            feed=${rest%-*}                  # scalper24
            src="${d}results.jsonl"
            if [ -f "$src" ]; then
              dst="sweep2021_out/sweep_${feed}/shard${shard}"
              mkdir -p "$dst"
              cp -f "$src" "${dst}/results.jsonl"
              echo "copied ${src} -> ${dst}/results.jsonl ($(wc -l < "${dst}/results.jsonl") lines)"
            fi
          done

      - name: Author identity for checkpoint commits
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"

      - name: Mark feeds DONE (all 4 shards have >= 200 lines)
        run: |
          for feed in scalper24 risk02_allhours scalper_widerr24 better; do
            ok=1
            for shard in 0 1 2 3; do
              f="sweep2021_out/sweep_${feed}/shard${shard}/results.jsonl"
              n=0
              [ -f "$f" ] && n=$(wc -l < "$f")
              if [ "$n" -lt 200 ]; then ok=0; fi
              echo "feed=${feed} shard=${shard} lines=${n}"
            done
            if [ "$ok" -eq 1 ]; then
              touch "sweep2021_out/sweep_${feed}/DONE"
              echo "feed ${feed}: all shards >= 200 lines — marked DONE"
            fi
          done

      - name: Regenerate snapshot (BEST_SELF_2021.txt + self_cli_best.txt)
        run: |
          # run_baseline() returns the cached BASELINE.json fast; snapshot()
          # rebuilds from the merged shard results.jsonl files.
          python -c "import sweep2021.orchestrate as o; o.snapshot(o.run_baseline())"

      - name: Commit + push to research branch (sole writer — no collision)
        run: |
          git add -A sweep2021_out generated sweep2021/self_cli_best.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -q -m "ci: self-sweep-2021 matrix aggregate checkpoint"
            for i in 1 2 3 4; do
              if git push -q origin HEAD:research/self-sweep-2021; then
                echo "push: ok"; break
              fi
              echo "push: retry ${i}"
              # Re-sync with any concurrent change before retrying.
              git pull --rebase -q origin research/self-sweep-2021 || true
              sleep $((2 ** i))
            done
          fi

      - name: Chain the next pass, or disable when finished
        if: always()
        run: |
          done=$(ls -d sweep2021_out/sweep_*/DONE 2>/dev/null | wc -l)
          echo "feeds DONE after this pass: ${done}/4"
          if [ "${done}" -ge 4 ]; then
            echo "All feeds done — disabling this workflow."
            gh workflow disable self-sweep-2021-matrix.yml --repo "${{ github.repository }}" || true
          else
            echo "Work remains — dispatching the next pass."
            gh workflow run self-sweep-2021-matrix.yml --ref main --repo "${{ github.repository }}" || true
          fi
