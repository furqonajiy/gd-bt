name: self-r4-sweep

# Slippage-aware parameter sweep for the SELF-GENERATED scalper feed on R4 (2026,
# the current regime). The scalper analog of victor-sweep: the scalper generator
# already sets the SL/TP geometry, so this does NOT use --signal-policy -- it
# sweeps OUR core strategy params (entries, sl_multiplier, lock delays, max-hold,
# final-target, ...) over the generated 2026 feed, every candidate carrying the
# locked-exit slippage overlay (2.0/1.0 via sweep.base_config_dict) so the winner
# is decided on REAL fills. Ranked on fixed-lot edge + $3/closed-lot bonus,
# guarded by DD<=40% & OOS>0 (tools/victor_sweep_aggregate.py, regime R4parab).
#
# CHAINED: triggers automatically when `victor-sweep` finishes (workflow_run), so
# it starts the moment Victor's run completes -- run Victor, go to sleep, and the
# R4 self-signal sweep is already running / done by morning. Also dispatchable by
# hand. NOTE: this re-runs after EVERY victor-sweep completion; delete the
# workflow (or the workflow_run trigger) once this one-shot chain has fired.

on:
  workflow_run:
    workflows: ["victor-sweep"]
    types: [completed]
  workflow_dispatch:
    inputs:
      max_candidates:
        description: "candidates per shard"
        default: "200"

permissions:
  contents: read

concurrency:
  group: self-r4-sweep
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sweep:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        batch: [0, 1, 2, 3, 4, 5, 6, 7]   # 8 batches x 4 shards = 32 shards
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Generate the scalper24 feed for R4 (2026)
        run: |
          set -euo pipefail
          python tools/generate_scalper_signals.py \
            --charts "data/XAUUSD_M1_2026"*"_ELEV8.csv" \
            --output feed_R4.txt --start 2026-01-01 \
            --session-start 0 --session-end 0 --signal-tz 7
      - name: Run 4 shards in parallel (all 4 runner cores, resumable)
        run: |
          set -uo pipefail
          BASE=$(( 42 + ${{ matrix.batch }} * 4 ))
          MC="${{ github.event.inputs.max_candidates }}"; MC="${MC:-200}"
          CELL="self_out/R4parab"
          for N in 0 1 2 3; do
            timeout 18000 python tools/sweep_self_limit.py \
              --signals feed_R4.txt \
              --charts "data/XAUUSD_M1_2026"*"_ELEV8.csv" \
              --seed $((BASE + N)) \
              --max-candidates "$MC" \
              --output-dir "${CELL}/batch_${{ matrix.batch }}_shard${N}" \
              --validate-months 2 \
              --max-concurrent-dd-pct 40 \
              --fixed-lot 0.01 \
              --resume &
          done
          wait
          echo "shard line counts:"
          for f in "${CELL}"/batch_${{ matrix.batch }}_shard*/results.jsonl; do
            echo "  $f: $(wc -l < "$f" 2>/dev/null || echo 0)"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: self-R4parab-${{ matrix.batch }}
          path: self_out/**/results.jsonl
          if-no-files-found: error

  aggregate:
    needs: [sweep]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          path: _artifacts
      - name: Aggregate R4, pick winner on edge + $3/lot bonus
        run: |
          set -uo pipefail
          mkdir -p root_R4
          cp -r _artifacts/self-R4parab-* root_R4/ 2>/dev/null || true
          python tools/victor_sweep_aggregate.py \
            --root root_R4 --regime R4parab \
            --out-dir self_results/R4parab --dd-gate 40 --top-n 25 || true
          echo "==================== R4 SELF-SIGNAL WINNER ===================="
          cat self_results/R4parab/WINNER_R4parab.md 2>/dev/null || echo "(no winner written)"
      - uses: actions/upload-artifact@v4
        with:
          name: self-r4-sweep-results
          path: self_results/**
          if-no-files-found: warn
