              data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --output feed.txt --start "${JAN}" \
            --session-start 0 --session-end 0 --signal-tz 7 \
            --rsi-buy-max 70 --rsi-sell-min 30 --bb-bandwidth-min 0.0006 \
            --rr1 1.2 --rr2 2.5 --rr3 5
        env:
          JAN: ${{ github.event.inputs.jan_start }}
      - name: "TC18 r${{ matrix.rank }} slm=${{ matrix.slm }} to=${{ matrix.to }} tc=${{ matrix.tc }} mh=${{ matrix.mh }} ad=${{ matrix.ad }}"
        run: |
          set -o pipefail
          CELL="tc18ext_r${rank}_slm${slm//./}_to${to//./}_tc${tc//./}_mh${mh}_ad${ad}"
          mkdir -p out raw
          STRAT="--entries 7 --entry-ladder range_to_sl --entry-sl-gap 0.7 --shared-sl false \
            --activation-delay ${ad} --pending-expiry 180 --max-hold ${mh} \
            --sl-multiplier ${slm} --final-target TP3 --runner-after-tp3 false \
            --lock-after-tp1 true --lock-after-tp2 true \
            --tp1-lock-delay-minutes 24 --tp2-lock-delay-minutes 24 \
            --profit-lock-mode tp_levels --bep-trigger-distance 3.0 --tp1-lock-fraction 0.75 \
            --tp2-lock-target TP1 --tp3-lock-target TP2 \
            --trailing-open-distance ${to} --trailing-close-distance ${tc} \
            --trailing-close-after-stage 2 \
            --lock-tp1-exit-slippage 2.0 --lock-tp2-exit-slippage 1.0"
          COMMON="--signals feed.txt --sync-charts false \
            --watch-seconds 3 --max-drawdown-limit-pct 100 \
            --progress-interval-seconds 0 --minimum-lot 0.01 --lot-step 0.01"
          CJAN="data/XAUUSD_M1_202601_ELEV8.csv data/XAUUSD_M1_202602_ELEV8.csv \
            data/XAUUSD_M1_202603_ELEV8.csv data/XAUUSD_M1_202604_ELEV8.csv \
            data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv"
          CMAY="data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv"
          python tools/backtest_hybrid.py $COMMON --charts $CJAN $STRAT \
            --sizing-mode risk --risk 0.01 --lot 0.01 --initial-capital 50000 \
            --bonus-per-closed-lot 3.0 --start-date "${JAN}" \
            --output-dir "reports/${CELL}_jnet" --score-json "raw/jnet.json"
          python tools/backtest_hybrid.py $COMMON --charts $CJAN $STRAT \
            --sizing-mode fixed --risk 0.01 --lot 0.01 --initial-capital 50000 \
            --bonus-per-closed-lot 0 --start-date "${JAN}" \
            --output-dir "reports/${CELL}_jedge" --score-json "raw/jedge.json"
          python tools/backtest_hybrid.py $COMMON --charts $CJAN $STRAT \
            --sizing-mode fixed --risk 0.01 --lot 0.01 --initial-capital 50000 \
            --bonus-per-closed-lot 0 --start-date "${OOS}" \
            --output-dir "reports/${CELL}_oos" --score-json "raw/oos.json"
          python tools/backtest_hybrid.py $COMMON --charts $CMAY $STRAT \
            --sizing-mode risk --risk 0.01 --lot 0.01 --initial-capital 50000 \
            --bonus-per-closed-lot 3.0 --start-date "${MAY}" \
            --output-dir "reports/${CELL}_mnet" --score-json "raw/mnet.json"
          python tools/backtest_hybrid.py $COMMON --charts $CMAY $STRAT \
            --sizing-mode fixed --risk 0.01 --lot 0.01 --initial-capital 50000 \
            --bonus-per-closed-lot 0 --start-date "${MAY}" \
            --output-dir "reports/${CELL}_medge" --score-json "raw/medge.json"
          python - "$CELL" "$rank" "$slm" "$to" "$tc" "$mh" "$ad" <<'PY'
          import json, sys
          cell,rank,slm,to,tc,mh,ad = sys.argv[1:8]
          jn=json.load(open("raw/jnet.json")); je=json.load(open("raw/jedge.json"))
          oo=json.load(open("raw/oos.json"));  mn=json.load(open("raw/mnet.json"))
          me=json.load(open("raw/medge.json"))
          d={"cell":cell,"orig_rank":int(rank),
             "sl_multiplier":float(slm),"trailing_open":float(to),
             "trailing_close":float(tc),"max_hold":int(mh),"activation_delay":int(ad),
             "jan_net":round(jn["net_profit"],2),"jan_dd":round(jn["max_drawdown_pct"],2),
             "jan_edge":round(je["net_profit"],2),"jan_signals":jn["signals_included"],
             "oos_m1":round(oo["net_profit"],2),
             "may_m1_net":round(mn["net_profit"],2),"may_m1_dd":round(mn["max_drawdown_pct"],2),
             "may_m1_edge":round(me["net_profit"],2),"may_signals":mn["signals_included"]}
          open(f"out/{cell}.json","w").write(json.dumps(d)); print(d)
          PY
        env:
          JAN: ${{ github.event.inputs.jan_start }}
          MAY: ${{ github.event.inputs.may_start }}
          OOS: ${{ github.event.inputs.oos_start }}
          rank: ${{ matrix.rank }}
          slm: ${{ matrix.slm }}
          to: ${{ matrix.to }}
          tc: ${{ matrix.tc }}
          mh: ${{ matrix.mh }}
          ad: ${{ matrix.ad }}
      - uses: actions/upload-artifact@v4
        with:
          name: "ext-tc18-r${{ matrix.rank }}"
          path: "out/*.json"
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────────────────────
# LEADERBOARD — join all cell results + existing TICK leaderboards
# ─────────────────────────────────────────────────────────────────────────────
  leaderboard:
    needs: [vic_baseline, vic_cell, tc18_baseline, tc18_cell]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with: { pattern: "ext-vic-*", path: "artifacts/vic", merge-multiple: true }
      - uses: actions/download-artifact@v4
        with: { pattern: "ext-tc18-*", path: "artifacts/tc18", merge-multiple: true }
      - name: Build comparison leaderboards
        run: |
          python - <<'PY'
          import json, csv, os, glob, math

          def load_tick_lb(path):
              if not os.path.exists(path): return {}
              with open(path) as f:
                  return {r["cell"]: r for r in csv.DictReader(f)}

          vic_tick  = load_tick_lb("sweep_reports/tick_trailing_vic_aggressive/leaderboard.csv")
          tc18_tick = load_tick_lb("sweep_reports/tick_trailing_tc18_retune/leaderboard.csv")

          def flt(x):
              try: return round(float(x), 2)
              except: return None

          def vic_tick_key(d):
              to  = str(d.get("trailing_open","")).replace(".","")
              tc  = str(d.get("trailing_close","")).replace(".","")
              s   = d.get("trail_after_stage","")
              slm = str(d.get("sl_multiplier","")).replace(".","")
              ft  = d.get("final_target","")
              ad  = d.get("activation_delay","")
              return f"vic_to{to}_tc{tc}_s{s}_slm{slm}_{ft}_ad{ad}"

          def tc18_tick_key(d):
              slm = str(d.get("sl_multiplier","")).replace(".","")
              to  = str(d.get("trailing_open","")).replace(".","")
              tc  = str(d.get("trailing_close","")).replace(".","")
              mh  = d.get("max_hold","")
              ad  = d.get("activation_delay","")
              return f"tc18_slm{slm}_to{to}_tc{tc}_mh{mh}_ad{ad}"

          def build(prefix, tick_lb, tick_key_fn, out_path):
              rows = []
              for f in sorted(glob.glob(f"artifacts/{prefix}/*.json")):
                  d = json.load(open(f))
                  # look up matching TICK leaderboard row
                  tkey = d["cell"] if "base" in d["cell"] else tick_key_fn(d)
                  t = tick_lb.get(tkey, {})
                  d["may_tick_net"]  = flt(t.get("net_compound"))
                  d["may_tick_dd"]   = flt(t.get("drawdown_pct"))
                  d["may_tick_edge"] = flt(t.get("edge"))
                  d["may_tick_oos"]  = flt(t.get("oos"))
                  rows.append(d)
              # sort by jan_edge descending (most reliable forward-fit metric over Jan-Jun)
              rows.sort(key=lambda r: r.get("jan_edge") or -math.inf, reverse=True)
              os.makedirs(os.path.dirname(out_path), exist_ok=True)
              if not rows: return
              with open(out_path, "w", newline="") as f:
                  w = csv.DictWriter(f, fieldnames=list(rows[0].keys()))
                  w.writeheader(); w.writerows(rows)
              print(f"Wrote {out_path} ({len(rows)} rows)")

          build("vic",  vic_tick,  vic_tick_key,
                "sweep_reports/top20_extended/vic_comparison.csv")
          build("tc18", tc18_tick, tc18_tick_key,
                "sweep_reports/top20_extended/tc18_comparison.csv")
          PY
      - name: Commit leaderboards to repo
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"
          git add sweep_reports/top20_extended/
          git diff --cached --quiet || git commit -m "top20 extended: Jan M1 + May M1 vs TICK comparison"
          git push origin HEAD || true
      - uses: actions/upload-artifact@v4
        with:
          name: "top20-extended-leaderboard"
          path: "sweep_reports/top20_extended/"
          if-no-files-found: warn
