name: self-regime-sweep

# PER-REGIME adaptive grid sweep (sibling of self-sweep-2021-matrix.yml). The
# self_adaptive feed is the same archive across regimes; what changes is the
# slice of history each regime is fit on. We fan out a 16-job matrix (4 regimes
# x 4 shards) of independent ubuntu-latest runners that each run ONE
# tools/sweep_self_limit.py shard against that regime's chart month-glob, then a
# single AGGREGATE job merges every shard's results back and is the SOLE writer
# to research/regime-adaptive — so there is no push collision between the
# parallel shards.
#
# Why this is collision-free (same contract as the 2021 matrix):
#   * Each shard job only ever WRITES its own results.jsonl and uploads it as an
#     artifact (res-<regime>-<shard>); it never pushes.
#   * The aggregate job downloads all 16 artifacts, copies them into the
#     sweep_regime_out/<regime>/shard<shard>/ tree, writes the per-regime
#     BEST/CLI snapshots, and is the only job that commits + pushes.
#
# Resume: each shard checks out research/regime-adaptive (which already contains
# any results.jsonl a prior aggregate committed), so --resume continues from it.
# The shard's artifact carries the FULL cumulative results.jsonl, so the
# aggregate can overwrite-copy each one safely.
#
# Self-terminating: the aggregate marks a regime DONE once all 4 of its shards
# have >= 250 result lines; when all 4 regimes are DONE it disables this
# workflow, otherwise it re-dispatches itself for the next pass. A sparse
# 3-hourly schedule is only a safety net. schedule/workflow_dispatch fire only
# from the default branch, so this file lives on main; it operates on the
# research branch and nothing about the sweep lands on main.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */3 * * *"   # safety net; self-disables once all 4 regimes are DONE

permissions:
  contents: write   # aggregate pushes sweep checkpoints to the research branch
  actions: write    # self-chain the next pass / self-disable when finished

concurrency:
  group: self-regime-sweep
  cancel-in-progress: false   # never interrupt an in-flight sweep pass

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  shard:
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        regime: [R1quiet, R2bull, R3strong, R4parab]
        shard: [0, 1, 2, 3]
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/regime-adaptive
          fetch-depth: 0

      - name: Completion guard (regime already DONE?)
        id: guard
        run: |
          # If a previous aggregate marked this regime DONE, skip the heavy sweep.
          if [ -f "sweep_regime_out/${{ matrix.regime }}/DONE" ]; then
            echo "regime ${{ matrix.regime }} is DONE — skipping shard ${{ matrix.shard }}."
            echo "done=true" >> "$GITHUB_OUTPUT"
          else
            echo "done=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.done != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.guard.outputs.done != 'true'
        run: pip install -r requirements.txt

      - name: Resolve this regime's chart month-glob
        if: steps.guard.outputs.done != 'true'
        id: charts
        run: |
          # Each regime is fit on a distinct slice of XAUUSD history. The globs
          # are expanded by the shell into the actual ELEV8 chart files below.
          case "${{ matrix.regime }}" in
            R1quiet)
              CHARTS="data/XAUUSD_M1_2021{11,12}_ELEV8.csv data/XAUUSD_M1_2022*_ELEV8.csv data/XAUUSD_M1_2023{01,02,03,04,05,06,07,08,09}_ELEV8.csv"
              ;;
            R2bull)
              CHARTS="data/XAUUSD_M1_2023{10,11,12}_ELEV8.csv data/XAUUSD_M1_2024*_ELEV8.csv"
              ;;
            R3strong)
              CHARTS="data/XAUUSD_M1_2025*_ELEV8.csv"
              ;;
            R4parab)
              CHARTS="data/XAUUSD_M1_2026*_ELEV8.csv"
              ;;
            *)
              echo "unknown regime ${{ matrix.regime }}"; exit 1 ;;
          esac
          echo "CHARTS=${CHARTS}" >> "$GITHUB_ENV"
          echo "regime ${{ matrix.regime }} charts: ${CHARTS}"

      - name: Run shard (one regime x one shard, resumable, time-boxed)
        if: steps.guard.outputs.done != 'true'
        run: |
          # Each shard uses seed 42+shard so it draws different candidates.
          # --resume continues from the checked-out results.jsonl. The 55-minute
          # box (timeout 3300) hands off to the next pass under the 70-min job cap.
          # $CHARTS is intentionally unquoted so the shell expands the glob.
          timeout 3300 python tools/sweep_self_limit.py \
            --signals generated/self_adaptive.txt \
            --charts $CHARTS \
            --seed $((42 + ${{ matrix.shard }})) \
            --max-candidates 250 \
            --output-dir sweep_regime_out/${{ matrix.regime }}/shard${{ matrix.shard }} \
            --max-concurrent-dd-pct 40 \
            --validate-months 2 \
            --top-n 30 \
            --progress-every 10 \
            --resume || true

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: res-${{ matrix.regime }}-${{ matrix.shard }}
          path: sweep_regime_out/${{ matrix.regime }}/shard${{ matrix.shard }}/results.jsonl
          if-no-files-found: ignore
          retention-days: 1

  aggregate:
    needs: shard
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/regime-adaptive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts
          pattern: res-*
          merge-multiple: false

      - name: Copy artifacts into the shard tree
        run: |
          # download-artifact@v4 lays each artifact down at
          #   _artifacts/res-<regime>-<shard>/results.jsonl
          # Regime names have no dashes, so splitting res-<regime>-<shard> on the
          # LAST dash is unambiguous. Copy each (the artifact is the FULL
          # cumulative file) over
          #   sweep_regime_out/<regime>/shard<shard>/results.jsonl
          shopt -s nullglob
          for d in _artifacts/res-*/; do
            base=$(basename "$d")            # e.g. res-R1quiet-0
            rest=${base#res-}                # R1quiet-0
            shard=${rest##*-}                # 0
            regime=${rest%-*}                # R1quiet
            src="${d}results.jsonl"
            if [ -f "$src" ]; then
              dst="sweep_regime_out/${regime}/shard${shard}"
              mkdir -p "$dst"
              cp -f "$src" "${dst}/results.jsonl"
              echo "copied ${src} -> ${dst}/results.jsonl ($(wc -l < "${dst}/results.jsonl") lines)"
            fi
          done

      - name: Author identity for checkpoint commits
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"

      - name: Write per-regime BEST + CLI snapshots
        run: |
          python - <<'PY'
          import json, pathlib
          OUT = pathlib.Path("sweep_regime_out")
          REGIMES = ["R1quiet", "R2bull", "R3strong", "R4parab"]
          DD_GATE = 40.0

          def load_regime(regime):
              rows = []
              for shard in range(4):
                  f = OUT / regime / f"shard{shard}" / "results.jsonl"
                  if not f.exists():
                      continue
                  for line in f.read_text().splitlines():
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          rows.append(json.loads(line))
                      except json.JSONDecodeError:
                          continue
              return rows

          def render_cli(cfg, *, regime, signals="generated/self_adaptive.txt"):
              # Mirror the 2021 orchestrator's renderer when importable so the
              # winning CLI is a runnable backtest_explicit command; otherwise
              # fall back to dumping the config dict (per the workflow contract).
              try:
                  import sys
                  sys.path.insert(0, ".")
                  from sweep2021 import orchestrate as o  # noqa
                  args = o.baseline_explicit_args(
                      cfg, signals=signals,
                      output_dir=f"reports/BEST_{regime}")
                  cont = " \\\n  "
                  return "python tools/backtest_explicit.py" + cont + cont.join(str(a) for a in args) + "\n"
              except Exception as exc:  # pragma: no cover - renderer is optional
                  return ("# CLI renderer unavailable (%s); best config dict:\n%s\n"
                          % (exc, json.dumps(cfg, indent=2, sort_keys=True)))

          for regime in REGIMES:
              rows = load_regime(regime)
              # DD<=40% survivors only, then rank by OOS (held-out tail) then edge.
              def dd(r):
                  return r.get("concurrent_risk_max_dd_pct")
              survivors = [r for r in rows
                           if dd(r) is not None and dd(r) <= DD_GATE]
              def keyfn(r):
                  return (
                      r.get("oos_fixed_no_bonus_profit") or 0.0,
                      r.get("fixed_no_bonus_profit") or 0.0,
                  )
              survivors.sort(key=keyfn, reverse=True)

              best_path = OUT / f"BEST_{regime}.txt"
              lines = [
                  f"# regime {regime}: top DD<={DD_GATE:.0f}% candidates "
                  f"by OOS then edge ({len(survivors)}/{len(rows)} pass DD gate)",
                  "",
              ]
              for i, r in enumerate(survivors[:30], 1):
                  lines.append(
                      f"{i:>2}. oos={r.get('oos_fixed_no_bonus_profit')} "
                      f"edge={r.get('fixed_no_bonus_profit')} "
                      f"dd={r.get('concurrent_risk_max_dd_pct')}% "
                      f"stable={r.get('stable_fraction')} "
                      f"cfg={r.get('config_json')}")
              best_path.write_text("\n".join(lines) + "\n")
              print(f"{regime}: wrote {best_path} ({len(survivors)} survivors)")

              cli_path = OUT / f"self_cli_best_{regime}.txt"
              if survivors:
                  best_cfg = survivors[0].get("config") or {}
                  header = (
                      f"# best {regime} config: oos="
                      f"{survivors[0].get('oos_fixed_no_bonus_profit')} "
                      f"edge={survivors[0].get('fixed_no_bonus_profit')} "
                      f"dd={survivors[0].get('concurrent_risk_max_dd_pct')}%\n\n")
                  cli_path.write_text(header + render_cli(best_cfg, regime=regime))
              else:
                  cli_path.write_text(
                      f"# regime {regime}: no DD<={DD_GATE:.0f}% survivor yet\n")
              print(f"{regime}: wrote {cli_path}")
          PY

      - name: Mark regimes DONE (all 4 shards have >= 250 lines)
        run: |
          for regime in R1quiet R2bull R3strong R4parab; do
            ok=1
            for shard in 0 1 2 3; do
              f="sweep_regime_out/${regime}/shard${shard}/results.jsonl"
              n=0
              [ -f "$f" ] && n=$(wc -l < "$f")
              if [ "$n" -lt 250 ]; then ok=0; fi
              echo "regime=${regime} shard=${shard} lines=${n}"
            done
            if [ "$ok" -eq 1 ]; then
              touch "sweep_regime_out/${regime}/DONE"
              echo "regime ${regime}: all shards >= 250 lines — marked DONE"
            fi
          done

      - name: Commit + push to research branch (sole writer — no collision)
        run: |
          # sweep_regime_out/ is in .gitignore on the research branch, so force-add
          # the sweep tree; the snapshots/feed are tracked normally.
          git add -f sweep_regime_out 2>/dev/null || true
          git add -A generated 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -q -m "ci: self-regime-sweep aggregate checkpoint"
            for i in 1 2 3 4; do
              if git push -q origin HEAD:research/regime-adaptive; then
                echo "push: ok"; break
              fi
              echo "push: retry ${i}"
              # Re-sync with any concurrent change before retrying.
              git pull --rebase -q origin research/regime-adaptive || true
              sleep $((2 ** i))
            done
          fi

      - name: Chain the next pass, or disable when finished
        if: always()
        run: |
          done=$(ls -d sweep_regime_out/*/DONE 2>/dev/null | wc -l)
          echo "regimes DONE after this pass: ${done}/4"
          if [ "${done}" -ge 4 ]; then
            echo "All regimes done — disabling this workflow."
            gh workflow disable self-regime-sweep.yml --repo "${{ github.repository }}" || true
          else
            echo "Work remains — dispatching the next pass."
            gh workflow run self-regime-sweep.yml --ref main --repo "${{ github.repository }}" || true
          fi
