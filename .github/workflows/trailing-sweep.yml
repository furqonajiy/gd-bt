name: trailing-sweep-v2

# Unattended, resumable, SELF-TERMINATING driver for the trailing re-sweep v2.
# It runs the same orchestrator (sweep_out/scripts/trail_orchestrate.py) a local
# session would, on GitHub-hosted runners, so progress never depends on a warm
# Claude session.
#
# Efficiency model — runs ONLY while there is work, never on a fixed loop:
#   * Each run resumes from the committed results.jsonl / DONE checkpoints on
#     research/trailing-sweep-v2 and sweeps for up to 5h.
#   * If work still remains when it stops, it re-dispatches ITSELF (chaining),
#     so the sweep advances continuously with zero idle/no-op runs.
#   * The moment all 16 archives are DONE it `gh workflow disable`s itself, so
#     it stops consuming Actions minutes completely.
#   * A sparse 3-hourly schedule is only a safety net: it re-starts a chain that
#     died abnormally, and is a near-instant no-op (then self-disable) once done.
#
# Activation note: GitHub only fires schedule/workflow_dispatch from the DEFAULT
# branch, so this file lives on main. It operates on the research branch by
# checking it out explicitly — nothing about the sweep results lands on main.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */3 * * *"   # safety net only; self-disables on completion

permissions:
  contents: write   # push sweep checkpoints back to the research branch
  actions: write    # self-dispatch the next link / self-disable when done

concurrency:
  group: trailing-sweep-v2
  cancel-in-progress: false   # never interrupt an in-flight sweep run

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # under GitHub's 6h hard cap, leaving room for push
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/trailing-sweep-v2
          fetch-depth: 0

      - name: Completion guard (all 16 archives DONE?)
        id: guard
        run: |
          done=$(ls -d sweep_out/trail2_sweep_*/DONE 2>/dev/null | wc -l)
          echo "archives DONE: ${done}/16"
          [ "${done}" -ge 16 ] && echo "complete=true" >> "$GITHUB_OUTPUT" || echo "complete=false" >> "$GITHUB_OUTPUT"

      - name: Already complete — disable self and stop
        if: steps.guard.outputs.complete == 'true'
        run: |
          echo "All 16 archives done — disabling the schedule so it stops billing."
          gh workflow disable trailing-sweep.yml --repo "${{ github.repository }}" || true

      - name: Set up Python
        if: steps.guard.outputs.complete != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.guard.outputs.complete != 'true'
        run: pip install -r requirements.txt

      - name: Author identity for checkpoint commits
        if: steps.guard.outputs.complete != 'true'
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"

      - name: Expose the orchestrator's hardcoded ROOT
        if: steps.guard.outputs.complete != 'true'
        run: |
          # The orchestrator hardcodes ROOT=/home/user/xauusd-backtest; symlink it
          # to the checkout so the script stays byte-identical to the archive.
          sudo mkdir -p /home/user
          sudo ln -sfn "${GITHUB_WORKSPACE}" /home/user/xauusd-backtest

      - name: Run sweep (resumable, time-boxed)
        if: steps.guard.outputs.complete != 'true'
        working-directory: /home/user/xauusd-backtest
        run: |
          # 5h budget: the orchestrator self-pushes every ~5 min and resumes from
          # committed checkpoints, so a timeout just hands off to the next link.
          timeout 18000 python sweep_out/scripts/trail_orchestrate.py || true

      - name: Flush trailing checkpoint
        if: steps.guard.outputs.complete != 'true'
        working-directory: /home/user/xauusd-backtest
        run: |
          git add -A sweep_out generated data 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -q -m "research: CI checkpoint trailing sweep v2"
            for i in 1 2 3 4; do
              git push -q origin HEAD:research/trailing-sweep-v2 && break || sleep $((2 ** i))
            done
          fi

      - name: Chain the next link, or disable when finished
        if: always() && steps.guard.outputs.complete != 'true'
        working-directory: /home/user/xauusd-backtest
        run: |
          done=$(ls -d sweep_out/trail2_sweep_*/DONE 2>/dev/null | wc -l)
          echo "archives DONE after this run: ${done}/16"
          if [ "${done}" -ge 16 ]; then
            echo "Sweep complete — disabling the schedule."
            gh workflow disable trailing-sweep.yml --repo "${{ github.repository }}" || true
          else
            echo "Work remains — dispatching the next link."
            gh workflow run trailing-sweep.yml --ref main --repo "${{ github.repository }}" || true
          fi
