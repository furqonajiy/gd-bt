name: victor-entry-feature-sweep

# VICTOR (2026 / R4) ENTRY-FEATURE sweep. Victor signals are RECEIVED, not
# generated, so we can't regenerate his feed with the scalper generator's
# filters. Instead, for each entry-feature VARIANT we FILTER his existing feed by
# the indicator value at each signal's bar (tools/filter_provider_signals_by_indicator.py
# -- same RSI/BB/ADX/VWAP/HTF/S-R math as the scalper generator), then sweep the
# full strategy/geometry grid over the filtered feed (tools/sweep_self_limit.py,
# slippage-aware 2.0/1.0). The aggregate picks the winner on fixed-lot edge +
# $3/lot bonus at DD<=40% & OOS>0, and a variant only wins if it beats the
# unfiltered 'base' Victor feed on BOTH edge AND OOS -- the same bar the R4
# scalper entry-feature sweep used.
#
# Geometry-only (no --signal-policy): isolates the ENTRY-FEATURE effect against
# the deployed "[Victor TP/SL as-is]" champion. (Victor's 2026 posted R:R is
# already good, so the R:R/ATR policy matters less here; a follow-up full
# victor-sweep --signal-policy can refine the winning variant.) Artifact-only.

on:
  workflow_dispatch:
    inputs:
      max_candidates:
        description: "candidates per shard"
        default: "150"

permissions:
  contents: read

concurrency:
  group: victor-entry-feature-sweep
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CHARTS: 'data/XAUUSD_M1_2026*_ELEV8.csv'

jobs:
  sweep:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { v: base,       gen: "" }
          - { v: rsi,        gen: "--rsi-buy-max 70 --rsi-sell-min 30" }
          - { v: adx12,      gen: "--adx-min 12" }
          - { v: adx18,      gen: "--adx-min 18" }
          - { v: adx25,      gen: "--adx-min 25" }
          - { v: pctb,       gen: "--bb-buy-pctb-max 0.80 --bb-sell-pctb-min 0.20" }
          - { v: bbsqueeze,  gen: "--bb-bandwidth-min 0.0006" }
          - { v: vwap,       gen: "--vwap-filter" }
          - { v: htf15,      gen: "--htf-filter --htf-minutes 15" }
          - { v: htf60,      gen: "--htf-filter --htf-minutes 60" }
          - { v: sr,         gen: "--sr-proximity-atr 0.5 --sr-round-step 10" }
          - { v: adx12rsi,   gen: "--adx-min 12 --rsi-buy-max 70 --rsi-sell-min 30" }
          - { v: adx12pctb,  gen: "--adx-min 12 --bb-buy-pctb-max 0.85 --bb-sell-pctb-min 0.15" }
          - { v: combo,      gen: "--adx-min 12 --htf-filter --bb-buy-pctb-max 0.85 --bb-sell-pctb-min 0.15" }
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Filter Victor feed (2026) for variant ${{ matrix.v }}
        run: |
          set -euo pipefail
          python tools/filter_provider_signals_by_indicator.py \
            --input victor_signals.txt --output feed.txt \
            --charts ${{ env.CHARTS }} ${{ matrix.gen }}
          echo "variant ${{ matrix.v }} feed lines: $(wc -l < feed.txt)"
      - name: Sweep 4 shards over the filtered Victor feed
        run: |
          set -uo pipefail
          MC="${{ github.event.inputs.max_candidates }}"; MC="${MC:-150}"
          for N in 0 1 2 3; do
            timeout 18000 python tools/sweep_self_limit.py --signals feed.txt \
              --charts ${{ env.CHARTS }} --seed $((42 + N)) --max-candidates "$MC" \
              --output-dir "out/${{ matrix.v }}_shard${N}" --validate-months 2 \
              --max-concurrent-dd-pct 40 --fixed-lot 0.01 --resume &
          done; wait
      - uses: actions/upload-artifact@v4
        with: { name: "vicfeat-${{ matrix.v }}", path: "out/**/results.jsonl", if-no-files-found: error }

  aggregate:
    needs: sweep
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with: { pattern: "vicfeat-*", path: _artifacts }
      - name: Aggregate per variant, then pick the global Victor winner
        run: |
          set -uo pipefail
          for d in _artifacts/vicfeat-*; do
            v="${d#_artifacts/vicfeat-}"
            python tools/victor_sweep_aggregate.py --root "$d" --regime "VICF_${v}" \
              --out-dir "results/${v}" --dd-gate 40 --top-n 10 || true
          done
          echo "==================== PER-VARIANT WINNERS (Victor 2026) ===================="
          python - << 'PY'
          import glob, csv, os
          rows=[]
          for csvp in glob.glob("results/*/leaderboard.csv"):
              variant=os.path.basename(os.path.dirname(csvp))
              best=None
              for r in csv.DictReader(open(csvp)):
                  def f(x):
                      try: return float(x)
                      except: return None
                  dd=f(r["concurrent_risk_max_dd_pct"]); oos=f(r["oos_fixed_no_bonus_profit"]); edge=f(r["fixed_no_bonus_profit"])
                  if dd is None or oos is None or edge is None: continue
                  if str(r.get("passes_walk_forward", "true")).strip().lower() in ("false", "0", "no"):
                      continue
                  if abs(dd)<=40 and oos>0:
                      key=f(r["fixed_with_bonus_profit"]) or edge
                      if best is None or key>best[0]:
                          best=(key,edge,oos,dd,r["cfg_entry_count"],r["cfg_sl_multiplier"],r["cfg_max_hold_minutes"],r["cfg_tp1_lock_delay_minutes"])
              if best: rows.append((variant,*best))
          rows.sort(key=lambda x:-(x[2]))  # by edge
          print(f"{'variant':12}{'edge$':>10}{'OOS$':>9}{'DD%':>7}  e/slm/hold/d")
          for v,key,edge,oos,dd,e,slm,hold,d in rows:
              print(f"{v:12}{edge:>10,.0f}{oos:>9,.0f}{dd:>7.1f}  e{e}/slm{slm}/h{hold}/d{d}")
          base=next((r for r in rows if r[0]=="base"), None)
          if base and rows:
              be, bo = base[2], base[3]  # base edge, base OOS
              winners=[r for r in rows if r[2]>be and r[3]>bo]
              print(f"\nbase: edge=${be:,.0f} OOS=${bo:,.0f}")
              if winners:
                  winners.sort(key=lambda x:(x[3],x[2]))  # OOS then edge
                  g=winners[-1]
                  print(f"BEATS BASE on edge AND OOS: {', '.join(w[0] for w in winners)}")
                  print(f"GLOBAL VICTOR WINNER: variant={g[0]} edge=${g[2]:,.0f} OOS=${g[3]:,.0f} DD={g[4]:.1f}%")
              else:
                  print("NO entry-feature variant beats base on BOTH edge AND OOS -> keep base (unfiltered Victor).")
          PY
      - uses: actions/upload-artifact@v4
        with: { name: "victor-feature-sweep-results", path: "results/**", if-no-files-found: warn }
