name: tick-sweep-r4-full

# FULL R4 (2026) non-trailing sweep DECIDED ON REAL TICK DATA -- the run that
# determines the new champion. Unlike tick-sweep-r4-nontrailing.yml (30 cells,
# sl x max_hold x frac only), this samples the FULL non-trailing search space --
# BOTH the scalper24 FEED levers (R:R, Bollinger bandwidth, RSI -- the champion's
# stated edge lever) AND the strategy/geometry levers (sl_multiplier, entries,
# entry_sl_gap, max_hold, tp1_lock_delay, tp1_lock_fraction, lock_after_tp2,
# final_target) -- and scores every candidate with tools/tick_backtest.py (the
# REAL Mt5Executor replayed against the committed June ticks). Ranked on tick
# P&L, so the new champion is chosen on real-executor fills, not the M1 engine
# that over-states 3-4x.
#
#   gen   -> tools/gen_tick_sweep_candidates.py emits ~200 candidates (champion =
#            c000) as a dynamic matrix (<=256, the GitHub limit).
#   score -> one job per candidate: regenerate that candidate's feed, tick
#            backtest it on June ticks, parse to a score JSON. max-parallel 20.
#   agg   -> tick-P&L leaderboard -> sweep_reports/tick_r4_full/, committed.
#
# Free: public repo (unlimited Actions minutes) + committed June ticks (checkout
# has them). ~200 cells x ~14 min / 20 parallel ~= 2.5 h wall-clock.
# Tick fills are broker-driven -- the winner is RESEARCH until forward/demo-
# validated; confirm its concurrent-risk DD with backtest_explicit before deploy.

on:
  workflow_dispatch:
    inputs:
      n_candidates:
        description: "candidates incl. champion (<=256)"
        default: "200"

permissions:
  contents: write

concurrency:
  group: tick-sweep-r4-full
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - id: gen
        run: |
          M=$(python tools/gen_tick_sweep_candidates.py --n ${{ github.event.inputs.n_candidates }})
          echo "matrix=$M" >> "$GITHUB_OUTPUT"
          echo "$M" | python -c "import json,sys; print('candidates:', len(json.load(sys.stdin)['include']))"

  score:
    needs: gen
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJSON(needs.gen.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate candidate feed ${{ matrix.id }}
        run: |
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --output feed.txt --start 2026-06-01 \
            --session-start 0 --session-end 0 --signal-tz 7 \
            --rsi-buy-max ${{ matrix.rsi_buy }} --rsi-sell-min ${{ matrix.rsi_sell }} \
            --bb-bandwidth-min ${{ matrix.bb }} \
            --rr1 ${{ matrix.rr1 }} --rr2 ${{ matrix.rr2 }} --rr3 ${{ matrix.rr3 }}
      - name: Tick backtest candidate ${{ matrix.id }}
        run: |
          set -o pipefail
          mkdir -p out
          timeout 3000 python tools/tick_backtest.py \
            --signals feed.txt \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --ticks data/ticks/XAUUSD_TICK_202606_p*_ELEV8.csv \
            --watch-seconds 3 --initial-capital 50000 --sizing-mode risk \
            --lot 0.01 --risk 0.01 --minimum-lot 0.01 --lot-step 0.01 --bonus-per-closed-lot 3.0 \
            --entries ${{ matrix.entries }} --entry-ladder range_to_sl --entry-sl-gap ${{ matrix.slgap }} \
            --activation-delay 2 --pending-expiry 180 --max-hold ${{ matrix.maxhold }} \
            --sl-multiplier ${{ matrix.slm }} --final-target ${{ matrix.final }} \
            --lock-after-tp1 true --lock-after-tp2 ${{ matrix.lock2 }} \
            --tp1-lock-delay-minutes ${{ matrix.delay }} --tp2-lock-delay-minutes 2 \
            --profit-lock-mode tp_levels --bep-trigger-distance 3.0 \
            --tp1-lock-fraction ${{ matrix.frac }} --tp2-lock-target TP1 \
            --runner-after-tp3 false --tp3-lock-target TP2 \
            --trailing-open-distance 0.0 --trailing-close-distance 0.0 \
            | tee run.txt
          python tools/parse_tick_run.py run.txt --config '${{ toJSON(matrix) }}' > "out/${{ matrix.id }}.json"
          cat "out/${{ matrix.id }}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: "tickfull-${{ matrix.id }}"
          path: "out/*.json"
          if-no-files-found: error

  aggregate:
    needs: score
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - uses: actions/download-artifact@v4
        with: { path: cells }
      - name: Build tick-P&L leaderboard
        run: |
          python - <<'PY'
          import glob, json, csv, os
          rows=[]
          for f in glob.glob("cells/**/*.json", recursive=True):
              try:
                  r=json.load(open(f))
                  c=json.loads(r["config"]) if isinstance(r.get("config"),str) else r.get("config",{})
                  r.update(c)
                  rows.append(r)
              except Exception as e:
                  print("skip", f, e)
          rows.sort(key=lambda r: r.get("tick_pnl",-1e18), reverse=True)
          os.makedirs("sweep_reports/tick_r4_full", exist_ok=True)
          cols=["id","tick_pnl","m1_pnl","gap","max_drawdown_pct","n_signals","n_nofill",
                "slm","entries","slgap","maxhold","delay","frac","lock2","final",
                "rr1","rr2","rr3","bb","rsi_buy","rsi_sell"]
          out="sweep_reports/tick_r4_full/leaderboard.csv"
          with open(out,"w",newline="") as fh:
              w=csv.writer(fh); w.writerow(["rank"]+cols)
              for i,r in enumerate(rows,1):
                  w.writerow([i]+[r.get(c,"") for c in cols])
          champ=next((r for r in rows if r.get("id")=="c000"), None)
          champ_rank=next((i for i,r in enumerate(rows,1) if r.get("id")=="c000"), None)
          with open("sweep_reports/tick_r4_full/README.md","w") as fh:
              fh.write("# R4 non-trailing FULL tick sweep (decided on committed June ticks)\n\n")
              fh.write(f"{len(rows)} candidates scored on REAL June ticks (tools/tick_backtest.py), ranked by tick P&L.\n\n")
              if rows:
                  w=rows[0]
                  fh.write(f"- **Winner {w['id']}**: tick ${w.get('tick_pnl')} | slm {w.get('slm')} entries {w.get('entries')} "
                           f"maxhold {w.get('maxhold')} frac {w.get('frac')} delay {w.get('delay')} lock2 {w.get('lock2')} "
                           f"final {w.get('final')} | feed rr {w.get('rr1')}/{w.get('rr2')}/{w.get('rr3')} bb {w.get('bb')} "
                           f"rsi {w.get('rsi_buy')}/{w.get('rsi_sell')}\n")
              if champ:
                  fh.write(f"- **Champion c000**: tick ${champ.get('tick_pnl')} (rank {champ_rank}/{len(rows)})\n")
              fh.write("\nTick fills are broker-driven -- RESEARCH until forward/demo-validated. "
                       "Confirm the winner's concurrent-risk DD with backtest_explicit before deploy.\n")
          print(open("sweep_reports/tick_r4_full/README.md").read())
          print("--- top 15 ---")
          for i,r in enumerate(rows[:15],1):
              print(i, r.get("id"), r.get("tick_pnl"), "slm",r.get("slm"),"e",r.get("entries"),
                    "mh",r.get("maxhold"),"f",r.get("frac"),"d",r.get("delay"),
                    "rr",f"{r.get('rr1')}/{r.get('rr2')}/{r.get('rr3')}","bb",r.get("bb"),"rsi",r.get("rsi_buy"))
          PY
      - name: Commit leaderboard
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"
          git add sweep_reports/tick_r4_full
          git commit -m "tick-sweep: R4 non-trailing FULL leaderboard (decided on June ticks)" || echo "nothing to commit"
          git pull --rebase origin main || true
          git push || echo "push failed"
      - uses: actions/upload-artifact@v4
        with: { name: "tick-r4-full-leaderboard", path: "sweep_reports/tick_r4_full/**", if-no-files-found: warn }
