name: tick-sweep-trailing-tc18-retune

# RE-TUNE sweep around the TC18 trailing champion (self-scalper / C160 feed), R4
# 2026, scored on REAL ticks -- beat TC18 on net + drawdown, AND surface the
# forward-fit metrics (fixed-lot edge + OOS) the deploy decision uses.
#
# Per cell (and for the TC18 baseline) we run THREE tick backtests on the SAME
# committed MAY+JUNE 2026 ELEV8 ticks (R4 runs from MAY, not June only; real
# Mt5Executor, M1 fallback):
#   1. NET COMPOUND + DRAWDOWN -- sizing risk 1% / $50,000 base, $3/lot bonus.
#   2. EDGE  -- fixed 0.01 lot, NO bonus, FULL window (capital-independent).
#   3. OOS   -- fixed 0.01 lot, NO bonus, held-out TAIL (from oos_start).
#
# INCUMBENT TC18 (cli/candidate_TC18_trailing_tick.txt): C160 feed + trail_tp2 --
#   entries 7 / range_to_sl / entry-sl-gap 0.7 / slm 1.8 / max-hold 300 / final TP3 /
#   tp1+tp2-lock-delay 24 / tp1-lock-fraction 0.75 / trailing-open 0.5 / trailing-
#   close 0.5 / trail-after-TP2. We hold the winning MODE fixed and re-tune:
#
#   slm (sl-multiplier)            : {1.6, 1.7, 1.8}  -- TIGHTER stop than 1.8 (DD lever)
#   to  (trailing-OPEN distance)   : {0.5, 0.7}       -- pullback depth (>= broker 0.4 floor)
#   tc  (trailing-CLOSE distance)  : {0.5, 0.75}      -- exit-trail tightness
#   mh  (max-hold, min)            : {240, 300}       -- shorter time-exit can cut DD
#   ad  (activation-delay, min)    : {0, 1, 2}        -- waiting time to OPEN the entry;
#                                                        2 looks too slow on R4, so test 0/1
#   -> 3 x 2 x 2 x 2 x 3 = 72 cells.
#
# The `baseline` job scores TC18 EXACTLY the SAME 3 ways. A cell is flagged when it
# beats TC18 on net+DD, and separately when it beats on ALL FOUR (net, DD, edge,
# OOS). ELEV8 != your demo broker -- a winner here is RESEARCH until demo-validated.

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Full-window start (R4 runs from May -> sweep May+June, not June only)"
        default: "2026-05-01"
      oos_start:
        description: "Held-out OOS tail start (fixed-lot, no bonus)"
        default: "2026-06-16"
      max_dd:
        description: "Max REAL tick drawdown %% allowed in the ranking"
        default: "40"

permissions:
  contents: write

concurrency:
  group: tick-sweep-trailing-tc18-retune
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 320
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (C160 filter, R4 2026)
        run: |
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --output feed.txt --start "${START}" \
            --session-start 0 --session-end 0 --signal-tz 7 \
            --rsi-buy-max 70 --rsi-sell-min 30 --bb-bandwidth-min 0.0006 \
            --rr1 1.2 --rr2 2.5 --rr3 5
        env:
          START: ${{ github.event.inputs.start_date }}
      - name: Score TC18 -- net/DD + edge + OOS
        run: |
          set -o pipefail
          mkdir -p out raw
          STRAT="--entries 7 --entry-ladder range_to_sl --entry-sl-gap 0.7 --shared-sl false \
            --activation-delay 2 --pending-expiry 180 --max-hold 300 \
            --sl-multiplier 1.8 --final-target TP3 --runner-after-tp3 false \
            --lock-after-tp1 true --lock-after-tp2 true \
            --tp1-lock-delay-minutes 24 --tp2-lock-delay-minutes 24 \
            --profit-lock-mode tp_levels --bep-trigger-distance 3.0 --tp1-lock-fraction 0.75 \
            --tp2-lock-target TP1 --tp3-lock-target TP2 \
            --trailing-open-distance 0.5 --trailing-close-distance 0.5 --trailing-close-after-stage 2 \
            --lock-tp1-exit-slippage 2.0 --lock-tp2-exit-slippage 1.0"
          COMMON="--signals feed.txt \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --ticks data/ticks/XAUUSD_TICK_*_ELEV8.csv --sync-charts false --sync-ticks false \
            --watch-seconds 3 --max-drawdown-limit-pct 100 --progress-interval-seconds 0 \
            --minimum-lot 0.01 --lot-step 0.01"
          timeout 7000 python tools/backtest_hybrid.py $COMMON $STRAT \
            --sizing-mode risk --risk 0.01 --lot 0.01 --initial-capital 50000 --bonus-per-closed-lot 3.0 \
            --start-date "${START}" --output-dir reports/tc18_risk --score-json raw/tc18_risk.json
          timeout 7000 python tools/backtest_hybrid.py $COMMON $STRAT \
            --sizing-mode fixed --risk 0.01 --lot 0.01 --initial-capital 50000 --bonus-per-closed-lot 0 \
            --start-date "${START}" --output-dir reports/tc18_edge --score-json raw/tc18_edge.json
          timeout 7000 python tools/backtest_hybrid.py $COMMON $STRAT \
            --sizing-mode fixed --risk 0.01 --lot 0.01 --initial-capital 50000 --bonus-per-closed-lot 0 \
            --start-date "${OOS_START}" --output-dir reports/tc18_oos --score-json raw/tc18_oos.json
          python - <<'PY'
          import json
          r = json.load(open("raw/tc18_risk.json")); e = json.load(open("raw/tc18_edge.json")); o = json.load(open("raw/tc18_oos.json"))
          d = {"cell": "tc18_base", "net_compound": r["net_profit"], "drawdown_pct": r["max_drawdown_pct"],
               "win_rate_pct": r["win_rate_pct"], "signals_included": r["signals_included"],
               "tick_signals": r["tick_signals"], "m1_signals": r["m1_signals"],
               "edge": e["net_profit"], "oos": o["net_profit"]}
          open("out/tc18_base.json", "w").write(json.dumps(d)); print(d)
          PY
        env:
          START: ${{ github.event.inputs.start_date }}
          OOS_START: ${{ github.event.inputs.oos_start }}
      - uses: actions/upload-artifact@v4
        with: { name: "tc18-baseline", path: "out/tc18_base.json", if-no-files-found: error }

  sweep:
    strategy:
      fail-fast: false
      # Capped low so the sweep does NOT consume the whole account's GitHub Actions
      # runner allowance -- leaves slots free for other repos' workflows. Slower
      # (more waves) but non-blocking; raise only when nothing else needs runners.
      max-parallel: 6
      matrix:
        slm: ["1.6", "1.7", "1.8"]
        to:  ["0.5", "0.7"]
        tc:  ["0.5", "0.75"]
        mh:  ["240", "300"]
        ad:  ["0", "1", "2"]
    runs-on: ubuntu-latest
    timeout-minutes: 320
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (C160 filter, R4 2026)
        run: |
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --output feed.txt --start "${START}" \
            --session-start 0 --session-end 0 --signal-tz 7 \
            --rsi-buy-max 70 --rsi-sell-min 30 --bb-bandwidth-min 0.0006 \
            --rr1 1.2 --rr2 2.5 --rr3 5
        env:
          START: ${{ github.event.inputs.start_date }}
      - name: Cell slm=${{ matrix.slm }} to=${{ matrix.to }} tc=${{ matrix.tc }} mh=${{ matrix.mh }} ad=${{ matrix.ad }} -- net/DD + edge + OOS
        run: |
          set -o pipefail
          CELL="tc18_slm${slm//./}_to${to//./}_tc${tc//./}_mh${mh}_ad${ad}"
          mkdir -p out raw
          STRAT="--entries 7 --entry-ladder range_to_sl --entry-sl-gap 0.7 --shared-sl false \
            --activation-delay ${ad} --pending-expiry 180 --max-hold ${mh} \
            --sl-multiplier ${slm} --final-target TP3 --runner-after-tp3 false \
            --lock-after-tp1 true --lock-after-tp2 true \
            --tp1-lock-delay-minutes 24 --tp2-lock-delay-minutes 24 \
            --profit-lock-mode tp_levels --bep-trigger-distance 3.0 --tp1-lock-fraction 0.75 \
            --tp2-lock-target TP1 --tp3-lock-target TP2 \
            --trailing-open-distance ${to} --trailing-close-distance ${tc} --trailing-close-after-stage 2 \
            --lock-tp1-exit-slippage 2.0 --lock-tp2-exit-slippage 1.0"
          COMMON="--signals feed.txt \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --ticks data/ticks/XAUUSD_TICK_*_ELEV8.csv --sync-charts false --sync-ticks false \
            --watch-seconds 3 --max-drawdown-limit-pct 100 --progress-interval-seconds 0 \
            --minimum-lot 0.01 --lot-step 0.01"
          timeout 7000 python tools/backtest_hybrid.py $COMMON $STRAT \
            --sizing-mode risk --risk 0.01 --lot 0.01 --initial-capital 50000 --bonus-per-closed-lot 3.0 \
            --start-date "${START}" --output-dir "reports/${CELL}_risk" --score-json "raw/${CELL}_risk.json"
          timeout 7000 python tools/backtest_hybrid.py $COMMON $STRAT \
            --sizing-mode fixed --risk 0.01 --lot 0.01 --initial-capital 50000 --bonus-per-closed-lot 0 \
            --start-date "${START}" --output-dir "reports/${CELL}_edge" --score-json "raw/${CELL}_edge.json"
          timeout 7000 python tools/backtest_hybrid.py $COMMON $STRAT \
            --sizing-mode fixed --risk 0.01 --lot 0.01 --initial-capital 50000 --bonus-per-closed-lot 0 \
            --start-date "${OOS_START}" --output-dir "reports/${CELL}_oos" --score-json "raw/${CELL}_oos.json"
          python - "$CELL" "$slm" "$to" "$tc" "$mh" "$ad" <<'PY'
          import json, sys
          cell, slm, to, tc, mh, ad = sys.argv[1:7]
          r = json.load(open(f"raw/{cell}_risk.json")); e = json.load(open(f"raw/{cell}_edge.json")); o = json.load(open(f"raw/{cell}_oos.json"))
          d = {"cell": cell, "sl_multiplier": float(slm), "trailing_open": float(to),
               "trailing_close": float(tc), "max_hold": int(mh), "activation_delay": int(ad),
               "net_compound": r["net_profit"], "drawdown_pct": r["max_drawdown_pct"],
               "win_rate_pct": r["win_rate_pct"], "signals_included": r["signals_included"],
               "tick_signals": r["tick_signals"], "m1_signals": r["m1_signals"],
               "edge": e["net_profit"], "oos": o["net_profit"]}
          open(f"out/{cell}.json", "w").write(json.dumps(d)); print(d)
          PY
        env:
          START: ${{ github.event.inputs.start_date }}
          OOS_START: ${{ github.event.inputs.oos_start }}
          slm: ${{ matrix.slm }}
          to: ${{ matrix.to }}
          tc: ${{ matrix.tc }}
          mh: ${{ matrix.mh }}
          ad: ${{ matrix.ad }}
      - uses: actions/upload-artifact@v4
        with:
          name: "tc18re-${{ matrix.slm }}-${{ matrix.to }}-${{ matrix.tc }}-${{ matrix.mh }}-ad${{ matrix.ad }}"
          path: "out/*.json"
          if-no-files-found: error

  aggregate:
    needs: [baseline, sweep]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - uses: actions/download-artifact@v4
        with: { path: cells }
      - name: Build leaderboard (net compound + DD + edge + OOS)
        env:
          MAX_DD: ${{ github.event.inputs.max_dd }}
        run: |
          python - <<'PY'
          import glob, json, csv, os
          max_dd = float(os.environ.get("MAX_DD", "40") or 40)
          rows, base = [], None
          for f in glob.glob("cells/**/*.json", recursive=True):
              try:
                  d = json.load(open(f))
              except Exception as e:
                  print("skip", f, e); continue
              if d.get("cell") == "tc18_base": base = d
              else: rows.append(d)
          if base is None:
              raise SystemExit("FATAL: TC18 baseline missing -- cannot rank vs incumbent")
          B_NET = float(base["net_compound"]); B_DD = abs(float(base["drawdown_pct"]))
          B_EDGE = float(base["edge"]); B_OOS = float(base["oos"])
          for r in rows:
              dd = abs(float(r.get("drawdown_pct", 999))); net = float(r.get("net_compound", -1e18))
              edge = float(r.get("edge", -1e18)); oos = float(r.get("oos", -1e18))
              r["passes_dd"] = dd <= max_dd
              r["beats_netdd"] = (net > B_NET and dd < B_DD)
              r["beats_edge"] = edge > B_EDGE
              r["beats_oos"] = oos > B_OOS
              r["beats_all"] = r["beats_netdd"] and r["beats_edge"] and r["beats_oos"]
          rows.sort(key=lambda r: (r.get("passes_dd", False), r.get("net_compound", -1e18)), reverse=True)
          os.makedirs("sweep_reports/tick_trailing_tc18_retune", exist_ok=True)
          cols = ["cell","sl_multiplier","trailing_open","trailing_close","max_hold","activation_delay",
                  "net_compound","drawdown_pct","edge","oos","passes_dd","beats_netdd","beats_edge",
                  "beats_oos","beats_all","win_rate_pct","signals_included","tick_signals","m1_signals"]
          out = "sweep_reports/tick_trailing_tc18_retune/leaderboard.csv"
          with open(out, "w", newline="") as fh:
              w = csv.writer(fh); w.writerow(["rank"]+cols)
              w.writerow([0]+[base.get(c, "") for c in cols])
              for i, r in enumerate(rows, 1):
                  w.writerow([i]+[r.get(c, "") for c in cols])
          print(open(out).read())
          passing = [r for r in rows if r.get("passes_dd")]
          best = passing[0] if passing else None
          allbeat = sorted([r for r in rows if r.get("beats_all")], key=lambda r: r.get("net_compound", 0), reverse=True)
          netdd = sorted([r for r in rows if r.get("beats_netdd")], key=lambda r: r.get("net_compound", 0), reverse=True)
          with open("sweep_reports/tick_trailing_tc18_retune/README.md", "w") as fh:
              fh.write("# TC18 re-tune trailing TICK sweep -- beat TC18\n\n")
              fh.write(f"{len(rows)} cells on committed May+June ELEV8 ticks. Metrics per cell: **net compound + DD** "
                       f"(risk 1% / $50k base, $3/lot bonus), **edge** (fixed 0.01 lot, no bonus, full window), "
                       f"**OOS** (fixed-lot, no bonus, held-out tail). Incumbent **TC18** (scored the SAME way): "
                       f"net ${B_NET:,.0f}, DD {B_DD:g}%, edge ${B_EDGE:,.0f}, OOS ${B_OOS:,.0f}.\n\n")
              if best:
                  fh.write(f"**Best net@DD<={max_dd:g}%:** `{best['cell']}` -- net ${best['net_compound']:,.0f}, "
                           f"DD {abs(best['drawdown_pct']):g}%, edge ${best['edge']:,.0f}, OOS ${best['oos']:,.0f}.\n\n")
              if allbeat:
                  fh.write(f"### {len(allbeat)} cell(s) BEAT TC18 on ALL FOUR (net, DD, edge, OOS) -- deploy-grade:\n\n")
                  for r in allbeat[:10]:
                      fh.write(f"- `{r['cell']}`: net ${r['net_compound']:,.0f}, DD {abs(r['drawdown_pct']):g}%, "
                               f"edge ${r['edge']:,.0f}, OOS ${r['oos']:,.0f}\n")
              else:
                  fh.write("### No cell beat TC18 on ALL FOUR. TC18 stays the trailing candidate.\n")
              if netdd:
                  fh.write(f"\n{len(netdd)} cell(s) beat TC18 on net+DD (headline) -- see `beats_edge`/`beats_oos` "
                           f"in the CSV for the forward-fit view.\n")
              fh.write("\nFixed: trail_tp2 mode, tp1+tp2-lock-delay 24, final TP3. Swept: sl-mult {1.6,1.7,1.8}, "
                       "trailing-open {0.5,0.7}, trailing-close {0.5,0.75}, max-hold {240,300}. ELEV8 != demo -- "
                       "forward-validate before deploying.\n")
          PY
      - name: Commit leaderboard
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"
          git add sweep_reports/tick_trailing_tc18_retune
          git commit -m "tick-sweep: TC18 re-tune trailing leaderboard (net+DD+edge+OOS vs TC18)" || echo "nothing to commit"
          git push || echo "push failed"
      - uses: actions/upload-artifact@v4
        with: { name: "tick-trailing-tc18-retune-leaderboard", path: "sweep_reports/tick_trailing_tc18_retune/**", if-no-files-found: warn }
