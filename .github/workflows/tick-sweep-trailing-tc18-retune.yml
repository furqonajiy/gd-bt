name: tick-sweep-trailing-tc18-retune

# RE-TUNE sweep around the TC18 trailing champion (self-scalper / C160 feed),
# R4 2026, scored on REAL ticks -- goal: beat TC18 on BOTH net AND drawdown by
# finer-tuning the levers around its winning cell.
#
# INCUMBENT TC18 (cli/candidate_TC18_trailing_tick.txt): C160 feed + trail_tp2
#   mode -- entries 7 / range_to_sl / entry-sl-gap 0.7 / slm 1.8 / max-hold 300 /
#   final-target TP3 / tp1+tp2-lock-delay 24 / tp1-lock-fraction 0.75 / lock-after
#   -tp1+tp2 / trailing-open 0.5 / trailing-close 0.5 / trail-after-TP2.
#   net $166,820 / real-tick DD 23.65% (the aggressive-sweep #1). We hold the
#   winning MODE (trail_tp2, dly 24, final-target TP3) fixed and re-tune the
#   continuous levers that move profit/DD:
#
#   slm (sl-multiplier)            : {1.6, 1.7, 1.8}  -- TIGHTER stop than 1.8 (DD lever)
#   to  (trailing-OPEN distance)   : {0.5, 0.7}       -- pullback depth (>= broker 0.4 floor)
#   tc  (trailing-CLOSE distance)  : {0.5, 0.75}      -- exit-trail tightness
#   mh  (max-hold, min)            : {240, 300}       -- shorter time-exit can cut DD
#   -> 3 x 2 x 2 x 2 = 24 cells.
#
# A separate `baseline` job scores TC18 EXACTLY on the SAME window/tool, so the
# beat-on-both comparison is apples-to-apples. Every cell that beats TC18 on BOTH
# net (>) AND DD (<) is flagged.
#
# Scored on REAL tick DD via backtest_hybrid --score-json (June 2026 ELEV8 ticks,
# real Mt5Executor, M1 fallback). risk 1% / $10k base, bonus $3/lot, R4 locked-exit
# slippage 2.0/1.0. ELEV8 != your demo broker -- a winner here is RESEARCH until
# demo-validated; TC18 stays the trailing candidate until then.

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Backtest/feed start (TC18 was found on 2026-06-01)"
        default: "2026-06-01"
      max_dd:
        description: "Max REAL tick drawdown %% allowed in the ranking"
        default: "40"

permissions:
  contents: write

concurrency:
  group: tick-sweep-trailing-tc18-retune
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---- TC18 incumbent, scored by the SAME tool/window -----------------------
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 220
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (C160 filter, R4 2026)
        run: |
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --output feed.txt --start "${START}" \
            --session-start 0 --session-end 0 --signal-tz 7 \
            --rsi-buy-max 70 --rsi-sell-min 30 --bb-bandwidth-min 0.0006 \
            --rr1 1.2 --rr2 2.5 --rr3 5
        env:
          START: ${{ github.event.inputs.start_date }}
      - name: Score TC18 on real ticks
        run: |
          set -o pipefail
          mkdir -p out
          timeout 12000 python tools/backtest_hybrid.py \
            --signals feed.txt \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --ticks data/ticks/XAUUSD_TICK_*_ELEV8.csv \
            --sync-charts false --sync-ticks false \
            --watch-seconds 3 --max-drawdown-limit-pct 100 --progress-interval-seconds 0 \
            --initial-capital 10000 --sizing-mode risk \
            --lot 0.01 --risk 0.01 --minimum-lot 0.01 --lot-step 0.01 --bonus-per-closed-lot 3.0 \
            --entries 7 --entry-ladder range_to_sl --entry-sl-gap 0.7 --shared-sl false \
            --activation-delay 2 --pending-expiry 180 --max-hold 300 \
            --sl-multiplier 1.8 --final-target TP3 --runner-after-tp3 false \
            --lock-after-tp1 true --lock-after-tp2 true \
            --tp1-lock-delay-minutes 24 --tp2-lock-delay-minutes 24 \
            --profit-lock-mode tp_levels --bep-trigger-distance 3.0 --tp1-lock-fraction 0.75 \
            --tp2-lock-target TP1 --tp3-lock-target TP2 \
            --trailing-open-distance 0.5 --trailing-close-distance 0.5 --trailing-close-after-stage 2 \
            --lock-tp1-exit-slippage 2.0 --lock-tp2-exit-slippage 1.0 \
            --output-dir reports/tc18_base --score-json "out/tc18_base.json" \
            --start-date "${START}"
          python - "out/tc18_base.json" <<'PY'
          import json, sys
          d = json.load(open(sys.argv[1])); d.update(cell="tc18_base")
          open(sys.argv[1], "w").write(json.dumps(d)); print(d)
          PY
        env:
          START: ${{ github.event.inputs.start_date }}
      - uses: actions/upload-artifact@v4
        with: { name: "tc18-baseline", path: "out/tc18_base.json", if-no-files-found: error }

  # ---- re-tune sweep cells ---------------------------------------------------
  sweep:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        slm: ["1.6", "1.7", "1.8"]
        to:  ["0.5", "0.7"]
        tc:  ["0.5", "0.75"]
        mh:  ["240", "300"]
    runs-on: ubuntu-latest
    timeout-minutes: 220
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (C160 filter, R4 2026)
        run: |
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --output feed.txt --start "${START}" \
            --session-start 0 --session-end 0 --signal-tz 7 \
            --rsi-buy-max 70 --rsi-sell-min 30 --bb-bandwidth-min 0.0006 \
            --rr1 1.2 --rr2 2.5 --rr3 5
        env:
          START: ${{ github.event.inputs.start_date }}
      - name: Hybrid tick backtest cell slm=${{ matrix.slm }} to=${{ matrix.to }} tc=${{ matrix.tc }} mh=${{ matrix.mh }}
        run: |
          set -o pipefail
          CELL="tc18_slm${slm//./}_to${to//./}_tc${tc//./}_mh${mh}"
          mkdir -p out
          # TC18 winning mode (trail_tp2 / dly24 / final TP3) fixed; slm/to/tc/mh re-tuned.
          timeout 12000 python tools/backtest_hybrid.py \
            --signals feed.txt \
            --charts data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --ticks data/ticks/XAUUSD_TICK_*_ELEV8.csv \
            --sync-charts false --sync-ticks false \
            --watch-seconds 3 --max-drawdown-limit-pct 100 --progress-interval-seconds 0 \
            --initial-capital 10000 --sizing-mode risk \
            --lot 0.01 --risk 0.01 --minimum-lot 0.01 --lot-step 0.01 --bonus-per-closed-lot 3.0 \
            --entries 7 --entry-ladder range_to_sl --entry-sl-gap 0.7 --shared-sl false \
            --activation-delay 2 --pending-expiry 180 --max-hold ${mh} \
            --sl-multiplier ${slm} --final-target TP3 --runner-after-tp3 false \
            --lock-after-tp1 true --lock-after-tp2 true \
            --tp1-lock-delay-minutes 24 --tp2-lock-delay-minutes 24 \
            --profit-lock-mode tp_levels --bep-trigger-distance 3.0 --tp1-lock-fraction 0.75 \
            --tp2-lock-target TP1 --tp3-lock-target TP2 \
            --trailing-open-distance ${to} --trailing-close-distance ${tc} --trailing-close-after-stage 2 \
            --lock-tp1-exit-slippage 2.0 --lock-tp2-exit-slippage 1.0 \
            --output-dir "reports/${CELL}" --score-json "out/${CELL}.json" \
            --start-date "${START}"
          python - "out/${CELL}.json" "$CELL" "$slm" "$to" "$tc" "$mh" <<'PY'
          import json, sys
          p, cell, slm, to, tc, mh = sys.argv[1:7]
          d = json.load(open(p))
          d.update(cell=cell, sl_multiplier=float(slm), trailing_open=float(to),
                   trailing_close=float(tc), max_hold=int(mh))
          open(p, "w").write(json.dumps(d)); print(d)
          PY
        env:
          START: ${{ github.event.inputs.start_date }}
          slm: ${{ matrix.slm }}
          to: ${{ matrix.to }}
          tc: ${{ matrix.tc }}
          mh: ${{ matrix.mh }}
      - uses: actions/upload-artifact@v4
        with:
          name: "tc18re-${{ matrix.slm }}-${{ matrix.to }}-${{ matrix.tc }}-${{ matrix.mh }}"
          path: "out/*.json"
          if-no-files-found: error

  aggregate:
    needs: [baseline, sweep]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - uses: actions/download-artifact@v4
        with: { path: cells }
      - name: Build leaderboard (beat TC18 on net AND DD)
        env:
          MAX_DD: ${{ github.event.inputs.max_dd }}
        run: |
          python - <<'PY'
          import glob, json, csv, os
          max_dd = float(os.environ.get("MAX_DD", "40") or 40)
          rows, base = [], None
          for f in glob.glob("cells/**/*.json", recursive=True):
              try:
                  d = json.load(open(f))
              except Exception as e:
                  print("skip", f, e); continue
              if d.get("cell") == "tc18_base":
                  base = d
              else:
                  rows.append(d)
          if base is None:
              raise SystemExit("FATAL: TC18 baseline score missing -- cannot rank vs incumbent")
          T_NET = float(base.get("net_profit", 0.0))
          T_DD = abs(float(base.get("max_drawdown_pct", 999)))
          for r in rows:
              dd = abs(float(r.get("max_drawdown_pct", 999)))
              net = float(r.get("net_profit", -1e18))
              r["passes_dd"] = dd <= max_dd
              r["beats_tc18"] = (net > T_NET and dd < T_DD)
          rows.sort(key=lambda r: (r.get("passes_dd", False), r.get("net_profit", -1e18)), reverse=True)
          os.makedirs("sweep_reports/tick_trailing_tc18_retune", exist_ok=True)
          cols = ["cell","sl_multiplier","trailing_open","trailing_close","max_hold",
                  "net_profit","max_drawdown_pct","passes_dd","beats_tc18",
                  "win_rate_pct","signals_included","tick_signals","m1_signals"]
          out = "sweep_reports/tick_trailing_tc18_retune/leaderboard.csv"
          with open(out, "w", newline="") as fh:
              w = csv.writer(fh); w.writerow(["rank"]+cols)
              w.writerow([0]+[base.get(c, "") for c in cols])  # TC18 baseline row (rank 0)
              for i, r in enumerate(rows, 1):
                  w.writerow([i]+[r.get(c, "") for c in cols])
          print(open(out).read())
          passing = [r for r in rows if r.get("passes_dd")]
          best = passing[0] if passing else None
          pareto = sorted([r for r in rows if r.get("beats_tc18")],
                          key=lambda r: r.get("net_profit", 0), reverse=True)
          with open("sweep_reports/tick_trailing_tc18_retune/README.md", "w") as fh:
              fh.write("# TC18 re-tune trailing TICK sweep -- beat TC18 on net AND DD\n\n")
              fh.write(f"{len(rows)} cells on committed June ELEV8 ticks, scored by backtest_hybrid "
                       f"(REAL compounding-equity DD), vs the TC18 incumbent (scored the SAME way): "
                       f"net ${T_NET:,.0f}, DD {T_DD:g}%.\n\n")
              if best:
                  fh.write(f"**Best net at DD<={max_dd:g}%:** `{best['cell']}` -- net "
                           f"${best['net_profit']:,.0f}, DD {abs(best['max_drawdown_pct']):g}%, "
                           f"win {best.get('win_rate_pct')}%.\n\n")
              if pareto:
                  fh.write(f"### {len(pareto)} cell(s) BEAT TC18 on BOTH net AND DD:\n\n")
                  for r in pareto[:10]:
                      fh.write(f"- `{r['cell']}`: net ${r['net_profit']:,.0f} (> {T_NET:,.0f}), "
                               f"DD {abs(r['max_drawdown_pct']):g}% (< {T_DD:g}%), "
                               f"win {r.get('win_rate_pct')}%\n")
              else:
                  fh.write("### No cell beat TC18 on BOTH axes. TC18 stays the trailing candidate.\n")
              fh.write("\nFixed: trail_tp2 mode (trail after TP2), tp1+tp2-lock-delay 24, final-target "
                       "TP3. Swept: sl-multiplier {1.6,1.7,1.8}, trailing-open {0.5,0.7}, trailing-close "
                       "{0.5,0.75}, max-hold {240,300}. ELEV8 != demo -- forward-validate before deploying.\n")
          PY
      - name: Commit leaderboard
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"
          git add sweep_reports/tick_trailing_tc18_retune
          git commit -m "tick-sweep: TC18 re-tune trailing leaderboard (beat TC18 on net AND DD)" || echo "nothing to commit"
          git push || echo "push failed"
      - uses: actions/upload-artifact@v4
        with: { name: "tick-trailing-tc18-retune-leaderboard", path: "sweep_reports/tick_trailing_tc18_retune/**", if-no-files-found: warn }
