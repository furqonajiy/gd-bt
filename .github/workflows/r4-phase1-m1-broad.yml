name: r4-phase1-m1-broad

# PHASE 1 of the R4 (Jan-2026) full trailing search: BROAD, M1-ONLY, risk 1%.
# Sweeps trailing geometry x max-hold {60,90,150,240,300} x entries {7,8} for both
# feeds over Jan-Jun 2026, ranked by M1 fixed-lot Jan edge (DD at risk 1%/$50k).
# Pure M1 (--m1-only, fast). Phase 2 TICK-calibrates the TOP 50/feed; Phase 3
# risk-ladders the survivors 1-5%.
# VIC fixes trailing-open=0.5 (every prior winner was 0.5) to fit entries {7,8}
# under GitHub's 256-job matrix cap. M1 lock slippage 2.0/1.0; DD limit 500 (headroom).
# Output: sweep_reports/tick_cal_jan_full/{vic,tc18}_phase1.csv

on:
  workflow_dispatch:
    inputs:
      jan_start: { description: "R4 start (M1)", default: "2026-01-01" }
      oos_start: { description: "OOS tail start", default: "2026-06-16" }

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: r4-phase1-m1-broad
  cancel-in-progress: false

jobs:
  vic_e7:
    strategy: { fail-fast: false, max-parallel: 16, matrix: {
      to: ["0.5"], tc: ["0.5", "1.5"], stage: ["1", "2"], slm: ["1.5", "1.7"],
      ft: ["TP2", "TP3"], ad: ["0", "1", "2"], mh: ["60", "90", "150", "240", "300"],
      include: [ {to: "0", tc: "0", stage: "0", slm: "1.7", ft: "TP2", ad: "2", mh: "180"} ] } }
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: "VIC e7 to=${{ matrix.to }} tc=${{ matrix.tc }} s=${{ matrix.stage }} slm=${{ matrix.slm }} ${{ matrix.ft }} ad=${{ matrix.ad }} mh=${{ matrix.mh }}"
        env:
          JAN: ${{ github.event.inputs.jan_start }}
          OOS: ${{ github.event.inputs.oos_start }}
          ENTRIES: "7"
          to: ${{ matrix.to }}
          tc: ${{ matrix.tc }}
          stage: ${{ matrix.stage }}
          slm: ${{ matrix.slm }}
          ft: ${{ matrix.ft }}
          ad: ${{ matrix.ad }}
          mh: ${{ matrix.mh }}
        run: bash .github/scripts/r4_phase1_vic.sh
      - uses: actions/upload-artifact@v4
        with:
          name: "vic-e7-${{ matrix.to }}-${{ matrix.tc }}-${{ matrix.stage }}-${{ matrix.slm }}-${{ matrix.ft }}-${{ matrix.ad }}-${{ matrix.mh }}"
          path: "out/*.json"
          if-no-files-found: error

  vic_e8:
    strategy: { fail-fast: false, max-parallel: 16, matrix: {
      to: ["0.5"], tc: ["0.5", "1.5"], stage: ["1", "2"], slm: ["1.5", "1.7"],
      ft: ["TP2", "TP3"], ad: ["0", "1", "2"], mh: ["60", "90", "150", "240", "300"] } }
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: "VIC e8 to=${{ matrix.to }} tc=${{ matrix.tc }} s=${{ matrix.stage }} slm=${{ matrix.slm }} ${{ matrix.ft }} ad=${{ matrix.ad }} mh=${{ matrix.mh }}"
        env:
          JAN: ${{ github.event.inputs.jan_start }}
          OOS: ${{ github.event.inputs.oos_start }}
          ENTRIES: "8"
          to: ${{ matrix.to }}
          tc: ${{ matrix.tc }}
          stage: ${{ matrix.stage }}
          slm: ${{ matrix.slm }}
          ft: ${{ matrix.ft }}
          ad: ${{ matrix.ad }}
          mh: ${{ matrix.mh }}
        run: bash .github/scripts/r4_phase1_vic.sh
      - uses: actions/upload-artifact@v4
        with:
          name: "vic-e8-${{ matrix.to }}-${{ matrix.tc }}-${{ matrix.stage }}-${{ matrix.slm }}-${{ matrix.ft }}-${{ matrix.ad }}-${{ matrix.mh }}"
          path: "out/*.json"
          if-no-files-found: error

  tc18_e7:
    strategy: { fail-fast: false, max-parallel: 16, matrix: {
      slm: ["1.6", "1.7", "1.8"], to: ["0.5", "0.7"], tc: ["0.5", "0.75"],
      ad: ["0", "1", "2"], mh: ["60", "90", "150", "240", "300"] } }
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate C160 feed
        env: { JAN: "${{ github.event.inputs.jan_start }}" }
        run: |
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_202601_ELEV8.csv data/XAUUSD_M1_202602_ELEV8.csv \
              data/XAUUSD_M1_202603_ELEV8.csv data/XAUUSD_M1_202604_ELEV8.csv \
              data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --output feed.txt --start "${JAN}" --session-start 0 --session-end 0 --signal-tz 7 \
            --rsi-buy-max 70 --rsi-sell-min 30 --bb-bandwidth-min 0.0006 --rr1 1.2 --rr2 2.5 --rr3 5
      - name: "TC18 e7 slm=${{ matrix.slm }} to=${{ matrix.to }} tc=${{ matrix.tc }} ad=${{ matrix.ad }} mh=${{ matrix.mh }}"
        env:
          JAN: ${{ github.event.inputs.jan_start }}
          OOS: ${{ github.event.inputs.oos_start }}
          ENTRIES: "7"
          slm: ${{ matrix.slm }}
          to: ${{ matrix.to }}
          tc: ${{ matrix.tc }}
          ad: ${{ matrix.ad }}
          mh: ${{ matrix.mh }}
        run: bash .github/scripts/r4_phase1_tc18.sh
      - uses: actions/upload-artifact@v4
        with:
          name: "tc18-e7-${{ matrix.slm }}-${{ matrix.to }}-${{ matrix.tc }}-${{ matrix.ad }}-${{ matrix.mh }}"
          path: "out/*.json"
          if-no-files-found: error

  tc18_e8:
    strategy: { fail-fast: false, max-parallel: 16, matrix: {
      slm: ["1.6", "1.7", "1.8"], to: ["0.5", "0.7"], tc: ["0.5", "0.75"],
      ad: ["0", "1", "2"], mh: ["60", "90", "150", "240", "300"] } }
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate C160 feed
        env: { JAN: "${{ github.event.inputs.jan_start }}" }
        run: |
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_202601_ELEV8.csv data/XAUUSD_M1_202602_ELEV8.csv \
              data/XAUUSD_M1_202603_ELEV8.csv data/XAUUSD_M1_202604_ELEV8.csv \
              data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --output feed.txt --start "${JAN}" --session-start 0 --session-end 0 --signal-tz 7 \
            --rsi-buy-max 70 --rsi-sell-min 30 --bb-bandwidth-min 0.0006 --rr1 1.2 --rr2 2.5 --rr3 5
      - name: "TC18 e8 slm=${{ matrix.slm }} to=${{ matrix.to }} tc=${{ matrix.tc }} ad=${{ matrix.ad }} mh=${{ matrix.mh }}"
        env:
          JAN: ${{ github.event.inputs.jan_start }}
          OOS: ${{ github.event.inputs.oos_start }}
          ENTRIES: "8"
          slm: ${{ matrix.slm }}
          to: ${{ matrix.to }}
          tc: ${{ matrix.tc }}
          ad: ${{ matrix.ad }}
          mh: ${{ matrix.mh }}
        run: bash .github/scripts/r4_phase1_tc18.sh
      - uses: actions/upload-artifact@v4
        with:
          name: "tc18-e8-${{ matrix.slm }}-${{ matrix.to }}-${{ matrix.tc }}-${{ matrix.ad }}-${{ matrix.mh }}"
          path: "out/*.json"
          if-no-files-found: error

  leaderboard:
    needs: [vic_e7, vic_e8, tc18_e7, tc18_e8]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/download-artifact@v4
        with: { pattern: "vic-*", path: "art/vic", merge-multiple: true }
      - uses: actions/download-artifact@v4
        with: { pattern: "tc18-*", path: "art/tc18", merge-multiple: true }
      - name: Rank by M1 Jan edge
        run: |
          python - <<'PY'
          import json, csv, glob, os, math
          def build(prefix, out_path):
              rows=[json.load(open(f)) for f in sorted(glob.glob(f"art/{prefix}/*.json"))]
              for d in rows:
                  dd=d.get("jan_dd")
                  d["pass_dd40"]=bool(dd is not None and dd<=40.0)
                  d["pass_dd50"]=bool(dd is not None and dd<=50.0)
              rows.sort(key=lambda r:-(r.get("jan_edge") if r.get("jan_edge") is not None else -math.inf))
              if not rows: return
              cols=list(rows[0].keys())
              os.makedirs(os.path.dirname(out_path),exist_ok=True)
              with open(out_path,"w",newline="") as f:
                  w=csv.DictWriter(f,fieldnames=cols,extrasaction="ignore"); w.writeheader(); w.writerows(rows)
              print(f"Wrote {out_path} ({len(rows)} rows)")
              for r in rows[:8]:
                  print(f"  {r['cell']}: edge=${r['jan_edge']} dd={r['jan_dd']}% oos=${r['jan_oos']}")
          build("vic","sweep_reports/tick_cal_jan_full/vic_phase1.csv")
          build("tc18","sweep_reports/tick_cal_jan_full/tc18_phase1.csv")
          PY
      - name: Commit
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"
          git add sweep_reports/tick_cal_jan_full/
          git diff --cached --quiet || git commit -m "R4 phase1 (M1 broad, Jan-Jun): VIC + self-scalper trailing x mh x entries, ranked by M1 edge"
          git push origin HEAD || true
      - uses: actions/upload-artifact@v4
        with: { name: "r4-phase1", path: "sweep_reports/tick_cal_jan_full/", if-no-files-found: warn }
