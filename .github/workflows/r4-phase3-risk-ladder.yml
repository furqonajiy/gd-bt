name: r4-phase3-risk-ladder

# PHASE 3 of the R4 (Jan-2026) trailing search: RISK-LADDER the top-N/feed
# from Phase 2 (sweep_reports/tick_cal_jan_full/{vic,tc18}_phase2.csv, DD<=40% only).
#
# For each Phase-2 top cell:
#   Jan-Jun 2026 tick-hybrid (real ticks May-Jun, M1 Jan-Apr):
#     FIXED lot        → jan_edge   (risk-invariant; validates Phase-2 est_jan_edge)
#     RISK 1% / 2% / 3% / 5%  → jan_net / jan_dd  (how $ return + DD compound per level)
#   TICK Jun16-26 fixed → tick_oos  (real OOS, same as Phase 2)
#
# Leaderboard: one row per cell, wide columns per risk level.
# jan_edge is risk-invariant so ranks cells identically at every level.
# jan_dd at each risk% shows the compounding amplification of drawdown.
#
# Output: sweep_reports/tick_cal_jan_full/{vic,tc18}_phase3.csv (ranked by jan_edge)

on:
  workflow_dispatch:
    inputs:
      jan_start: { description: "Jan full-window start", default: "2026-01-01" }
      oos_tick_start: { description: "Real TICK OOS start", default: "2026-06-16" }
      top_n: { description: "Top-N cells/feed from Phase 2 (DD<=40%)", default: "10" }

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: r4-phase3-risk-ladder
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      vic_matrix: ${{ steps.gen.outputs.vic_matrix }}
      tc18_matrix: ${{ steps.gen.outputs.tc18_matrix }}
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - name: Build top-N matrices from Phase 2 (DD<=40% only)
        id: gen
        env:
          TOPN: ${{ github.event.inputs.top_n }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import csv, json, os
          topn = int(os.environ.get("TOPN") or "10")
          def num(x):
              try: return float(x)
              except: return -1e18
          def matrix(path, fields):
              rows = list(csv.DictReader(open(path)))
              ok = [r for r in rows if r.get("pass_dd40") == "True"]
              ok.sort(key=lambda r: -num(r.get("est_jan_edge")))
              inc = []
              for r in ok[:topn]:
                  obj = {"cell": r["cell"]}
                  for f in fields:
                      obj[f] = r[f]
                  inc.append(obj)
              return json.dumps({"include": inc}, separators=(",", ":"))
          vic = matrix("sweep_reports/tick_cal_jan_full/vic_phase2.csv",
                       ["entries","trailing_open","trailing_close","trail_after_stage",
                        "sl_multiplier","final_target","activation_delay","max_hold"])
          tc18 = matrix("sweep_reports/tick_cal_jan_full/tc18_phase2.csv",
                        ["entries","sl_multiplier","trailing_open","trailing_close",
                         "max_hold","activation_delay"])
          print(f"vic_matrix={vic}")
          print(f"tc18_matrix={tc18}")
          PY

  vic_cell:
    needs: setup
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJSON(needs.setup.outputs.vic_matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: "VIC risk-ladder ${{ matrix.cell }}"
        env:
          JAN_START: ${{ github.event.inputs.jan_start }}
          OOS_TICK: ${{ github.event.inputs.oos_tick_start }}
          CELL: ${{ matrix.cell }}
          ENTRIES: ${{ matrix.entries }}
          to: ${{ matrix.trailing_open }}
          tc: ${{ matrix.trailing_close }}
          stage: ${{ matrix.trail_after_stage }}
          slm: ${{ matrix.sl_multiplier }}
          ft: ${{ matrix.final_target }}
          ad: ${{ matrix.activation_delay }}
          mh: ${{ matrix.max_hold }}
        run: bash .github/scripts/r4_phase3_vic.sh
      - uses: actions/upload-artifact@v4
        with:
          name: "vp3-${{ matrix.cell }}"
          path: "out/*.json"
          if-no-files-found: error

  tc18_cell:
    needs: setup
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJSON(needs.setup.outputs.tc18_matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate C160 feed (Jan-Jun 2026, same params as Phase 1)
        run: |
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_202601_ELEV8.csv data/XAUUSD_M1_202602_ELEV8.csv \
              data/XAUUSD_M1_202603_ELEV8.csv data/XAUUSD_M1_202604_ELEV8.csv \
              data/XAUUSD_M1_202605_ELEV8.csv data/XAUUSD_M1_202606_ELEV8.csv \
            --output feed.txt --start "2026-01-01" --session-start 0 --session-end 0 --signal-tz 7 \
            --rsi-buy-max 70 --rsi-sell-min 30 --bb-bandwidth-min 0.0006 --rr1 1.2 --rr2 2.5 --rr3 5
      - name: "TC18 risk-ladder ${{ matrix.cell }}"
        env:
          JAN_START: ${{ github.event.inputs.jan_start }}
          OOS_TICK: ${{ github.event.inputs.oos_tick_start }}
          CELL: ${{ matrix.cell }}
          ENTRIES: ${{ matrix.entries }}
          slm: ${{ matrix.sl_multiplier }}
          to: ${{ matrix.trailing_open }}
          tc: ${{ matrix.trailing_close }}
          ad: ${{ matrix.activation_delay }}
          mh: ${{ matrix.max_hold }}
        run: bash .github/scripts/r4_phase3_tc18.sh
      - uses: actions/upload-artifact@v4
        with:
          name: "tp3-${{ matrix.cell }}"
          path: "out/*.json"
          if-no-files-found: error

  leaderboard:
    needs: [vic_cell, tc18_cell]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }
      - uses: actions/download-artifact@v4
        with: { pattern: "vp3-*", path: "art/vic", merge-multiple: true }
      - uses: actions/download-artifact@v4
        with: { pattern: "tp3-*", path: "art/tc18", merge-multiple: true }
      - name: Build risk-ladder leaderboards
        run: |
          python - <<'PY'
          import json, csv, glob, os, math

          RISKS = [0.01, 0.02, 0.03, 0.05]
          RTAGS = {round(r, 4): "r{:02d}".format(int(r * 100)) for r in RISKS}

          def fnum(x):
              try: return float(x)
              except: return None

          def build(prefix, out_path):
              by_cell = {}
              for f in sorted(glob.glob(f"art/{prefix}/*.json")):
                  d = json.load(open(f))
                  cell = d["cell"]
                  if cell not in by_cell:
                      by_cell[cell] = {}
                  # Always update base so we have params + jan_edge + tick_oos
                  by_cell[cell]["base"] = d
                  r = fnum(d.get("risk_pct"))
                  if r is not None:
                      rt = RTAGS.get(round(r, 4))
                      if rt:
                          by_cell[cell][rt] = d

              rows = []
              for cell, data in by_cell.items():
                  b = data.get("base", {})
                  row = {
                      "cell": cell,
                      "strategy": b.get("strategy"),
                      "entries": b.get("entries"),
                      "sl_multiplier": b.get("sl_multiplier"),
                      "trailing_open": b.get("trailing_open"),
                      "trailing_close": b.get("trailing_close"),
                      "trail_after_stage": b.get("trail_after_stage", ""),
                      "final_target": b.get("final_target", ""),
                      "max_hold": b.get("max_hold"),
                      "activation_delay": b.get("activation_delay"),
                      "jan_edge": b.get("jan_edge"),
                      "tick_oos": b.get("tick_oos"),
                  }
                  for r in RISKS:
                      rt = RTAGS[round(r, 4)]
                      rd = data.get(rt, {})
                      pct = int(r * 100)
                      row[f"jan_net_r{pct:02d}"] = rd.get("jan_net")
                      row[f"jan_dd_r{pct:02d}"] = rd.get("jan_dd")
                      dd = fnum(rd.get("jan_dd"))
                      row[f"pass_dd40_r{pct:02d}"] = bool(dd is not None and dd <= 40.0)
                  rows.append(row)

              rows.sort(key=lambda r: (
                  0 if r.get("jan_edge") is not None else 1,
                  -(fnum(r.get("jan_edge")) or -math.inf)
              ))

              cols = ["cell", "strategy", "entries", "sl_multiplier",
                      "trailing_open", "trailing_close", "trail_after_stage",
                      "final_target", "max_hold", "activation_delay",
                      "jan_edge", "tick_oos"]
              for r in RISKS:
                  pct = int(r * 100)
                  cols += [f"jan_net_r{pct:02d}", f"jan_dd_r{pct:02d}", f"pass_dd40_r{pct:02d}"]

              os.makedirs(os.path.dirname(out_path), exist_ok=True)
              with open(out_path, "w", newline="") as fh:
                  w = csv.DictWriter(fh, fieldnames=cols, extrasaction="ignore")
                  w.writeheader()
                  w.writerows(rows)
              print(f"Wrote {out_path} ({len(rows)} rows)")
              for r in RISKS:
                  pct = int(r * 100)
                  ok = [row for row in rows
                        if row.get(f"pass_dd40_r{pct:02d}") and row.get("jan_edge") is not None]
                  print(f"  [{prefix} best @ {pct}% risk, DD<=40] ({len(ok)} pass)")
                  for row in ok[:3]:
                      print(f"    {row['cell']}: jan_edge=${row['jan_edge']}"
                            f" net_r{pct:02d}=${row.get(f'jan_net_r{pct:02d}')}"
                            f" dd_r{pct:02d}={row.get(f'jan_dd_r{pct:02d}')}%"
                            f" tick_oos=${row['tick_oos']}")

          build("vic",  "sweep_reports/tick_cal_jan_full/vic_phase3.csv")
          build("tc18", "sweep_reports/tick_cal_jan_full/tc18_phase3.csv")
          PY
      - name: Commit
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"
          git add sweep_reports/tick_cal_jan_full/
          git diff --cached --quiet || git commit -m "R4 phase3 (risk-ladder top-10/feed): jan_edge + DD/net at 1/2/3/5% risk"
          git push origin HEAD || true
      - uses: actions/upload-artifact@v4
        with: { name: "r4-phase3", path: "sweep_reports/tick_cal_jan_full/", if-no-files-found: warn }
