name: Backtest reports (TSL18 / V017)

# Runs the deployed-book 2026 TICK backtests on a runner (the tick archive is
# committed, so no MT5 is needed -- the --sync flags soft-fail and fall back to
# the committed data) and commits the refreshed Excel workbooks -- which now carry
# the USD + % drawdown columns -- back to the branch. This offloads the slow
# tick replays (T818 Jan-Jul is ~10k+ signals) off a laptop / the dev container.
#
# It does NOT merge code -- code lands on main only through the normal --no-ff PR
# review flow. This workflow only regenerates + commits report ARTIFACTS.

on:
  workflow_dispatch:
    inputs:
      strategies:
        description: "Which books (space-separated cli/run.py names)"
        default: "t818 v017"
      sections:
        description: "Backtest sections (5=Jun2026 6=May2026 7=Jan2026 8=R3-2025 9=R2-2024 10=R1-2021-2023; all at capital 3K)"
        default: "5 6 7"

# Allow the job to push the regenerated reports back to the branch.
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run backtests (TICK; sync soft-fails -> committed data)
        run: |
          set -o pipefail
          for s in ${{ github.event.inputs.strategies }}; do
            # Section 4 regenerates the strategy's static feed first. Self-scalper
            # feeds (e.g. signals/t818.txt) are generated, not committed, so the
            # backtest would otherwise fail with FileNotFoundError. Victor books
            # read the committed victor_signals.txt, so their section 4 is a
            # harmless no-op / tolerated failure.
            echo "===== generate feed: cli/run.py $s 4 ====="
            python cli/run.py "$s" 4 2>&1 | tail -15 \
              || echo "(section 4 skipped for $s -- backtest uses a committed feed)"
            for sec in ${{ github.event.inputs.sections }}; do
              # Run the section exactly as the snapshot authors it (single capital).
              # The books are now authored at --initial-capital 3000, so we run one
              # variant. For any book still authored at $50,000 we ALSO emit the
              # legacy $5,000 clone (rewrite --initial-capital + _5k output-dir);
              # that second run is skipped when the command is not at 50000, so a
              # 3K book never produces a redundant duplicate _5k report.
              cmd=$(python cli/run.py "$s" "$sec" --print 2>&1 | grep -E 'python (tools/|-m )' | head -1)
              if [ -z "$cmd" ]; then echo "(no command for $s $sec)"; continue; fi
              echo "===== $s $sec (as authored) ====="
              bash -c "$cmd" 2>&1 | tail -20
              if echo "$cmd" | grep -q -- '--initial-capital 50000'; then
                cmd5=$(echo "$cmd" | sed -E 's#--initial-capital 50000#--initial-capital 5000#; s#(--output-dir [^ ]+)#\1_5k#')
                echo "===== $s $sec @ \$5,000 (legacy clone) ====="
                bash -c "$cmd5" 2>&1 | tail -20
              fi
            done
          done

      - name: Commit refreshed reports back to the branch
        run: |
          git config user.name "C - Furqon Aji Yudhistira"
          git config user.email "furqonajiy@gmail.com"
          git add reports/T818_*.xlsx reports/TSL18_*.xlsx reports/V017_*.xlsx 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "report: refresh V017 / TSL18 / T818 backtests (3K, multi-window) with drawdown [skip ci]"
            for i in 1 2 3 4; do git push && break || sleep $((2**i)); done
          fi
