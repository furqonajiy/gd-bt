name: self-scalper-5way-sweep-r3r2r1

# SELF-SCALPER full 5-WAY combination sweep for R3 -> R2 -> R1 (chained), with
# REALISTIC per-regime locked-exit slippage. Full cross-product of the five feed
# dimensions (144 variants/regime): RSI {off,70/30,75/25} x Bollinger {off, %B
# 0.80/0.20, sqz bw>=0.0006} x R:R {base, rr08, rr25, rr40} x S/R {off, prox0.5+
# round10} x S&D {off, rbr_dbd prox0.5}. Each variant regenerates that regime's
# feed and runs the full SC24-seeded strategy grid (tools/sweep_self_limit.py).
#
# Slippage is scored at each regime's volatility-scaled value (NOT the flat 2.0/1.0
# the old sweeps baked in, which over-penalized locked exits 2-5x in calm regimes):
#   R3 (2025)              -> 0.9 / 0.45   (median abs ATR $5.0 = 0.45x the R4 anchor)
#   R2 (2023-10..2024)     -> 0.5 / 0.25   (0.26x)
#   R1 (2021-11..2023-09)  -> 0.4 / 0.2    (0.20x)
# Backtest-realism only; never a live order. Per-regime aggregate keeps a variant
# only if it beats the unfiltered 'base' on BOTH edge AND OOS at DD<=40% (shared
# .github/scripts/agg_entry_feature.sh, prefix self5r). Artifact-only; R4 keeps SQZ6.

on:
  workflow_dispatch:
    inputs:
      max_candidates:
        description: "candidates per shard"
        default: "150"

permissions:
  contents: read

concurrency:
  group: self-scalper-5way-sweep-r3r2r1
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  r3:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - { v: base,                    gen: "" }
          - { v: sd,                      gen: "--sd-mode rbr_dbd --sd-proximity-atr 0.5" }
          - { v: sr,                      gen: "--sr-proximity-atr 0.5 --sr-round-step 10" }
          - { v: sr_sd,                   gen: "--sr-proximity-atr 0.5 --sr-round-step 10 --sd-mode rbr_dbd --sd-proximity-atr 0.5" }
          - { v: rr08,                    gen: "--rr1 0.8 --rr2 1.5 --rr3 3.0" }
          - { v: rr08_sd,                 gen: "--rr1 0.8 --rr2 1.5 --rr3 3.0 --sd-mode rbr_dbd --sd-proximity-atr 0.5" }
          - { v: rr08_sr,                 gen: "--rr1 0.8 --rr2 1.5 --rr3 3.0 --sr-proximity-atr 0.5 --sr-round-step 10" }
          - { v: rr08_sr_sd,              gen: "--rr1 0.8 --rr2 1.5 --rr3 3.0 --sr-proximity-atr 0.5 --sr-round-step 10 --sd-mode rbr_dbd --sd-proximity-atr 0.5" }
          - { v: rr25,                    gen: "--rr1 1.0 --rr2 1.5 --rr3 2.5" }
          - { v: rr25_sd,                 gen: "--rr1 1.0 --rr2 1.5 --rr3 2.5 --sd-mode rbr_dbd --sd-proximity-atr 0.5" }
          - { v: rr25_sr,                 gen: "--rr1 1.0 --rr2 1.5 --rr3 2.5 --sr-proximity-atr 0.5 --sr-round-step 10" }
