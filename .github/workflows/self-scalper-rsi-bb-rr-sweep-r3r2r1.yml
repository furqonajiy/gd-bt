          - { v: rsi70_pbsqz_rr08,      gen: "--rsi-buy-max 70 --rsi-sell-min 30 --bb-buy-pctb-max 0.80 --bb-sell-pctb-min 0.20 --bb-bandwidth-min 0.0006 --rr1 0.8 --rr2 1.5 --rr3 3.0" }
          - { v: rsi70_pbsqz_rr40,      gen: "--rsi-buy-max 70 --rsi-sell-min 30 --bb-buy-pctb-max 0.80 --bb-sell-pctb-min 0.20 --bb-bandwidth-min 0.0006 --rr1 1.0 --rr2 2.0 --rr3 4.0" }
          - { v: rsi70_pctb85_rr08,     gen: "--rsi-buy-max 70 --rsi-sell-min 30 --bb-buy-pctb-max 0.85 --bb-sell-pctb-min 0.15 --rr1 0.8 --rr2 1.5 --rr3 3.0" }
          - { v: rsi70_sqz10_rr08,      gen: "--rsi-buy-max 70 --rsi-sell-min 30 --bb-bandwidth-min 0.0010 --rr1 0.8 --rr2 1.5 --rr3 3.0" }
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Generate scalper24 feed (R1 2021-11..2023-09) variant ${{ matrix.v }}
        run: |
          set -euo pipefail
          python tools/generate_scalper_signals.py \
            --charts data/XAUUSD_M1_20211[12]_ELEV8.csv data/XAUUSD_M1_2022*_ELEV8.csv data/XAUUSD_M1_20230[1-9]_ELEV8.csv \
            --output feed.txt --start 2021-11-01 --session-start 0 --session-end 0 --signal-tz 7 ${{ matrix.gen }}
          echo "R1 ${{ matrix.v }} feed lines: $(wc -l < feed.txt)"
      - name: Sweep 4 shards
        run: |
          set -uo pipefail
          MC="${{ github.event.inputs.max_candidates }}"; MC="${MC:-150}"
          CHARTS="data/XAUUSD_M1_20211[12]_ELEV8.csv data/XAUUSD_M1_2022*_ELEV8.csv data/XAUUSD_M1_20230[1-9]_ELEV8.csv"
          for N in 0 1 2 3; do
            timeout 18000 python tools/sweep_self_limit.py --signals feed.txt \
              --charts $CHARTS --seed $((42 + N)) --max-candidates "$MC" \
              --output-dir "out/${{ matrix.v }}_shard${N}" --validate-months 2 \
              --max-concurrent-dd-pct 40 --fixed-lot 0.01 --resume &
          done; wait
      - uses: actions/upload-artifact@v4
        with: { name: "selfrbr-R1-${{ matrix.v }}", path: "out/**/results.jsonl", if-no-files-found: error }
  r1_agg:
    needs: r1
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with: { pattern: "selfrbr-R1-*", path: _artifacts }
      - name: Aggregate R1 RSI x BB x R:R variants + winner-vs-base
        run: bash .github/scripts/agg_entry_feature.sh R1 selfrbr
      - uses: actions/upload-artifact@v4
        with: { name: "self-rbr-R1-results", path: "results/**", if-no-files-found: warn }
